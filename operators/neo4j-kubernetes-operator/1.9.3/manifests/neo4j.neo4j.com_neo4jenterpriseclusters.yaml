              propertyShardingReady:
                description: |-
                  PropertyShardingReady indicates whether property sharding is configured and ready

                  This field tracks the operational status of property sharding capability
                  on this cluster. When true, the cluster is ready to host sharded databases
                  that separate graph topology from node/relationship properties.

                  Prerequisites for PropertyShardingReady=true:
                  - Neo4j version >= 2025.12.0
                  - Cluster phase = Ready
                  - Property sharding configuration applied successfully
                  - All required Neo4j configuration settings validated
                type: boolean
              ready:
                description: Ready indicates if the cluster is ready for connections
                type: boolean
              replicas:
                description: Replicas shows the current number of replicas
                properties:
                  ready:
                    format: int32
                    type: integer
                  servers:
                    format: int32
                    type: integer
                type: object
              upgradeStatus:
                description: UpgradeStatus provides detailed upgrade progress information
                properties:
                  completionTime:
                    description: CompletionTime shows when the upgrade completed
