  description: |
    ## ComfyUI Operator

    The ComfyUI Operator automates the deployment and lifecycle management of [ComfyUI](https://github.com/comfyanonymous/ComfyUI) instances on Kubernetes and OpenShift.

    ComfyUI is a powerful and modular stable diffusion GUI and backend that provides a node-based interface for designing and executing advanced AI image generation workflows.

    ### Features

    * **Declarative Deployment**: Define ComfyUI instances using Kubernetes Custom Resources
    * **Automated Storage**: Automatic PersistentVolumeClaim provisioning for models and outputs
    * **Model Management**: Integrated Hugging Face model downloads with support for:
      * Checkpoints (Stable Diffusion models)
      * VAE (Variational AutoEncoders)
      * LoRA (Low-Rank Adaptation models)
      * Embeddings
      * ControlNet models
      * CLIP models
    * **Resource Control**: Configurable CPU/memory limits and requests
    * **Status Tracking**: Phase-based lifecycle tracking with detailed conditions
    * **Multi-tenancy**: Namespace isolation with RBAC support

    ### Prerequisites

    * Kubernetes 1.11.3+ or OpenShift 4.x+
    * StorageClass configured for dynamic PVC provisioning
    * Sufficient cluster resources (recommended: 4GB RAM, 2 CPU per instance)

    ### Basic Usage

    Create a ComfyUI instance:

    ```yaml
    apiVersion: comfy.redhat.com/v1alpha1
    kind: ComfyUI
    metadata:
      name: my-comfyui
    spec:
      image: ghcr.io/ai-dock/comfyui:latest
      replicas: 1
      storage:
        size: 20Gi
        storageClassName: standard
      resources:
        requests:
          memory: "4Gi"
          cpu: "2"
        limits:
          memory: "8Gi"
          cpu: "4"
      models:
        checkpoints:
          - repo: stabilityai/stable-diffusion-xl-base-1.0
            files:
              - sd_xl_base_1.0.safetensors
    ```

    ### Documentation

    For complete documentation, see the [GitHub repository](https://github.com/pruggier0/Comfyui-Operator).

    ### Support

    For issues and feature requests, please visit the [issue tracker](https://github.com/pruggier0/Comfyui-Operator/issues).
