apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  creationTimestamp: null
  name: connections.k8s.streamnative.io
spec:
  group: k8s.streamnative.io
  names:
    kind: Connection
    listKind: ConnectionList
    plural: connections
    shortNames:
    - conn
    singular: connection
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Connection is the Schema for the connections API
          It represents a connection configuration for external data systems (Pulsar, Kafka, etc.)
          used by the Orca Agent Registry Service.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConnectionSpec defines the desired state of Connection
            properties:
              kafka:
                description: Kafka contains Kafka-specific connection configuration
                properties:
                  authentication:
                    description: Authentication configuration (reuses KafkaAuthConfig)
                    properties:
                      genericAuth:
                        description: for backward compatibility
                        properties:
                          clientAuthenticationParameters:
                            type: string
                          clientAuthenticationPlugin:
                            type: string
                        required:
                        - clientAuthenticationParameters
                        - clientAuthenticationPlugin
                        type: object
                      oauth2Config:
                        properties:
                          audience:
                            type: string
                          issuerUrl:
                            type: string
                          keySecretKey:
                            description: the secret key of the OAuth2 private key
                              file, such as `auth.json`
                            type: string
                          keySecretName:
                            description: the secret name of the OAuth2 private key
                              file
                            type: string
                          scope:
                            type: string
                        required:
                        - audience
                        - issuerUrl
                        - keySecretKey
                        - keySecretName
                        type: object
                      plainAuthConfig:
                        properties:
                          passwordKey:
                            type: string
                          secretName:
                            description: The name of the k8s secret that contains
                              the username and password for Kafka authentication
                            type: string
                          usernameKey:
                            type: string
                        required:
                        - secretName
                        type: object
                      scramAuthConfig:
                        properties:
                          hashAlgorithm:
                            enum:
                            - SHA-256
                            - SHA-512
                            type: string
                          passwordKey:
                            type: string
                          secretName:
                            description: The name of the k8s secret that contains
                              the username and password for Kafka authentication
                            type: string
                          usernameKey:
                            type: string
                        required:
                        - secretName
                        type: object
                    type: object
                  bootstrapServers:
                    description: BootstrapServers is a list of host/port pairs for
                      initial connection
                    type: string
                  tls:
                    description: TLS configuration (reuses KafkaTLSConfig)
                    properties:
                      enabled:
                        type: boolean
                      keyStoreConfig:
                        properties:
                          fileKey:
                            description: The key in the secret that contains the keystore
                              file(either JKS, PEM or PKCS12 file)
                            type: string
                          keyPasswordKey:
                            description: The key in the secret that contains the key
                              password for the private key
                            type: string
                          passwordKey:
                            description: The key in the secret that contains the password
                              for the keystore (only for JKS and PKCS12)
                            type: string
                          secretName:
                            description: The name of the k8s secret that contains
                              the keystore for Kafka TLS connection and its password
                            type: string
                          type:
                            enum:
                            - JKS
                            - PEM
                            - PKCS12
                            type: string
                        type: object
                      trustStoreConfig:
                        properties:
                          fileKey:
                            description: The key in the secret that contains the truststore
                              file(either JKS, PEM or PKCS12 file)
                            type: string
                          passwordKey:
                            description: The key in the secret that contains the password
                              for the truststore (only for JKS and PKCS12)
                            type: string
                          secretName:
                            description: The name of the k8s secret that contains
                              the truststore for Kafka TLS connection and its password
                            type: string
                          type:
                            enum:
                            - JKS
                            - PEM
                            - PKCS12
                            type: string
                        type: object
                    type: object
                required:
                - bootstrapServers
                type: object
              other:
                description: Other contains configuration for other data systems
                properties:
                  endpoint:
                    description: Endpoint is the connection endpoint URL
                    type: string
                  properties:
                    additionalProperties:
                      type: string
                    description: Properties contains additional connection properties
                    type: object
                  secretRef:
                    description: SecretRef references a secret containing connection
                      credentials
                    properties:
                      key:
                        description: Key in the secret
                        type: string
                      name:
                        description: Name of the secret
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - endpoint
                type: object
              pulsar:
                description: Pulsar contains Pulsar-specific connection configuration
                properties:
                  adminUrl:
                    description: AdminUrl is the Pulsar admin service URL (e.g., http://admin:8080)
                    type: string
                  authentication:
                    description: Authentication configuration
                    properties:
                      genericAuth:
                        description: GenericAuth for custom authentication plugins
                        properties:
                          clientAuthenticationParameters:
                            type: string
                          clientAuthenticationPlugin:
                            type: string
                        required:
                        - clientAuthenticationParameters
                        - clientAuthenticationPlugin
                        type: object
                      oauth2:
                        description: |-
                          OAuth2 configuration for OAuth2 authentication
                          Uses function-mesh OAuth2Config for full compatibility
                        properties:
                          audience:
                            type: string
                          issuerUrl:
                            type: string
                          keySecretKey:
                            description: the secret key of the OAuth2 private key
                              file, such as `auth.json`
                            type: string
                          keySecretName:
                            description: the secret name of the OAuth2 private key
                              file
                            type: string
                          scope:
                            type: string
                        required:
                        - audience
                        - issuerUrl
                        - keySecretKey
                        - keySecretName
                        type: object
                      token:
                        description: Token authentication - reference to secret containing
                          the token
                        properties:
                          key:
                            description: Key in the secret
                            type: string
                          name:
                            description: Name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  serviceUrl:
                    description: ServiceUrl is the Pulsar broker service URL (e.g.,
                      pulsar://broker:6650)
                    type: string
                  tls:
                    description: TLS configuration
                    properties:
                      allowInsecureConnection:
                        description: AllowInsecureConnection allows insecure TLS connection
                        type: boolean
                      clientCertSecretRef:
                        description: ClientCertSecretRef references a secret for mTLS
                          client certificate
                        properties:
                          key:
                            description: Key in the secret
                            type: string
                          name:
                            description: Name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      clientKeySecretRef:
                        description: ClientKeySecretRef references a secret for mTLS
                          client private key
                        properties:
                          key:
                            description: Key in the secret
                            type: string
                          name:
                            description: Name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      enableHostnameVerification:
                        default: true
                        description: EnableHostnameVerification enables hostname verification
                        type: boolean
                      enabled:
                        description: Enabled indicates whether TLS is enabled
                        type: boolean
                      trustCertsSecretRef:
                        description: TrustCertsSecretRef references a secret containing
                          trusted CA certificates
                        properties:
                          key:
                            description: Key in the secret
                            type: string
                          name:
                            description: Name of the secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                required:
                - serviceUrl
                type: object
              type:
                description: Type specifies the connection type (pulsar, kafka, other)
                enum:
                - pulsar
                - kafka
                - other
                type: string
            required:
            - type
            type: object
          status:
            description: ConnectionStatus defines the observed state of Connection
            properties:
              conditions:
                description: Conditions is an array of current observed conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastTestedAt:
                description: LastTestedAt is the timestamp of last connectivity test
                format: date-time
                type: string
              message:
                description: Message provides additional status information
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                format: int64
                type: integer
              phase:
                description: Phase represents the current connection phase
                enum:
                - Unknown
                - Healthy
                - Unhealthy
                - Testing
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
