  creationTimestamp: null
  name: neo4jauthrules.neo4j.neo4j.com
spec:
  group: neo4j.neo4j.com
  names:
    categories:
    - neo4j
    kind: Neo4jAuthRule
    listKind: Neo4jAuthRuleList
    plural: neo4jauthrules
    shortNames:
    - n4jauthrule
    - n4jauthrules
    singular: neo4jauthrule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
