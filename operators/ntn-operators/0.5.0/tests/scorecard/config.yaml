apiVersion: scorecard.operatorframework.io/v1alpha3
kind: Configuration
metadata:
  name: config
stages:
  - parallel: true
    tests:
      - entrypoint:
          - scorecard-test
          - basic-check-spec
        image: quay.io/operator-framework/scorecard-test:v1.38.0
        labels:
          suite: basic
          test: basic-check-spec-test
      - entrypoint:
          - scorecard-test
          - olm-bundle-validation
        image: quay.io/operator-framework/scorecard-test:v1.38.0
        labels:
          suite: olm
          test: olm-bundle-validation-test
      - entrypoint:
          - scorecard-test
          - olm-crds-have-validation
        image: quay.io/operator-framework/scorecard-test:v1.38.0
        labels:
          suite: olm
          test: olm-crds-have-validation-test
      - entrypoint:
          - scorecard-test
          - olm-crds-have-resources
        image: quay.io/operator-framework/scorecard-test:v1.38.0
        labels:
          suite: olm
          test: olm-crds-have-resources-test
      # olm-spec-descriptors and olm-status-descriptors omitted:
      # CSV does not yet include specDescriptors/statusDescriptors.
      # Add them when CRD descriptions are enriched.
