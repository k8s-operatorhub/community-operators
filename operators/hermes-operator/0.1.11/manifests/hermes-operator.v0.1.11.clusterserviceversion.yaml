  install:
    strategy: deployment
    spec:
      clusterPermissions:
        - serviceAccountName: hermes-operator-controller-manager
          rules:
            - apiGroups:
                - ''
              resources:
                - configmaps
                - events
                - persistentvolumeclaims
                - secrets
                - serviceaccounts
                - services
              verbs:
