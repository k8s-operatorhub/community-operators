    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ValkeyBackupTarget — 외부 저장 (S3/GCS/Azure) endpoint + 자격증명 추상화.
          ValkeyBackup ↔ ValkeyRestore 가 동일 target 참조 (ADR-0016).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ValkeyBackupTargetSpec — 외부 저장 target 정의.

              ValkeyBackup.Spec.Destination.TargetRef + ValkeyRestore.Spec.Source.TargetRef
              가 본 CR 을 참조 (대칭성, ADR-0016).
            properties:
              s3:
                description: Type=S3 시 필수.
                properties:
                  bucket:
                    description: 버킷 이름. 사전 생성 필요 (operator 가 자동 생성하지 않음).
                    type: string
                  credentialsSecretRef:
                    description: 자격증명 Secret 참조 (access key + secret key).
                    properties:
                      accessKeyIDKey:
                        default: AWS_ACCESS_KEY_ID
                        description: access key ID 가 들어 있는 key 이름.
                        type: string
                      name:
                        description: Secret 이름. 같은 namespace 의 Secret 만 허용.
                        type: string
                      secretAccessKeyKey:
                        default: AWS_SECRET_ACCESS_KEY
                        description: secret access key 가 들어 있는 key 이름.
                        type: string
                    required:
                    - name
                    type: object
                  endpoint:
                    description: |-
                      S3 endpoint URL. AWS 표준: https://s3.<region>.amazonaws.com
                      MinIO 사내: https://minio.local:9000 등.
                    type: string
                  forcePathStyle:
                    default: false
                    description: path-style URL 강제. MinIO / Ceph RGW 시 true.
                    type: boolean
                  prefix:
                    description: 'object key prefix. 예: "cluster-A/" → cluster-A/<timestamp>/dump.rdb'
                    type: string
                  region:
                    description: 리전 (AWS 필수, MinIO 도 1개 이상 명시 — e.g. "us-east-1").
                    type: string
                  serverSideEncryption:
                    description: 서버측 암호화. AWS S3 의 "AES256" / "aws:kms" / 미명시 (provider
                      기본값).
                    type: string
                required:
                - bucket
                - credentialsSecretRef
                - endpoint
                - region
                type: object
              type:
                default: S3
                description: |-
                  BackupTargetType — 외부 저장 종류. 첫 구현은 S3 (MinIO/Ceph RGW 호환).
                  GCS / Azure 는 추후 type 분기 + 별도 sub-spec 추가 (ADR-0016).
                enum:
                - S3
                - GCS
                - Azure
                type: string
            type: object
          status:
            description: ValkeyBackupTargetStatus — reachability + 마지막 검증 시점.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastVerifiedAt:
                description: 마지막 reachability 검증 성공 시각.
                format: date-time
                type: string
              message:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                description: BackupTargetPhase — reachability 라이프사이클.
                enum:
                - Pending
                - Reachable
                - Unreachable
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
