metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: hermesclusterdefaults.hermes.agent
spec:
  group: hermes.agent
  names:
    categories:
    - hermes
    - agents
    kind: HermesClusterDefaults
    listKind: HermesClusterDefaultsList
    plural: hermesclusterdefaults
    shortNames:
    - hcd
    singular: hermesclusterdefaults
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.image.repository
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: HermesClusterDefaults is the Schema for the hermesclusterdefaults
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of HermesClusterDefaults
            properties:
              image:
                description: Image defaults the instance's spec.image.
                properties:
                  digest:
                    description: |-
                      Digest overrides the tag with an image digest (e.g. sha256:abc...). When set
                      it takes precedence over the tag for the resolved image reference.
                    type: string
                  pullPolicy:
                    default: IfNotPresent
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  repository:
                    default: ghcr.io/paperclipinc/hermes-agent
                    type: string
                  tag:
                    description: |-
                      Tag is the container image tag. Either tag or digest must be set; there is
                      no default, because pinning to a mutable tag like :latest can silently pull
                      a broken upstream build.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: 'spec.image: one of tag or digest must be set and the tag
                    must not be the floating '':latest'' (pick a specific upstream
                    release tag or pin a digest)'
                  rule: (has(self.tag) && size(self.tag) > 0 && self.tag != 'latest')
                    || (has(self.digest) && size(self.digest) > 0)
              networking:
                description: Networking defaults Service kind + NetworkPolicy enablement.
                properties:
                  networkPolicy:
                    description: NetworkPolicyDefaults defaults whether per-instance
                      NetworkPolicies are created.
                    properties:
                      allowDNS:
                        type: boolean
                      enabled:
                        type: boolean
                    type: object
                  service:
                    description: ServiceDefaults defaults the Service kind cluster-wide.
                    properties:
                      type:
                        description: Service Type string describes ingress methods
                          for a service
                        enum:
                        - ClusterIP
                        - NodePort
                        - LoadBalancer
                        type: string
                    type: object
                type: object
              observability:
                description: Observability defaults metrics / ServiceMonitor / PrometheusRule.
                properties:
                  logging:
                    description: LoggingSpec controls the agent's logger configuration
                      via env vars.
                    properties:
                      format:
                        default: text
                        description: LogFormat is the agent's log output format.
                        enum:
                        - text
                        - json
                        type: string
                      level:
                        default: info
                        description: 'Level: Plan 3 wires HERMES_LOG_LEVEL on the
                          agent container.'
                        enum:
                        - trace
                        - debug
                        - info
                        - warn
                        - error
                        type: string
                    type: object
                  metrics:
                    description: MetricsSpec controls the agent's Prometheus metrics
                      endpoint.
                    properties:
                      enabled:
                        default: true
                        type: boolean
                      grafanaDashboard:
                        description: |-
                          GrafanaDashboard configures auto-provisioned Grafana dashboard ConfigMaps
                          (operator overview + per-instance). When enabled, the operator emits
                          ConfigMaps labeled grafana_dashboard="1" so the Grafana sidecar provisioner
                          picks them up automatically.
                        properties:
                          enabled:
                            default: false
                            description: Enabled enables Grafana dashboard ConfigMap
                              creation.
                            type: boolean
                          folder:
                            default: Hermes
                            description: Folder is the Grafana folder to place the
                              dashboards in.
                            type: string
                          labels:
                            additionalProperties:
                              type: string
                            description: 'Labels to add to the dashboard ConfigMaps
                              (in addition to grafana_dashboard: "1").'
                            type: object
                        type: object
                      port:
                        default: 9090
                        description: Port for the /metrics endpoint.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                      secure:
                        default: false
                        description: |-
                          Secure: when true, /metrics requires bearer-token auth and uses HTTPS.
                          The ServiceMonitor scheme/scrape settings must agree (lesson #435/#440).
                        type: boolean
                    type: object
                  prometheusRule:
                    description: |-
                      PrometheusRuleSpec controls emission of a default PrometheusRule with
                      hermes-agent alerts (HighRestartRate, MetricsDown, etc.).
                    properties:
                      additionalRules:
                        description: |-
                          AdditionalRules is a list of user-supplied rules merged onto the operator
                          default ruleset.
                        items:
                          description: |-
                            PrometheusRule is a minimal copy of monitoringv1.Rule so we don't depend on
                            the Prometheus-Operator Go types at compile time. The runtime emits
                            unstructured objects.
                          properties:
                            alert:
                              minLength: 1
                              type: string
                            annotations:
                              additionalProperties:
                                type: string
                              type: object
                            expr:
                              minLength: 1
                              type: string
                            for:
                              type: string
                            labels:
                              additionalProperties:
                                type: string
                              type: object
                          required:
                          - alert
                          - expr
                          type: object
                        type: array
                      enabled:
                        default: false
                        type: boolean
                    type: object
                  serviceMonitor:
                    description: |-
                      ServiceMonitorSpec controls Prometheus-Operator ServiceMonitor emission.
                      When Enabled is true, the operator emits an unstructured ServiceMonitor; it
                      does not require the Prometheus-Operator CRDs to be installed at compile time.
                    properties:
                      enabled:
                        default: false
                        type: boolean
                      interval:
                        default: 30s
                        description: 'Interval: default "30s".'
                        pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are extra labels applied onto the ServiceMonitor for Prometheus
                          label-selector matching (e.g. `release: kube-prometheus-stack`).
                        type: object
                      scrapeTimeout:
                        default: 10s
                        description: 'ScrapeTimeout: default "10s".'
                        pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$
                        type: string
                    type: object
                type: object
              registry:
                description: Registry defaults image-pull plumbing.
                properties:
                  pullSecretName:
                    description: |-
                      PullSecretName, if non-empty, is added to every instance's
                      pod.spec.imagePullSecrets when the instance doesn't override.
                    type: string
                type: object
              resources:
                description: Resources defaults requests + limits when the instance
                  leaves them nil.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Limits is the resource-limits map.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: Requests is the resource-requests map.
                    type: object
                type: object
              security:
                description: |-
                  Security defaults SA annotations + NetworkPolicy on/off + container-level
                  defaults (read-only rootfs etc. are operator-baked, not defaultable).
                properties:
                  caBundle:
                    description: |-
                      CABundleSpec optionally mounts a CA bundle into the agent container.
                      Exactly one of ConfigMapName / SecretName SHOULD be set.
                    properties:
                      configMapName:
                        description: ConfigMapName references a ConfigMap in the same
                          namespace.
                        type: string
                      key:
                        default: ca.crt
                        description: Key is the data-map key holding the PEM bundle.
                          Default "ca.crt".
                        type: string
                      secretName:
                        description: SecretName references a Secret in the same namespace.
                        type: string
                    type: object
                  networkPolicy:
                    description: NetworkPolicyDefaults defaults whether per-instance
                      NetworkPolicies are created.
                    properties:
                      allowDNS:
                        type: boolean
                      enabled:
                        type: boolean
                    type: object
                  serviceAccount:
                    description: ServiceAccountDefaults defaults the per-instance
                      SA annotations (IRSA / WI).
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                type: object
              storage:
                description: Storage defaults the instance's spec.storage.
                properties:
                  persistence:
                    properties:
                      enabled:
                        default: true
                        type: boolean
                      size:
                        default: 1Gi
                        type: string
                      storageClassName:
                        type: string
                    type: object
                type: object
            type: object
          status:
            description: status defines the observed state of HermesClusterDefaults
            properties:
              conditions:
                description: Conditions track Ready ("singleton-name OK and reachable").
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
