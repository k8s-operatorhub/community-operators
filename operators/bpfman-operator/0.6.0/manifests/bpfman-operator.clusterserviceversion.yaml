  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - nodes
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - apps
          resources:
          - daemonsets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplications
          - clusterbpfapplications
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplications/finalizers
          - clusterbpfapplications/finalizers
          - configs/finalizers
          verbs:
          - update
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplications/status
          - clusterbpfapplications/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplicationstates
          - clusterbpfapplicationstates
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - bpfman.io
          resources:
          - configs
          verbs:
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - security.openshift.io
          resources:
          - securitycontextconstraints
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - storage.k8s.io
          resources:
          - csidrivers
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        serviceAccountName: bpfman-operator
      deployments:
      - label:
          app.kubernetes.io/component: manager
          app.kubernetes.io/created-by: bpfman-operator
          app.kubernetes.io/instance: controller-manager
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: deployment
          app.kubernetes.io/part-of: bpfman-operator
          control-plane: controller-manager
        name: bpfman-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
                service.beta.openshift.io/serving-cert-secret-name: controller-manager-metrics-tls
              labels:
                control-plane: controller-manager
            spec:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                    - matchExpressions:
                      - key: kubernetes.io/arch
                        operator: In
                        values:
                        - amd64
                        - arm64
                        - ppc64le
                        - s390x
                      - key: kubernetes.io/os
                        operator: In
                        values:
                        - linux
              containers:
              - args:
                - --health-probe-bind-address=:8175
                - --metrics-bind-address=:8443
                - --leader-elect
                - --cert-dir=/tmp/k8s-webhook-server/serving-certs
                command:
                - /bpfman-operator
                env:
                - name: GO_LOG
                  value: info
                image: quay.io/bpfman/bpfman-operator:latest
                imagePullPolicy: IfNotPresent
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8175
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: bpfman-operator
                ports:
                - containerPort: 8443
                  name: https-metrics
                  protocol: TCP
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8175
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 5m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                volumeMounts:
                - mountPath: /tmp/k8s-webhook-server/serving-certs
                  name: controller-manager-metrics-tls
                  readOnly: true
              securityContext:
                runAsNonRoot: true
              serviceAccountName: bpfman-operator
              terminationGracePeriodSeconds: 10
              volumes:
              - name: controller-manager-metrics-tls
                secret:
                  secretName: controller-manager-metrics-tls
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplications
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplications/finalizers
          verbs:
          - update
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplications/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - bpfman.io
          resources:
          - bpfapplicationstates
          verbs:
          - get
          - list
          - watch
        serviceAccountName: bpfman-operator
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - ebpf
  - kubernetes
  links:
  - name: bpfman website
    url: https://bpfman.io/
  maintainers:
  - email: afredette@redhat.com
    name: Andre Fredette
  - email: mmahmoud@redhat.com
    name: Mohamed Mahmoud
  maturity: alpha
  minKubeVersion: 1.26.0
  provider:
    name: The bpfman Community
    url: https://bpfman.io/
  version: 0.6.0
