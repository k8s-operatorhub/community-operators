      deployments:
        - label:
            app.kubernetes.io/component: manager
            app.kubernetes.io/name: keycloak-operator
          name: keycloak-operator-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/component: manager
                app.kubernetes.io/name: keycloak-operator
            strategy: {}
            template:
              metadata:
                labels:
                  app.kubernetes.io/component: manager
                  app.kubernetes.io/name: keycloak-operator
              spec:
                containers:
                  - args:
                      - --leader-elect
                    image: ghcr.io/hostzero-gmbh/keycloak-operator:v0.8.0
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: health
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    ports:
                      - containerPort: 8080
                        name: metrics
                        protocol: TCP
                      - containerPort: 8081
                        name: health
                        protocol: TCP
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: health
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 100m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                serviceAccountName: keycloak-operator-controller-manager
                terminationGracePeriodSeconds: 10
      permissions:
        - rules:
            - apiGroups:
                - ""
              resources:
