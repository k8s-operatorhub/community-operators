        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PolicyEngineSpec defines the desired state of PolicyEngine.

              Represents a policy engine resource within the AgentCore Policy system. Policy
              engines serve as containers for grouping related policies and provide the
              execution context for policy evaluation and management. Each policy engine
              can be associated with one Gateway (one engine per Gateway), where it intercepts
              all agent tool calls and evaluates them against the contained policies before
              allowing tools to execute. The policy engine maintains the Cedar schema generated
              from the Gateway's tool manifest, ensuring that policies are validated against
              the actual tools and parameters available. Policy engines support two enforcement
              modes that can be configured when associating with a Gateway: log-only mode
              for testing (evaluates decisions without blocking) and enforce mode for production
              (actively allows or denies based on policy evaluation).
            properties:
              description:
                description: |-
                  A human-readable description of the policy engine's purpose and scope (1-4,096
                  characters). This helps administrators understand the policy engine's role
                  in the overall governance strategy. Document which Gateway this engine will
                  be associated with, what types of tools or workflows it governs, and the
                  team or service responsible for maintaining it. Clear descriptions are essential
                  when managing multiple policy engines across different services or environments.
                type: string
              encryptionKeyARN:
                description: |-
                  The Amazon Resource Name (ARN) of the KMS key used to encrypt the policy
                  engine data.

                  Regex Pattern: `^arn:aws(|-cn|-us-gov):kms:[a-zA-Z0-9-]*:[0-9]{12}:key/[a-zA-Z0-9-]{36}$`
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              encryptionKeyRef:
                description: "AWSResourceReferenceWrapper provides a wrapper around
                  *AWSResourceReference\ntype to provide more user friendly syntax
                  for references using 'from' field\nEx:\nAPIIDRef:\n\n\tfrom:\n\t
                  \ name: my-api"
                properties:
                  from:
                    description: |-
                      AWSResourceReference provides all the values necessary to reference another
                      k8s resource for finding the identifier(Id/ARN/Name)
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    type: object
                type: object
              name:
                description: |-
                  The customer-assigned immutable name for the policy engine. This name identifies
                  the policy engine and cannot be changed after creation.

                  Regex Pattern: `^[A-Za-z][A-Za-z0-9_]*$`
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              tags:
                additionalProperties:
                  type: string
                description: |-
                  A map of tag keys and values to assign to an AgentCore Policy. Tags enable
                  you to categorize your resources in different ways, for example, by purpose,
                  owner, or environment.
                type: object
            required:
            - name
            type: object
          status:
            description: PolicyEngineStatus defines the observed state of PolicyEngine
