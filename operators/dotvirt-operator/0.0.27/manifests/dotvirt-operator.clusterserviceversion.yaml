          spec:
            replicas: 1
            selector:
              matchLabels:
                app: dotvirt-operator
            strategy: {}
            template:
              metadata:
                labels:
                  app: dotvirt-operator
              spec:
                containers:
                  - args:
                      - --leader-elect
                      - --health-probe-bind-address=:8081
                    env:
                      - name: RELATED_IMAGE_DOTVIRT
                        value: quay.io/epheo/dotvirt@sha256:6df18fdcfb461270a46f7372356f97601f463827d85432bd5a1e5fbdbc02f9b6
                      - name: RELATED_IMAGE_FORGEJO
                        value: codeberg.org/forgejo/forgejo:11-rootless@sha256:5135f11de848bea6d59c0a96688e90c361380ba102bdc08dbd5aa52cca2b179b
                    image: quay.io/epheo/dotvirt-operator@sha256:73c12ad00a4e47681854aef82af31d32076f8d38ab9885f885ca498c6d55f8a5
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        memory: 256Mi
                      requests:
                        cpu: 10m
                        memory: 64Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                serviceAccountName: dotvirt-operator-controller
                terminationGracePeriodSeconds: 10
      permissions:
