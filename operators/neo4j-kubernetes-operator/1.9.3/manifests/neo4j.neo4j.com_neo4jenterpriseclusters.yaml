                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              diagnostics:
                description: |-
                  Diagnostics holds the most recently collected live diagnostics from the cluster.
                  Populated when spec.monitoring.enabled=true and the cluster is Ready.
                properties:
                  collectionError:
                    description: |-
                      CollectionError holds the last error message if diagnostics collection failed.
                      Empty when collection succeeds.
                    type: string
                  databases:
                    description: Databases lists the most recently observed state
                      of each database.
                    items:
                      description: DatabaseDiagnosticInfo holds the observed state
                        of a single Neo4j database.
                      properties:
                        default:
                          description: Default indicates whether this is the default
                            database.
                          type: boolean
                        name:
                          description: Name is the database name.
                          type: string
                        requestedStatus:
                          description: RequestedStatus is the desired operational
                            status.
                          type: string
                        role:
                          description: Role is the database role on the most recently
                            contacted server (e.g. "primary", "secondary").
                          type: string
                        status:
                          description: Status is the current operational status (e.g.
                            "online", "offline", "quarantined").
                          type: string
                      required:
                      - name
                      - requestedStatus
                      - role
                      - status
                      type: object
                    type: array
                  lastCollected:
                    description: LastCollected is the timestamp of the most recent
                      successful diagnostics collection.
                    format: date-time
                    type: string
                  roleCount:
                    description: |-
                      RoleCount is the total number of roles observed via SHOW ROLES, even
                      when the Roles slice is truncated for size.
                    type: integer
                  roles:
                    description: |-
                      Roles lists the roles currently present in the cluster's `system`
                      database (from SHOW ROLES YIELD role, immutable). Useful for observing
                      the effect of Neo4jRole reconciliation.
                    items:
                      description: RoleDiagnosticInfo summarises one row of `SHOW
                        ROLES YIELD role, immutable`.
                      properties:
                        immutable:
                          description: |-
                            Immutable is true when the role was created with `CREATE IMMUTABLE ROLE`
                            or is one of the built-in immutable roles.
                          type: boolean
                        role:
                          description: Role is the role name.
                          type: string
                      required:
                      - role
                      type: object
                    type: array
                  servers:
                    description: Servers lists the most recently observed state of
                      each server in the cluster.
                    items:
                      description: ServerDiagnosticInfo holds the observed state of
                        a single Neo4j server.
                      properties:
                        address:
                          description: Address is the Bolt address of the server.
                          type: string
                        health:
                          description: Health is the server health status (e.g. "Available",
                            "Unavailable").
                          type: string
                        hostingDatabases:
                          description: HostingDatabases is the number of databases
                            hosted by this server.
                          type: integer
                        name:
                          description: Name is the server's display name (from SHOW
                            SERVERS).
                          type: string
                        state:
                          description: State is the server lifecycle state (e.g. "Enabled",
                            "Cordoned", "Deallocating").
                          type: string
                      required:
                      - address
                      - health
                      - hostingDatabases
                      - name
                      - state
                      type: object
                    type: array
                  userCount:
                    description: |-
                      UserCount is the total number of users observed via SHOW USERS, even
                      when the Users slice is truncated for size.
                    type: integer
                  users:
                    description: |-
                      Users lists the users currently present in the cluster's `system` database
                      (from SHOW USERS). Useful for observing the effect of Neo4jUser /
                      Neo4jRoleBinding reconciliation. Bounded summary — see UserCount for the
                      total when this list is truncated.
                    items:
                      description: UserDiagnosticInfo summarises one row of `SHOW
                        USERS`.
                      properties:
                        homeDatabase:
                          description: HomeDatabase is the user's configured home
                            database, if any.
                          type: string
                        roles:
                          description: |-
                            Roles is the set of roles directly granted to the user (excluding the
