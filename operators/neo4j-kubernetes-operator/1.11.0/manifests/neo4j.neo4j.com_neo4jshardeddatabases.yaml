apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: neo4jshardeddatabases.neo4j.neo4j.com
spec:
  group: neo4j.neo4j.com
  names:
    kind: Neo4jShardedDatabase
    listKind: Neo4jShardedDatabaseList
    plural: neo4jshardeddatabases
    singular: neo4jshardeddatabase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef
      name: Cluster
      type: string
    - jsonPath: .spec.propertySharding.propertyShards
      name: Shards
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          Neo4jShardedDatabase declaratively manages a property-sharded
          Neo4j database (Neo4j 2025.12+ feature). The operator coordinates
          the graph shard and N property shards, each with its own topology
          (primaries / secondaries), sets the database's default Cypher
          language version (5 or 25), and surfaces shard-level health on
          .status. Use a regular Neo4jDatabase resource for non-sharded
          (single-graph) workloads.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Neo4jShardedDatabaseSpec defines the desired state of Neo4jShardedDatabase
            properties:
              clusterRef:
                description: Reference to the Neo4j cluster that will host this sharded
                  database
                type: string
              defaultCypherLanguage:
                description: |-
                  Default Cypher language version for sharded database (Neo4j 2025.12+ only)

                  Property sharding requires Cypher 25 syntax for multi-database operations.
                  This field ensures compatibility with sharded database queries.
                enum:
                - "25"
                type: string
              force:
                description: |-
                  Force confirms the destructive ReplaceExisting operation. Required as
                  a separate field so an accidental ReplaceExisting flip can't destroy
                  data — the user must consciously set BOTH fields.
                type: boolean
              ifNotExists:
                description: |-
                  IfNotExists controls whether the sharded database creation is
                  idempotent. When unset (nil) or true, the operator emits
                  `CREATE DATABASE ... IF NOT EXISTS` which is a no-op if the database
                  already exists. Set explicitly to false to allow `CREATE DATABASE`
                  without the `IF NOT EXISTS` clause — required when paired with
                  `replaceExisting=true` (the destructive recreate path), and disallowed
                  otherwise without manual handling of "database already exists" errors.

                  Pointer type rather than bool with default=true: a `bool` field with
                  `omitempty` would silently revert to the server-side default whenever
                  a user explicitly set it to false, since `false` serializes as the
                  JSON zero value and is dropped from the wire. Using *bool preserves
                  "explicitly false" through Update round-trips.
                type: boolean
              name:
                description: Name of the sharded database to create
                type: string
              propertySharding:
                description: Property sharding configuration
                properties:
                  graphShard:
                    description: |-
                      Graph shard topology specification

                      Defines the replication topology for the graph shard database.
                      This database contains nodes, relationships, and labels without properties.
                    properties:
                      primaries:
                        description: |-
                          Number of primary replicas for this database

                          Primaries handle both read and write operations for the database.
                          At least 1 primary is required for database operation.
                        format: int32
                        minimum: 1
                        type: integer
                      secondaries:
                        description: |-
                          Number of secondary replicas for this database

                          Secondaries provide read-only access for horizontal scaling.
                          Secondaries are optional but improve read performance and availability.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  propertyShardTopology:
                    description: |-
                      Property shard topology specification

                      Defines the replication topology for each property shard database.
                      All property shards use the same topology configuration.
                    properties:
                      replicas:
                        default: 1
                        description: Number of replicas per property shard.
                        format: int32
                        minimum: 1
                        type: integer
                    type: object
                  propertyShards:
                    description: |-
                      Number of property shards to create

                      Determines how node and relationship properties are distributed.
                      More shards enable better parallelization but increase complexity.
                      Recommended: 4-16 shards for most use cases.
                    format: int32
                    maximum: 1000
                    minimum: 1
                    type: integer
                required:
                - graphShard
                - propertyShardTopology
                - propertyShards
                type: object
              replaceExisting:
                description: |-
                  ReplaceExisting destroys an existing logical sharded database before
                  recreating it from the seed (typically `spec.seedBackupRef`). Intended
                  for the operationally-load-bearing recovery path where shards have
                  become unrecoverable (e.g. all replicas of a property shard severed),
                  and the only restore mechanism is drop-and-recreate from backup.

                  REQUIRES `force: true` as a separate confirmation field, mirroring
                  the safety pattern used by `Neo4jRestore.spec.force`. The validator
                  rejects `replaceExisting: true` without `force: true`.

                  Mutually exclusive with `ifNotExists: true` — those two settings
                  contradict each other (one says "no-op if it exists", the other says
                  "destroy if it exists"). Set `ifNotExists: false` explicitly when
                  using `replaceExisting`.

                  THIS IS DESTRUCTIVE: the operator runs `DROP DATABASE {name}
                  DESTROY DATA WAIT` before CREATE. All existing data in the named
                  sharded DB is lost. The seedBackupRef contents are the only source
                  of data after the operation.
                type: boolean
              seedBackupRef:
                description: |-
                  SeedBackupRef names a Neo4jBackup CR (in the same namespace) whose
                  most-recent Succeeded run will be used as the seed for this sharded
                  database. The operator resolves the reference at reconcile time into a
                  concrete seedURI (computed from the backup's storage type + per-run
                  subdirectory). Mutually exclusive with SeedURI and SeedURIs.

                  Currently restricted to backups stored in cloud locations (S3, GCS,
                  Azure Blob): PVC-stored backups would require mounting the backup PVC
                  on cluster pods, which is out of scope for this field. The validator
                  rejects PVC-backed seedBackupRef at reconcile time with an explanatory
                  status message.

                  If the referenced Neo4jBackup has no Succeeded run yet, the sharded
                  database stays in Pending phase and the reconciler requeues — it does
                  NOT route to Failed (mirrors CLAUDE.md rule 72's restore-side semantics).
                type: string
              seedConfig:
                description: Seed configuration for advanced initialization
                properties:
                  config:
                    additionalProperties:
                      type: string
                    description: |-
                      Additional seed provider configuration options

                      Common configuration options:
                      - "compression": "gzip" | "lz4" | "none"
                      - "validation": "strict" | "lenient"
                      - "bufferSize": Buffer size for seed operations

                      Cloud-specific options:
                      - S3: "region", "endpoint", "pathStyleAccess"
                      - GCS: "project", "location"
                      - Azure: "endpoint", "containerName"
                    type: object
                  restoreUntil:
                    description: |-
                      Restore until specific point in time (Neo4j 2025.x only)

                      Supports two formats:
                      - RFC3339 timestamp: "2025-01-15T10:30:00Z"
                      - Transaction ID: "txId:12345"

                      This allows point-in-time recovery when creating database from backup.
                      Only available with Neo4j 2025.x and CloudSeedProvider.
                    type: string
                type: object
              seedCredentials:
                description: Seed credentials for URI access when system-wide auth
                  is not available
                properties:
                  secretRef:
                    description: |-
                      Kubernetes secret containing seed URI credentials

                      Expected secret keys by URI scheme:

                      S3 (s3://):
                      - AWS_ACCESS_KEY_ID: AWS access key
                      - AWS_SECRET_ACCESS_KEY: AWS secret key
                      - AWS_SESSION_TOKEN: (optional) session token
                      - AWS_REGION: (optional) AWS region override

                      Google Cloud Storage (gs://):
                      - GOOGLE_APPLICATION_CREDENTIALS: Service account JSON key
                      - GOOGLE_CLOUD_PROJECT: (optional) project ID override

                      Azure Blob Storage (azb://):
                      - AZURE_STORAGE_ACCOUNT: Storage account name
                      - AZURE_STORAGE_KEY: Storage account key
                      - AZURE_STORAGE_SAS_TOKEN: (alternative) SAS token

                      HTTP/HTTPS/FTP:
                      - USERNAME: (optional) authentication username
                      - PASSWORD: (optional) authentication password
                      - AUTH_HEADER: (optional) custom authorization header
                    type: string
                type: object
              seedSourceDatabase:
                description: |-
                  Optional source database name for seed metadata lookup.
                  Used when seeding from backups with a different database name.
                type: string
              seedURI:
                description: |-
                  Seed URI for creating the sharded database from backups or dumps.
                  When provided as a single URI, Neo4j expects backup artifacts to be named
                  using shard suffixes (e.g., <db>-g000, <db>-p000).
                type: string
              seedURIs:
                additionalProperties:
                  type: string
                description: |-
                  Seed URIs keyed by shard name for dump-based seeding or multi-location backups.
                  Keys must match shard names (e.g., <db>-g000, <db>-p000).
                type: object
              txLogEnrichment:
                description: |-
                  Transaction log enrichment for sharded database creation.
                  Valid values are Neo4j-supported txLogEnrichment options (e.g., "FULL").
                type: string
              wait:
                default: true
                description: Wait for database creation to complete
                type: boolean
            required:
            - clusterRef
            - defaultCypherLanguage
            - name
            - propertySharding
            type: object
          status:
            description: Neo4jShardedDatabaseStatus defines the observed state of
              Neo4jShardedDatabase
            properties:
              conditions:
                description: Conditions represent the current state of the sharded
                  database
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              creationTime:
                description: CreationTime shows when the sharded database was created
                format: date-time
                type: string
              graphShard:
                description: Graph shard status
                properties:
                  lastError:
                    description: Last error encountered for this shard
                    type: string
                  name:
                    description: Database name for this shard
                    type: string
                  propertyCount:
                    format: int64
                    type: integer
                  propertyShardIndex:
                    description: Property shard specific fields
                    format: int32
                    type: integer
                  ready:
                    description: Ready indicates if this shard is operational
                    type: boolean
                  servers:
                    description: Servers hosting this shard
                    items:
                      type: string
                    type: array
                  size:
                    description: Size of this shard database
                    type: string
                  state:
                    description: Current state of this shard database
                    type: string
                  type:
                    description: 'Shard type: graph or property'
                    enum:
                    - graph
                    - property
                    type: string
                type: object
              lastBackup:
                description: |-
                  LastBackup records the most recent successful backup that targeted this
                  sharded database. Populated by the backup controller's reverse-lookup
                  when a Neo4jBackup with target.kind=ShardedDatabase and target.name
                  matching this CR's name reaches a Succeeded run. Populated only on
                  Success — Failed/Running runs do not overwrite the field. The reference
                  is informational; operators auditing backup health should also consult
                  the Neo4jBackup CR's status.history for the full chain.
                properties:
                  backupRef:
                    description: BackupRef is the Neo4jBackup CR name in the same
                      namespace.
                    type: string
                  backupsPath:
                    description: |-
                      BackupsPath is the per-run subdirectory inside the backup storage where
                      the per-shard artifacts were written. Same value as BackupRun.BackupsPath.
                    type: string
                  runID:
                    description: |-
                      RunID matches BackupRun.RunID in the Neo4jBackup CR (the backup Job's
                      metadata.uid). Stable across status refreshes and unique per run.
                    type: string
                  timestamp:
                    description: Timestamp is the time the backup Job's Pod reported
                      completion.
                    format: date-time
                    type: string
                required:
                - backupRef
                type: object
              lastDestructiveRestoreGeneration:
                description: |-
                  LastDestructiveRestoreGeneration is the spec.metadata.generation at
                  which the operator last executed a successful destructive restore
                  (replaceExisting+force). Set by the sharded DB controller after the
                  DROP DATABASE … DESTROY DATA WAIT + CREATE DATABASE … OPTIONS { seedURI }
                  cycle finishes. Used to prevent re-triggering the destructive flow on
                  every reconcile: the controller only runs DROP if
                  `LastDestructiveRestoreGeneration < Generation`. To re-trigger after
                  a successful restore (e.g. to re-seed from a newer backup), the user
                  updates spec — which bumps Generation past
                  LastDestructiveRestoreGeneration — and the operator picks up the new
                  request.
                format: int64
                type: integer
              message:
                description: Message provides additional information about the current
                  state
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation observed by
                  the controller
                format: int64
                type: integer
              phase:
                description: Phase represents the current phase of the sharded database
                type: string
              propertyShards:
                description: Property shard statuses
                items:
                  description: ShardStatus tracks the status of individual shards
                    (graph or property)
                  properties:
                    lastError:
                      description: Last error encountered for this shard
                      type: string
                    name:
                      description: Database name for this shard
                      type: string
                    propertyCount:
                      format: int64
                      type: integer
                    propertyShardIndex:
                      description: Property shard specific fields
                      format: int32
                      type: integer
                    ready:
                      description: Ready indicates if this shard is operational
                      type: boolean
                    servers:
                      description: Servers hosting this shard
                      items:
                        type: string
                      type: array
                    size:
                      description: Size of this shard database
                      type: string
                    state:
                      description: Current state of this shard database
                      type: string
                    type:
                      description: 'Shard type: graph or property'
                      enum:
                      - graph
                      - property
                      type: string
                  type: object
                type: array
              shardingReady:
                description: ShardingReady indicates whether all shards are created
                  and operational
                type: boolean
              totalSize:
                description: Total size across all shards
                type: string
              virtualDatabase:
                description: Virtual database status (logical view combining all shards)
                properties:
                  endpoint:
                    description: Connection endpoint for virtual database queries
                    type: string
                  metrics:
                    description: Performance metrics for virtual database
                    properties:
                      queryMetrics:
                        description: Query performance statistics
                        properties:
                          averageQueryTime:
                            description: Average query execution time
                            type: string
                          crossShardQueriesPerSecond:
                            description: Number of cross-shard queries per second
                            type: string
                          propertyCacheHitRatio:
                            description: Cache hit ratio for property lookups (0.0-1.0
                              as string)
                            type: string
                        type: object
                      totalNodes:
                        description: Total number of nodes across all shards
                        format: int64
                        type: integer
                      totalProperties:
                        description: Total number of properties across all property
                          shards
                        format: int64
                        type: integer
                      totalRelationships:
                        description: Total number of relationships across all shards
                        format: int64
                        type: integer
                    type: object
                  name:
                    description: Name of the virtual database (logical view)
                    type: string
                  ready:
                    description: Ready indicates if the virtual database is operational
                    type: boolean
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
