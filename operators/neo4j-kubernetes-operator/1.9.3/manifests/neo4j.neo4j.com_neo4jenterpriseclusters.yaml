                          inProgress:
                            description: Number of servers currently being upgraded
                            format: int32
                            type: integer
                          pending:
                            description: Number of servers pending upgrade
                            format: int32
                            type: integer
                          total:
                            description: Total number of servers
                            format: int32
                            type: integer
                          upgraded:
                            description: Number of servers successfully upgraded
                            format: int32
                            type: integer
                        type: object
                      total:
                        description: Total number of servers to upgrade
                        format: int32
                        type: integer
                      upgraded:
                        description: Number of servers successfully upgraded
                        format: int32
                        type: integer
                    type: object
                  startTime:
                    description: StartTime shows when the upgrade started
                    format: date-time
                    type: string
                  targetVersion:
                    description: TargetVersion shows the version being upgraded to
                    type: string
                type: object
              version:
                description: Version shows the current Neo4j version
                type: string
            type: object
