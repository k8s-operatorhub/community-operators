              - urn:alm:descriptor:com.tectonic.ui:select:v1.29.3
              - urn:alm:descriptor:com.tectonic.ui:select:v1.29.2
              - urn:alm:descriptor:com.tectonic.ui:select:v1.29.1
              - urn:alm:descriptor:com.tectonic.ui:select:v1.29.0
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28-latest
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.7
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.6
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.5
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.4
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.3
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.2
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.1
              - urn:alm:descriptor:com.tectonic.ui:select:v1.28.0
          - description: Namespace to which the Istio ztunnel component should be installed.
            displayName: Namespace
            path: namespace
            x-descriptors:
              - urn:alm:descriptor:io.kubernetes:Namespace
          - description: Defines the values to be passed to the Helm charts when installing Istio ztunnel.
