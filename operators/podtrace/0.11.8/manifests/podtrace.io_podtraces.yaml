---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
    helm.sh/resource-policy: keep
  name: podtraces.podtrace.io
spec:
  group: podtrace.io
  names:
    categories:
    - podtrace
    kind: PodTrace
    listKind: PodTraceList
    plural: podtraces
    shortNames:
    - pt
    singular: podtrace
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.matchedPods
      name: Matched
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .spec.exporterRef.name
      name: Exporter
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PodTrace is a continuous realtime eBPF trace over a dynamic set
          of pods.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PodTraceSpec defines a continuous, realtime tracing intent over a set of pods.
              PodTrace is the continuous-observability counterpart of PodTraceSession: it
              has no bounded duration and remains active until the resource is deleted or
              paused. Agents on each node watch PodTrace resources and feed matching pods
              into their local tracer.
            properties:
              containerName:
                description: |-
                  ContainerName restricts tracing to a specific container within each
                  matched pod. If empty, the first container is used.
                type: string
              exporterRef:
                description: ExporterRef names an ExporterConfig in the same namespace.
                  Required.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              filters:
                description: |-
                  Filters restricts the event categories captured. When empty, all
                  categories are captured.
                items:
                  description: EventFilter enumerates the event categories podtrace
                    can capture.
                  enum:
                  - dns
                  - net
                  - fs
                  - cpu
                  - proc
                  type: string
                type: array
              namespaceSelector:
                description: |-
                  NamespaceSelector scopes the Selector across namespaces. When unset
                  the selector is evaluated within the PodTrace's own namespace only.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              paused:
                description: Paused suspends tracing for this resource without deleting
                  it.
                type: boolean
              podRefs:
                description: PodRefs explicitly enumerates target pods.
                items:
                  description: PodRef references a specific pod by namespace/name.
                  properties:
                    name:
                      description: Name is the name of the pod.
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the pod. If empty, defaults to the
                        namespace of the owning CR (for namespaced CRs).
                      type: string
                  required:
                  - name
                  type: object
                type: array
              samplePercent:
                description: SamplePercent sets the sampling rate for exported traces,
                  0-100.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              selector:
                description: |-
                  Selector picks target pods by label. Mutually exclusive with PodRefs;
                  exactly one of the two must be set.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              thresholds:
                description: Thresholds override the agent's default anomaly-detection
                  settings.
                properties:
                  errorRatePercent:
                    description: |-
                      ErrorRatePercent triggers issue detection when errors exceed this
                      percentage over the rolling window. 0-100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  fsSlowMs:
                    description: |-
                      FSSlowMs triggers issue detection when a filesystem operation takes
                      longer than this value in milliseconds.
                    format: int32
                    minimum: 0
                    type: integer
                  rttSpikeMs:
                    description: |-
                      RTTSpikeMs triggers issue detection when network RTT exceeds this
                      value in milliseconds.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
            required:
            - exporterRef
            type: object
          status:
            description: PodTraceStatus reflects the observed state of a PodTrace.
            properties:
              conditions:
                description: |-
                  Conditions is the latest available observations of the PodTrace state.
                  Common types: Ready, Reconciled, Paused, Degraded.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              matchedPods:
                description: MatchedPods is the total number of pods currently matched
                  across all nodes.
                format: int32
                type: integer
              nodeStatus:
                description: |-
                  NodeStatus aggregates per-node agent reports. Agents patch their own
                  entry every StatusReportInterval (see TracerConfig).
                items:
                  description: PodTraceNodeStatus reports one agent's view of this
                    PodTrace.
                  properties:
                    activeCgroups:
                      description: ActiveCgroups is the count of cgroups the agent
                        is currently tracing for this PodTrace.
                      format: int32
                      type: integer
                    droppedEvents:
                      description: |-
                        DroppedEvents counts events that were produced by the kernel but could
                        not be forwarded to an exporter (buffer full or exporter backpressure).
                      format: int64
                      type: integer
                    eventsTotal:
                      description: |-
                        EventsTotal is the cumulative number of events captured by this agent
                        for this PodTrace since the agent last started.
                      format: int64
                      type: integer
                    lastHeartbeat:
                      description: LastHeartbeat is the time this entry was last updated
                        by its agent.
                      format: date-time
                      type: string
                    message:
                      description: Message provides human-readable detail, typically
                        an error cause when Ready is false.
                      type: string
                    node:
                      description: Node is the name of the node reporting this status.
                        Unique within the array.
                      type: string
                    ready:
                      description: Ready indicates the agent has successfully attached
                        to the local matched cgroups.
                      type: boolean
                  required:
                  - activeCgroups
                  - droppedEvents
                  - eventsTotal
                  - lastHeartbeat
                  - node
                  - ready
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - node
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this PodTrace.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
