    singular: attunenamespacedefaults
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.metricsSource.prometheus.address
      name: Prometheus
      type: string
    - jsonPath: .spec.updateStrategy.type
      name: Type
