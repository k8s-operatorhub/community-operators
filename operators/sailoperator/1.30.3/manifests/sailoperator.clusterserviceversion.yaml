                  control-plane: sail-operator
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/arch
                              operator: In
                              values:
                                - amd64
                                - arm64
                                - ppc64le
                                - s390x
                            - key: kubernetes.io/os
                              operator: In
                              values:
                                - linux
                containers:
                  - args:
                      - --health-probe-bind-address=:8081
                      - --metrics-bind-address=:8443
                      - --zap-log-level=info
                    command:
                      - /sail-operator
                    image: quay.io/sail-dev/sail-operator@sha256:1cbd63484b02ee9984a40610c04c4e202cba07f54ba9de182635b7886c3c8bf4
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: sail-operator
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 1Gi
                      requests:
                        cpu: 10m
                        memory: 64Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                    volumeMounts:
                      - mountPath: /etc/sail-operator
                        name: operator-config
                        readOnly: true
                securityContext:
                  runAsNonRoot: true
                serviceAccountName: sail-operator
                terminationGracePeriodSeconds: 10
                volumes:
                  - downwardAPI:
                      defaultMode: 420
                      items:
                        - fieldRef:
                            fieldPath: metadata.annotations
                          path: config.properties
                    name: operator-config
