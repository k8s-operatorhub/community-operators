                    format: int32
                    minimum: 0
                    type: integer
                type: object
              ttlSecondsAfterFinished:
                format: int32
                minimum: 0
                type: integer
            required:
            - duration
            - exporterRef
            type: object
            x-kubernetes-validations:
            - message: exactly one of spec.selector or spec.podRefs must be set
              rule: '[has(self.selector), has(self.podRefs)].filter(x, x).size() ==
                1'
          status:
            description: PodTraceSessionStatus reflects the observed state of a PodTraceSession.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobs:
                items:
                  description: SessionJobRef describes a child Job created by the
                    session reconciler.
                  properties:
                    completed:
                      type: boolean
                    completionTime:
                      format: date-time
                      type: string
                    eventCount:
                      format: int64
                      type: integer
                    message:
                      type: string
                    name:
                      type: string
                    node:
                      type: string
                    startTime:
                      format: date-time
                      type: string
                  required:
                  - completed
                  - name
                  - node
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - node
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
              policy:
                description: |-
                  PolicyStatus is the operator-side view of the effective policy a
                  PodTrace imposes on the bundle.
                properties:
                  effectiveSampleRate:
                    format: int32
                    type: integer
                  filters:
                    items:
                      description: EventFilter enumerates the event categories podtrace
                        can capture.
                      enum:
                      - dns
                      - net
                      - fs
                      - cpu
                      - proc
                      type: string
                    type: array
                  generation:
                    format: int64
                    type: integer
                  hash:
                    type: string
                  thresholds:
                    description: Thresholds control anomaly detection on the agent
                      side.
                    properties:
                      errorRatePercent:
                        description: |-
                          ErrorRatePercent triggers issue detection when errors exceed this
                          percentage over the rolling window. 0-100.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      fsSlowMs:
                        description: |-
                          FSSlowMs triggers issue detection when a filesystem operation takes
                          longer than this value in milliseconds.
                        format: int32
                        minimum: 0
                        type: integer
                      rttSpikeMs:
                        description: |-
                          RTTSpikeMs triggers issue detection when network RTT exceeds this
                          value in milliseconds.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                type: object
              reportAttempts:
                format: int32
                type: integer
              reportFailureReason:
                description: |-
                  ReportFailureReason is the stable enum the operator stamps onto
                  status.reportFailureReason when an objectStore sidecar terminates
                  non-zero. Operators consume this for alerting and runbooks; the
                  free-text cause stays in conditions[type=ReportUploaded].message.
                enum:
                - InvalidURI
                - CredentialMissing
                - BucketNotFound
                - AccessDenied
                - NetworkTimeout
                - Unknown
                type: string
              reportLocation:
                type: string
              startTime:
                format: date-time
                type: string
              state:
                description: |-
                  SessionState represents the high-level lifecycle state of a
                  PodTraceSession.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
              summary:
                description: SessionSummary is a compact roll-up of what the session
                  observed.
                properties:
                  cpuEvents:
                    format: int64
                    type: integer
                  dnsEvents:
                    format: int64
                    type: integer
                  errorsDetected:
                    format: int32
                    type: integer
                  fsEvents:
                    format: int64
                    type: integer
                  netEvents:
                    format: int64
                    type: integer
                  procEvents:
                    format: int64
                    type: integer
                  totalEvents:
                    format: int64
                    type: integer
                required:
                - totalEvents
                type: object
              targetNamespaces:
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
