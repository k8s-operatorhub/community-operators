apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "camel.apache.org/v1alpha1",
          "kind": "CamelMonitor",
          "metadata": {
            "labels": {
              "app": "camel-monitor-operator"
            },
            "name": "example"
          },
          "spec": {}
        }
      ]
    capabilities: Full Lifecycle
    categories: Observability
    certified: "false"
    containerImage: quay.io/camel-tooling/camel-monitor-operator:0.2.1
    createdAt: "2026-06-03T08:01:40Z"
    description: Camel Monitor Operator is the monitoring tool for your Apache Camel
      applications running on cloud.
    operators.operatorframework.io/builder: operator-sdk-v1.30.0
    operators.operatorframework.io/internal-objects: '["camelmonitors.camel.apache.org"]'
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v2
    repository: https://github.com/camel-tooling/camel-monitor-operator
    support: Camel
  name: camel-monitor-operator.v0.2.1
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: CamelMonitor is the Schema for the CamelMonitor API
      displayName: CamelMonitor
      kind: CamelMonitor
      name: camelmonitors.camel.apache.org
      version: v1alpha1
  description: |
    Camel Monitor Operator is the monitoring tool for your Apache Camel applications running on cloud.
    ## Installation
    Proceed to the Camel Monitor operator installation via `Subscription` or via GUI.
    See official Camel Monitor operator documentation to learn how to configure all the available parameters.
    ## Monitoring an Apache Camel Application
    Run an Apache Camel application on the cluster (for example via Apache Camel K operator). Immediately you will be able to see a `CamelMonitor`:

    ```
    kubectl get camelmonitors -w

    NAME        INFO                        PHASE     REPLICAS   HEALTHY   MONITORED   MEMORY PRESSURE   CPU PRESSURE   EXCHANGE SLI   LAST EXCHANGE
    sample-it   Quarkus - 3.30.8 (4.16.0)   Running   1          True      True        False             False          Success        1s
    sample-it   Quarkus - 3.30.8 (4.16.0)   Paused    0          Unknown   Unknown                                      Success        61s
    ...
    ```
  displayName: Camel Monitor Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      deployments:
      - label:
          app: camel-monitor-operator
          app.kubernetes.io/component: operator
          app.kubernetes.io/name: camel-monitor
          app.kubernetes.io/version: 0.2.1
          camel.apache.org/component: operator
          name: camel-monitor-operator
        name: camel-monitor-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: camel-monitor-operator
              name: camel-monitor-operator
          strategy:
            type: Recreate
          template:
            metadata:
              labels:
                app: camel-monitor-operator
                app.kubernetes.io/component: operator
                app.kubernetes.io/name: camel-monitor
                app.kubernetes.io/version: 0.2.1
                camel.apache.org/component: operator
                name: camel-monitor-operator
            spec:
              containers:
              - command:
                - camel-monitor
                - operator
                env:
                - name: WATCH_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['olm.targetNamespaces']
                - name: OPERATOR_NAME
                  value: camel-monitor
                - name: OPERATOR_ID
                  value: camel-monitor
                - name: CREATE_PROMETHEUS_POD_MONITOR
                  value: "true"
                - name: CREATE_PROMETHEUS_RULE
                  value: "true"
                - name: CREATE_GRAFANA_DASHBOARD
                  value: "true"
                - name: GRAFANA_DS
                  value: prometheus
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                image: quay.io/camel-tooling/camel-monitor-operator:0.2.1
                imagePullPolicy: IfNotPresent
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 20
                  periodSeconds: 10
                name: camel-monitor-operator
                ports:
                - containerPort: 8080
                  name: metrics
                resources:
                  limits:
                    cpu: "1"
                    memory: 1Gi
                  requests:
                    cpu: 250m
                    memory: 256Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
              serviceAccountName: camel-monitor-operator
      permissions:
      - rules:
        - apiGroups:
          - camel.apache.org
          resources:
          - camelmonitors
          verbs:
          - create
          - get
          - list
          - patch
          - update
          - watch
          - delete
        - apiGroups:
          - camel.apache.org
          resources:
          - camelmonitors/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - apps
          resources:
          - deployments
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - batch
          resources:
          - cronjobs
          - jobs
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - ""
          resources:
          - pods
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - ""
          - events.k8s.io
          resources:
          - events
          verbs:
          - create
          - patch
          - get
          - list
          - watch
        - apiGroups:
          - grafana.integreatly.org
          resources:
          - grafanadashboards
          verbs:
          - create
          - get
          - list
          - update
          - watch
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - create
          - delete
          - deletecollection
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - camel.apache.org
          resources:
          - camelmonitors/finalizers
          verbs:
          - update
        - apiGroups:
          - monitoring.coreos.com
          resources:
          - podmonitors
          - prometheusrules
          verbs:
          - create
          - get
          - list
          - update
          - watch
        serviceAccountName: camel-monitor-operator
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - apache
  - camel
  - dashboard
  - kubernetes
  - monitoring
  - microservices
  - integration
  - observability
  labels:
    name: camel-monitor-operator
  links:
  - name: Camel Monitor operator source code repository
    url: https://github.com/camel-tooling/camel-monitor-operator
  maintainers:
  - email: pcongiusti@apache.org
    name: Pasquale Congiusti
  maturity: alpha
  provider:
    name: Camel Tooling team
  selector:
    matchLabels:
      name: camel-monitor-operator
  version: 0.2.1
