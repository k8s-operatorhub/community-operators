      deployments:
      - label:
          app.kubernetes.io/name: openshift-integration-operator
          app.kubernetes.io/part-of: integration-platform
          app.kubernetes.io/managed-by: olm
        name: openshift-integration-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: openshift-integration-operator
          template:
            metadata:
              labels:
                app.kubernetes.io/name: openshift-integration-operator
                app.kubernetes.io/part-of: integration-platform
                app.openshift.io/runtime: quarkus
            spec:
              serviceAccountName: openshift-integration-operator
              containers:
              - name: operator
                image: quay.io/maximilianopizarro/openshift-integration-operator:v0.4.1
                imagePullPolicy: Always
                ports:
                - containerPort: 8080
                  name: http
                  protocol: TCP
                - containerPort: 8443
                  name: https
                  protocol: TCP
                env:
                - name: KUBERNETES_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: QUARKUS_OPERATOR_SDK_CONTROLLERS_INTEGRATIONFLOWRECONCILER_NAMESPACES
                  valueFrom:
                    fieldRef:
                      fieldPath: "metadata.annotations['olm.targetNamespaces']"
                - name: QUARKUS_HTTP_SSL_PORT
                  value: "8443"
                - name: QUARKUS_HTTP_SSL_CERTIFICATE_FILES
                  value: /etc/tls/tls.crt
                - name: QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES
                  value: /etc/tls/tls.key
                - name: QUARKUS_HTTP_INSECURE_REQUESTS
                  value: enabled
                - name: PLATFORM_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: KAOTO_ENABLED
                  value: "true"
                - name: KAOTO_IMAGE
                  value: quay.io/kaotoio/kaoto-app:main
                - name: KAOTO_REPLICAS
                  value: "1"
                - name: OTEL_COLLECTOR_ENABLED
                  value: "true"
                - name: OTEL_COLLECTOR_IMAGE
                  value: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.109.0
                - name: OTEL_COLLECTOR_REPLICAS
                  value: "1"
                - name: QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT
                  value: http://integration-otel-collector:4317
                - name: GIT_PROVIDER
                  value: auto
                - name: TEKTON_ENABLED
                  value: "true"
                volumeMounts:
                - name: tls-certs
                  mountPath: /etc/tls
                  readOnly: true
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
                livenessProbe:
                  httpGet:
                    path: /q/health/live
                    port: http
                  initialDelaySeconds: 30
                  periodSeconds: 10
                readinessProbe:
                  httpGet:
                    path: /q/health/ready
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
              volumes:
              - name: tls-certs
                secret:
                  secretName: openshift-integration-operator-serving-cert
                  defaultMode: 420
                  optional: true
      - label:
          app: integration-console-plugin
          app.kubernetes.io/part-of: integration-platform
          app.kubernetes.io/managed-by: olm
        name: integration-console-plugin
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: integration-console-plugin
          template:
            metadata:
              labels:
                app: integration-console-plugin
                app.kubernetes.io/part-of: integration-platform
                app.openshift.io/runtime: golang
            spec:
              containers:
              - name: console-plugin
                image: quay.io/maximilianopizarro/integration-console-plugin:v0.4.1
                imagePullPolicy: Always
                ports:
                - containerPort: 9443
                  name: https
                  protocol: TCP
                volumeMounts:
                - name: plugin-serving-cert
                  readOnly: true
                  mountPath: /var/serving-cert
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 128Mi
              volumes:
              - name: plugin-serving-cert
                secret:
                  secretName: integration-console-plugin-cert
                  defaultMode: 420
                  optional: true
    strategy: deployment
