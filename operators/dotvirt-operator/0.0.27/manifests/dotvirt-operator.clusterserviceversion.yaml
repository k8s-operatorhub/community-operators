  description: |
    dotvirt is a vCenter-style web console for KubeVirt, built the GitOps way:
    every project is a git repository of VM manifests, every change ships as a
    pull request, ArgoCD applies what merges, and dotvirt reads live state back.

    The runtime owns nothing: API requests run under the caller's own Kubernetes
    token, and configuration reaches the cluster only by merging a PR. This
    operator is the install-time provisioner; one `Dotvirt` resource provisions
    the complete stack.

    ### What the operator installs

    - The dotvirt workload and its exposure: Route on OpenShift, Ingress on
      vanilla Kubernetes (auto-detected)
    - Read RBAC for the app and apply RBAC bound to the ArgoCD application
      controller
    - The ArgoCD AppProject tier (tenants + platform), the per-project
      ApplicationSet, and the platform Application
    - The platform git repository (bootstrapped on the forge), Argo repo
      credentials, and an org-level webhook for instant sync
    - Optionally a self-hosted Forgejo for evaluation (`forge.managed: true`)

    Each step records a status condition on the `Dotvirt` resource, so
    `kubectl describe dotvirt` explains a stuck install.

    ### What you get in the UI

    - VM inventory and detail views with live power, migrate, and snapshot
      actions
    - Every change staged as a reviewable pull request in the project's git
      repository
    - Per-object GitOps drift and sync status, with one-click resync
    - Host capacity and balance views with DRS-style predictive and automatic
      rebalancing
    - Network segments (UDN/CUDN), distributed firewall, and topology views
    - VM template library, storage overview, events, issues, and
      Prometheus-backed metrics

    ### Prerequisites

    - ArgoCD (OpenShift GitOps or community Argo CD) and KubeVirt (OpenShift
      Virtualization or upstream): hard prerequisites the operator waits for
      and reports on
    - OVN-Kubernetes, NMState, and CDI: optional, unlock the networking tier
      and image upload
    - A git forge with a Forgejo/Gitea API: bring your own, or set
      `forge.managed: true` for an evaluation Forgejo

    ### Getting started

    Create a `Dotvirt` resource in the operator's namespace, setting your
    ingress host and forge details (see the provided example). When the
    `Available` condition is `True`, open the configured host and sign in with
    a Kubernetes token (or OpenShift SSO if configured).
