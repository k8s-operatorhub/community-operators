  description: |
    # Valkey Operator

    The Valkey Operator manages [Valkey](https://valkey.io/) (a high-performance,
    BSD-3-licensed fork of Redis) instances on Kubernetes via Custom Resource
    Definitions.

    ## Features

    - **Standalone, Replication, and Cluster topologies** — three distinct CRDs
      (`Valkey`, `ValkeyCluster`) cover the operational range.
    - **Automated failover** — Replication mode detects primary `NotReady` for
      30s+ and promotes the replica with the largest `master_repl_offset`.
    - **Cluster bootstrap + slot migration** — 16384 slot assignment, online
      resharding (Auto / Manual policy), `CLUSTER MEET`/`CLUSTER REPLICATE`/
      `CLUSTER ADDSLOTS` orchestration.
    - **Backup / Restore** — RDB or AOF, PVC or external (S3/GCS/Azure) target,
      retention policy, point-in-time restore.
    - **Supply chain** — Cosign signed container images + SLSA L2 in-toto
      provenance attestation (ADR-0033). SBOM (SPDX-2.3) on every release.
    - **Security baseline** — Pod Security Standards Restricted, NetworkPolicy
      auto-creation, RBAC least-privilege, ReadOnlyRootFilesystem, non-root
      runAsUser. All toggleable via `v1alpha2.SecuritySpec.PodSecurityRestricted`
      and `NetworkPolicy.AutoCreate`.

    ## Documentation

    - GitHub: https://github.com/keiailab/valkey-operator
    - Helm Chart: https://artifacthub.io/packages/helm/keiailab-valkey-operator/valkey-operator
    - Discussions: https://github.com/keiailab/valkey-operator/discussions

    ## Prerequisites

    - Kubernetes 1.26+
    - Storage class for PVCs
    - (Optional) cert-manager for automatic TLS certificate management
    - (Optional) Prometheus Operator for `ServiceMonitor` scraping
