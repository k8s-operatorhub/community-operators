      mediatype: image/png
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: true
    - type: AllNamespaces
      supported: true
  install:
    strategy: deployment
    spec:
      deployments:
        - name: gko-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            template:
              metadata:
                annotations:
                  checksum/config: d6b9fa55133836dbc7c47dc4615fe2676741171ea5658e3b071a6a43e0655faf
                labels:
                  control-plane: controller-manager
              spec:
                securityContext:
                  runAsNonRoot: true
                containers:
                  - args: []
                    command:
                      - /manager
                    image: docker.io/graviteeio/kubernetes-operator:4.10.9
                    imagePullPolicy: IfNotPresent
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 50m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                    ports:
                      - containerPort: 8081
                        name: probes
                        protocol: TCP
                      - containerPort: 8080
                        name: metrics
                        protocol: TCP
                      - containerPort: 9443
                        name: webhook
                        protocol: TCP
                    env:
                      - name: ENABLE_LEADER_ELECTION
                        value: "true"
                      - name: RECONCILE_STRATEGY
                        value: onSpecChange
                      - name: LOGS_FORMAT
                        value: json
                      - name: LOGS_LEVEL
                        value: info
                      - name: LOGS_LEVEL_CASE
                        value: upper
                      - name: LOGS_TIMESTAMP_FIELD
                        value: timestamp
                      - name: LOGS_TIMESTAMP_FORMAT
                        value: epoch-second
                      - name: PROBES_PORT
                        value: "8081"
                      - name: ENABLE_METRICS
                        value: "true"
                      - name: METRICS_PORT
                        value: "8080"
                      - name: SECURE_METRICS
                        value: "true"
                      - name: ENABLE_INGRESS
                        value: "true"
                      - name: INGRESS_CLASSES
                        value: graviteeio
                      - name: HTTP_CLIENT_TIMEOUT_SECONDS
                        value: "5"
                      - name: ENABLE_WEBHOOK
                        value: "true"
                      - name: WEBHOOK_SERVICE_PORT
                        value: "9443"
                      - name: ENABLE_TEMPLATING
                        value: "true"
                      - name: NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.annotations['olm.targetNamespaces']
                hostNetwork: false
                serviceAccountName: gko-controller-manager
                terminationGracePeriodSeconds: 10
      clusterPermissions:
        - serviceAccountName: gko-controller-manager
          rules:
            - apiGroups:
                - admissionregistration.k8s.io
