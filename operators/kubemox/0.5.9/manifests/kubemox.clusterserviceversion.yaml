            },
            "name": "ubuntu-template",
            "node": "proxmox-node",
            "imageConfig": {
              "content": "iso",
              "filename": "ubuntu-22.04-server-cloudimg-amd64.img",
              "node": "proxmox-node",
              "storage": "local",
              "url": "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
            },
            "virtualMachineConfig": {
              "sockets": 1,
              "cores": 2,
              "memory": 2048,
              "network": {
                "model": "virtio",
                "bridge": "vmbr0"
              }
            }
          }
        },
        {
          "apiVersion": "proxmox.alperen.cloud/v1alpha1",
          "kind": "StorageDownloadURL",
          "metadata": {
            "name": "ubuntu-iso"
          },
          "spec": {
            "connectionRef": {
              "name": "proxmox-connection"
            },
            "content": "iso",
            "filename": "ubuntu-22.04-server-cloudimg-amd64.img",
            "node": "proxmox-node",
            "storage": "local",
            "url": "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
          }
        },
        {
          "apiVersion": "proxmox.alperen.cloud/v1alpha1",
          "kind": "CustomCertificate",
          "metadata": {
            "name": "proxmox-cert"
          },
          "spec": {
            "connectionRef": {
              "name": "proxmox-connection"
            },
            "nodeName": "proxmox-node",
            "certManagerSpec": {
              "commonName": "proxmox.example.com",
              "dnsNames": ["proxmox.example.com"],
              "issuerRef": {
                "group": "cert-manager.io",
                "kind": "ClusterIssuer",
                "name": "acme-issuer"
              },
              "secretName": "proxmox-tls",
              "usages": ["client auth", "server auth"]
            },
            "proxmoxCertSpec": {
              "nodeName": "proxmox-node",
              "force": true,
              "restartProxy": true
            }
          }
        }
      ]
