---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: workflows.forge.forgeplatform.io
spec:
  group: forge.forgeplatform.io
  names:
    categories:
    - forge
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    shortNames:
    - wf
    - workflow
    singular: workflow
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.forgeId
      name: Forge ID
      type: integer
    - jsonPath: .spec.organization
      name: Organization
      type: string
    - jsonPath: .status.nodeCount
      name: Nodes
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workflow is the Schema for the workflows API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              WorkflowSpec mirrors Forge `/api/v2/workflow_job_templates/` plus a
              declarative list of nodes that the controller reconciles to/from
              `/workflow_job_template_nodes/`.
            properties:
              allowSimultaneous:
                type: boolean
              askInventoryOnLaunch:
                type: boolean
              askLimitOnLaunch:
                type: boolean
              askVariablesOnLaunch:
                type: boolean
              description:
                type: string
              extraVars:
                description: Workflow-level extra_vars (YAML or JSON).
                type: string
              forgeInstance:
                description: Optional ForgeInstance reference (for multi-cluster).
                  Empty = default.
                type: string
              inventory:
                description: |-
                  Optional default inventory name. Each node can override via its
                  own job template.
                type: string
              name:
                description: Display name in Forge. Defaults to metadata.name.
                type: string
              nodes:
                description: Nodes is the DAG. Order is irrelevant — edges are by
                  identifier.
                items:
                  description: |-
                    WorkflowNode is one step in a workflow DAG. Each node references a
                    unified_job_template (typically a JobTemplate, possibly a nested
                    Workflow) and has three successor lists keyed by upstream outcome.
                  properties:
                    alwaysNodes:
                      description: Identifiers of nodes to run regardless of outcome.
                      items:
                        type: string
                      type: array
                    extraData:
                      description: Free-form YAML/JSON extra_data for this node (per-node
                        vars).
                      type: string
                    failureNodes:
                      description: Identifiers of nodes to run when this node fails.
                      items:
                        type: string
                      type: array
                    identifier:
                      description: |-
                        Identifier is unique within this workflow. Used for graph edges
                        (other nodes reference this node by identifier in their
                        success/failure/always lists).
                      type: string
                    successNodes:
                      description: Identifiers of nodes to run when this node finishes
                        successfully.
                      items:
                        type: string
                      type: array
                    unifiedJobTemplate:
                      description: |-
                        UnifiedJobTemplate is the name of a JobTemplate (preferred) or
                        nested WorkflowJobTemplate to invoke. The controller resolves
                        this to a numeric ID at reconcile.
                      type: string
                    unifiedJobTemplateKind:
                      default: job_template
                      description: |-
                        Kind of template ref. Default is "job_template". Set to
                        "workflow_job_template" for nested workflows.
                      enum:
                      - job_template
                      - workflow_job_template
                      type: string
                  required:
                  - identifier
                  - unifiedJobTemplate
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - identifier
                x-kubernetes-list-type: map
              organization:
                description: Owning organization (by name).
                type: string
            required:
            - organization
            type: object
          status:
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              forgeId:
                format: int64
                type: integer
              nodeCount:
                description: |-
                  Count of reconciled nodes (helps quickly check graph size from
                  `kubectl get`).
                format: int32
                type: integer
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
