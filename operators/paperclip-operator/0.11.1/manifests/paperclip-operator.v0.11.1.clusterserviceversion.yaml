  customresourcedefinitions:
    owned:
      - description: Instance is the Schema for the instances API.
        displayName: Paperclip Instance
        kind: Instance
        name: instances.paperclip.inc
        version: v1alpha1
  description: |
    ## Paperclip Operator

    The Paperclip Operator automates day 1 and day 2 lifecycle management
    for [Paperclip](https://paperclip.inc), the open-source AI agent
    orchestration platform for zero-human companies. Declare a single
    `Instance` custom resource and the operator provisions the full stack:
    PostgreSQL, Redis, persistent storage, ingress, network policies,
    autoscaling, and periodic backups.

    ### Quick start

    ```yaml
    apiVersion: paperclip.inc/v1alpha1
    kind: Instance
    metadata:
      name: my-paperclip
    spec:
      image:
        repository: ghcr.io/paperclipinc/paperclip
        # Pick a specific upstream release tag. The operator requires an
        # explicit tag or digest and will not fall back to :latest.
        tag: "2026.0403"
      deployment:
        mode: authenticated
      database:
        mode: managed
      storage:
        persistence:
          enabled: true
          size: 5Gi
    ```

    Apply the custom resource and the operator reconciles the workload
    into a healthy, production-ready state. Every managed resource
    (StatefulSet, Service, ConfigMap, Secret, NetworkPolicy, Ingress,
    HPA, PDB) is owned by the `Instance` and garbage-collected on delete.

    ### Capabilities

    **Deploy**

    * Managed PostgreSQL 17, provisioned and reconciled by the operator.
    * External PostgreSQL (connection string) and embedded (PGlite) modes.
    * Redis (managed or external) for rate limiting and cross-replica state.
    * Persistent storage with configurable storage class and size.
    * S3-compatible object storage (AWS S3, MinIO, R2) for multi-replica setups.

    **Expose**

    * ClusterIP service by default, Ingress for public deployments.
    * First-class WebSocket support for the Paperclip UI.
    * Configurable Ingress class, hosts, TLS, and annotations.

    **Secure**

    * NetworkPolicy with a deny-all baseline and selective allow rules.
    * Restricted Pod Security Standard: runAsNonRoot, drop ALL capabilities,
      seccomp RuntimeDefault, read-only root filesystem.
    * Encrypted secrets via a master key. API keys and OAuth credentials
      are injected from existing Kubernetes Secrets, never stored in the CR.

    **Observe**

    * Liveness, readiness, and startup probes against `/api/health`.
    * Prometheus metrics with an optional ServiceMonitor.
    * OpenTelemetry collector egress pre-allowed when enabled.
    * Status conditions and events for every reconcile.

    **Operate**

    * Horizontal pod autoscaling with CPU and memory targets.
    * Pod disruption budgets and configurable node selectors, tolerations,
      and affinity rules.
    * Periodic backups to S3-compatible storage, with restore-from-backup
      on first boot for disaster recovery.
    * Registry-polled auto-update: the operator resolves new digests for
      a pinned tag and rolls the workload safely, without human intervention.
    * Automatic leader-election of the heartbeat scheduler so exactly one
      replica runs it in multi-replica deployments.

    ### Upgrades

    The operator supports seamless upgrades across minor versions. CRDs
    are shipped as Helm templates or via OLM, so each release applies
    schema changes cleanly. Existing `Instance` resources continue to
    reconcile under the new operator version with no manual steps.

    ### Support and links

    * Website: [paperclip.inc](https://paperclip.inc)
    * App repository: [github.com/paperclipinc/paperclip](https://github.com/paperclipinc/paperclip)
    * Operator repository: [github.com/paperclipinc/paperclip-operator](https://github.com/paperclipinc/paperclip-operator)
    * Report an issue: [github.com/paperclipinc/paperclip-operator/issues](https://github.com/paperclipinc/paperclip-operator/issues)
    * Contact: contact@paperclip.inc
  displayName: Paperclip Operator
  icon:
    - base64data: ""
      mediatype: image/svg+xml
  install:
    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - paperclip.inc
              resources:
                - instances
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - paperclip.inc
              resources:
                - instances/status
              verbs:
                - get
                - update
                - patch
            - apiGroups:
                - paperclip.inc
              resources:
                - instances/finalizers
              verbs:
                - update
            - apiGroups:
                - apps
              resources:
                - statefulsets
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - services
                - configmaps
                - persistentvolumeclaims
                - serviceaccounts
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - secrets
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
            - apiGroups:
                - networking.k8s.io
              resources:
                - ingresses
                - networkpolicies
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
          serviceAccountName: paperclip-operator-controller-manager
      deployments:
        - label:
            app.kubernetes.io/name: paperclip-operator
            control-plane: controller-manager
          name: paperclip-operator-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            template:
              metadata:
                labels:
                  control-plane: controller-manager
              spec:
                containers:
                  - args:
                      - --health-probe-bind-address=:8081
                      - --metrics-bind-address=:8443
                      - --metrics-secure=true
                      - --leader-elect
                    image: ghcr.io/paperclipinc/paperclip-operator:v0.11.1
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 100m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: true
                      runAsNonRoot: true
                      seccompProfile:
                        type: RuntimeDefault
                securityContext:
                  runAsNonRoot: true
                serviceAccountName: paperclip-operator-controller-manager
                terminationGracePeriodSeconds: 10
    strategy: deployment
  installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
