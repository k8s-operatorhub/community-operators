                  Valkey replication / cluster 토폴로지 변경은 무시할 수 없는 부작용을 동반:
                  - Replication: full SYNC 트래픽 폭주
                  - Cluster: 16384 slot 재분배 (수십분~수시간), 그 동안 일부 키 일시적 MOVED 응답
                  Deliberate=true 가 명시되어야만 즉시 적용. 그 외에는 Status.PendingScale 에 기록.
                properties:
                  deliberate:
                    type: boolean
                type: object
              shards:
                default: 3
                description: shard (primary) 수. 기본 3. 최소 3 — Valkey Cluster 는 quorum
                  위해 3+ 필요.
                format: int32
                maximum: 100
                minimum: 3
                type: integer
              slotMigration:
                default: Auto
                description: SlotMigrationPolicy — slot 재분배 정책.
                enum:
                - Auto
                - Manual
                type: string
              storage:
                description: StorageSpec — Valkey 데이터 디렉터리(/data) 마운트용 PVC.
                properties:
                  dataDirPath:
                    default: /data
                    type: string
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 8Gi
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    type: string
                type: object
              tls:
                description: TLSSpec — Valkey TLS (cert-manager 연동 옵션).
                properties:
                  certManager:
                    properties:
                      duration:
                        default: 2160h
                        type: string
                      issuerRef:
                        properties:
                          kind:
                            default: ClusterIssuer
                            enum:
                            - Issuer
                            - ClusterIssuer
                            type: string
                          name:
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                      renewBefore:
                        default: 360h
                        type: string
                    required:
                    - issuerRef
                    type: object
                  clientAuth:
                    default: required
                    description: |-
                      ClientAuth 는 client certificate 검증 정책. valkey 의 tls-auth-clients
                      옵션과 1:1 매핑.
                        - required (default): tls-auth-clients=yes — mTLS 강제. 모든 client 가
                          valid client cert 제시 의무. operator 자체도 cert load.
                        - optional: tls-auth-clients=optional — client cert 제시하면 검증, 없으면
                          password-only auth 허용.
                        - disabled: tls-auth-clients=no — server-only TLS (cert 검증 안 함).
                          plaintext password 보호 + transit encryption 만 활성. 외부 client
                          마이그레이션 path (mTLS infrastructure 부재 시).
                    enum:
                    - required
                    - optional
                    - disabled
                    type: string
                  customCert:
                    properties:
                      secretName:
                        type: string
                    required:
                    - secretName
                    type: object
                  enabled:
                    type: boolean
                required:
                - enabled
                type: object
              version:
                description: ValkeyVersion 은 Valkey 컨테이너 이미지 / 버전 지정.
                properties:
                  image:
                    default: docker.io/valkey/valkey
                    type: string
                  imagePullPolicy:
                    description: PullPolicy describes a policy for if/when to pull
                      a container image
                    type: string
                  version:
                    default: 9.0.4
                    pattern: ^\d+\.\d+(\.\d+)?$
                    type: string
                required:
                - version
                type: object
            required:
            - replicasPerShard
            - shards
            - version
            type: object
          status:
            properties:
              assignedSlots:
                format: int32
                type: integer
              clusterInitialized:
                type: boolean
              clusterState:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              endpoint:
                type: string
              observedGeneration:
                format: int64
                type: integer
              pendingScale:
                properties:
                  currentReplicas:
                    format: int32
                    type: integer
                  desiredReplicas:
                    format: int32
                    type: integer
                  reason:
                    type: string
                  requestedAt:
                    type: string
                required:
                - currentReplicas
                - desiredReplicas
                type: object
              phase:
                description: ClusterPhase — Cluster 라이프사이클.
                enum:
                - Pending
                - Initializing
                - Running
                - Resharding
                - Failed
                - Upgrading
                type: string
              readyReplicas:
                format: int32
                type: integer
              shards:
                items:
                  properties:
                    assignedSlots:
                      format: int32
                      type: integer
                    index:
                      format: int32
                      type: integer
                    primaryPod:
                      type: string
                    replicaPods:
                      items:
                        type: string
                      type: array
                    slotRange:
                      type: string
                  required:
                  - assignedSlots
                  - index
                  type: object
                type: array
              version:
                type: string
            type: object
        type: object
    served: true
    storage: false
    subresources:
      status: {}
