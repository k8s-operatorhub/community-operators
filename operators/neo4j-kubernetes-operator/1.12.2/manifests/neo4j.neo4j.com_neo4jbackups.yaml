apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: neo4jbackups.neo4j.neo4j.com
spec:
  group: neo4j.neo4j.com
  names:
    kind: Neo4jBackup
    listKind: Neo4jBackupList
    plural: neo4jbackups
    singular: neo4jbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target.kind
      name: Target
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .status.lastRunTime
      name: LastRun
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          Neo4jBackup declaratively manages a Neo4j backup. The operator runs
          `neo4j-admin database backup` against the referenced cluster or
          standalone target, writes the backup to local PVC storage or to a
          supported cloud bucket (S3 / GCS / Azure Blob / MinIO), records the
          outcome on .status, and (optionally) enforces retention. Schedules
          are expressed via standard cron syntax. See also: Neo4jRestore.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Neo4jBackupSpec defines the desired state of Neo4jBackup
            properties:
              chainFromBackup:
                description: |-
                  ChainFromBackup names another Neo4jBackup CR in the same namespace
                  whose `<base>/<cr-name>/` directory this CR should write into INSTEAD
                  of its own. Use this to compose mixed-cadence backup workflows: a
                  daily FULL backup CR plus an hourly DIFF backup CR that chains off
                  the daily's artifacts. `neo4j-admin database backup --type=DIFF`
                  auto-detects the prior full/diff in the shared directory and chains
                  the new diff off it.

                  Constraints (enforced by the validator):
                    - Must reference a CR in the same namespace.
                    - Cannot self-reference (`chainFromBackup: <this-cr-name>` is
                      rejected).
                    - Target (cluster + database) must match the referenced CR.
                    - Storage backend (type + bucket/path) must match.

                  Runtime: the operator labels every backup Job with
                  `app.kubernetes.io/part-of: <chain-root-name>` and refuses to
                  submit a new Job while another Job sharing the same `part-of`
                  label is still active — prevents the daily FULL and hourly DIFF
                  from racing against the same artifact directory.

                  Empty (default): write to this CR's own per-name directory.
                type: string
              cloud:
                description: Cloud configuration for cloud storage
                properties:
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef is the name of a Kubernetes Secret containing
                      cloud provider credentials as environment variables. Optional when
                      using workload identity / IAM instance profiles.
                      For S3:    keys AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
                      For GCS:   key  GOOGLE_APPLICATION_CREDENTIALS_JSON (base64 service-account JSON)
                      For Azure: keys AZURE_STORAGE_ACCOUNT, AZURE_STORAGE_KEY
                    type: string
                  endpointURL:
                    description: |-
                      EndpointURL overrides the S3 API endpoint URL. Use this to target
                      S3-compatible stores such as MinIO, Ceph RGW, or Cloudflare R2.
                      Example: "http://minio.minio-ns.svc:9000"
                      Only applies to the "aws" provider; ignored for gcp and azure.
                    type: string
                  forcePathStyle:
                    description: |-
                      ForcePathStyle forces S3 path-style addressing, where the bucket name
                      appears in the URL path (e.g. http://endpoint/bucket/key) rather than
                      the subdomain (e.g. http://bucket.endpoint/key).
                      Required for MinIO and most self-hosted S3-compatible stores.
                      Only effective when EndpointURL is set.
                    type: boolean
                  identity:
                    description: |-
                      CloudIdentity defines cloud identity (IRSA / Workload Identity / Managed
                      Identity) configuration for backup/restore Job pods.
                    properties:
                      autoCreate:
                        description: AutoCreateSpec defines auto-creation of service
                          accounts
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            type: object
                          enabled:
                            default: true
                            description: |-
                              Enabled is RESERVED and currently a no-op (#220): the operator always
                              ensures the backup/restore ServiceAccount exists. Only Annotations is
                              honored — use it for IRSA ("eks.amazonaws.com/role-arn") or Workload
                              Identity ("iam.gke.io/gcp-service-account") bindings.
                            type: boolean
                        type: object
                      provider:
                        enum:
                        - aws
                        - gcp
                        - azure
                        type: string
                      serviceAccount:
                        description: |-
                          ServiceAccount is RESERVED and currently a no-op (#220): backup Jobs
                          always run as the operator-managed "neo4j-backup-sa" (restore Jobs:
                          "neo4j-restore-sa"). Bind your cloud IAM role via
                          autoCreate.annotations, which the operator applies to that SA.
                        type: string
                    required:
                    - provider
                    type: object
                  provider:
                    enum:
                    - aws
                    - gcp
                    - azure
                    type: string
                type: object
              options:
                description: Backup options
                properties:
                  additionalArgs:
                    description: Additional neo4j-admin backup arguments
                    items:
                      type: string
                    type: array
                  backupType:
                    default: AUTO
                    description: Backup type
                    enum:
                    - FULL
                    - DIFF
                    - AUTO
                    type: string
                  compress:
                    default: true
                    description: |-
                      Compress the backup (default: true).
                      Pointer, not plain bool: `bool` + `omitempty` + a kubebuilder default
                      silently re-applies the default when the user sets `false` (any spec
                      round-trip through the Go client — e.g. the finalizer-add Update —
                      drops the zero value and the API server re-defaults it), so the user
                      could never disable compression. Same invariant as
                      Neo4jShardedDatabase.IfNotExists (rule 66). Callers use
                      CompressEffective(), never dereference.
                    type: boolean
                  includeMetadata:
                    description: |-
                      IncludeMetadata controls which metadata (users, roles) is included in the backup.
                      Supported values: "all" (default), "none", "users", "roles".
                      Requires Neo4j 5.26+.
                    enum:
                    - all
                    - none
                    - users
                    - roles
                    type: string
                  keepFailed:
                    description: KeepFailed preserves failed backup artifacts for
                      debugging instead of deleting them.
                    type: boolean
                  pageCache:
                    description: Page cache size for backup operation (e.g., "4G")
                    pattern: ^[0-9]+[KMG]?$
                    type: string
                  parallelDownload:
                    description: Enable parallel download for remote backups
                    type: boolean
                  parallelRecovery:
                    description: ParallelRecovery enables multi-threaded transaction
                      application during backup.
                    type: boolean
                  preferDiffAsParent:
                    description: |-
                      PreferDiffAsParent instructs the backup to use the latest differential
                      backup as the parent instead of the latest full backup when creating a
                      differential backup. Requires CalVer 2025.04+.
                    type: boolean
                  remoteAddressResolution:
                    description: |-
                      Resolve remote addresses for backups via the cluster discovery service
                      (useful in multi-homed environments). When unset and target Kind is
                      ShardedDatabase on Neo4j 2025.09+, the operator defaults this to true to
                      match the canonical upstream sharded-backup invocation. Set explicitly to
                      override the default in either direction.
                    type: boolean
                  resources:
                    description: |-
                      Resources sets CPU/memory requests + limits on the backup Job's
                      container. When unset, the operator applies a Burstable default
                      (request 100m CPU / 512Mi memory, limit 1 CPU / 2Gi memory) sized
                      for empty/small databases and CI environments. Tune upward for
                      large production databases (rule of thumb: limit memory should
                      exceed the largest store file by ~30% to give `neo4j-admin`
                      breathing room during compaction).
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  skipRecovery:
                    description: Skip recovery step after backup (advanced; use when
                      recovery is handled separately)
                    type: boolean
                  tempPath:
                    description: |-
                      TempPath is a local directory for temporary files during the backup.
                      When TempStorage is configured, this is set automatically to the mount path.
                      Only set manually if you are mounting your own volume via other means.
                    type: string
                  tempStorage:
                    description: |-
                      TempStorage provisions a PVC for temporary staging files during cloud backups.
                      Without this, cloud backups stage to the container's ephemeral disk which may
                      be too small for large databases. The operator mounts this PVC and passes
                      --temp-path automatically.
                    properties:
                      size:
                        description: |-
                          Size of the temporary PVC (e.g., "50Gi"). Should be at least as large
                          as the expected backup/restore artifact.
                        pattern: ^[0-9]+(Ki|Mi|Gi|Ti)?$
                        type: string
                      storageClassName:
                        description: StorageClassName for the temporary PVC. If empty,
                          uses the cluster default.
                        type: string
                    required:
                    - size
                    type: object
                  validate:
                    description: |-
                      Validate runs `neo4j-admin backup validate` against the backup artifacts
                      after the backup itself succeeds, capturing per-shard recoverability
                      status into `BackupRun.Validation`. Opt-in because validate adds
                      ~10-60s of runtime depending on artifact size, and validate failures
                      are recorded but don't fail the Job (the backup itself already
                      succeeded). Pointer type so users explicitly opting in OR out
                      preserves their choice across Update round-trips.

                      When nil (default) or false: validate is not invoked; Validation
                      field stays empty.
                      When true: validate is appended to the backup command with `|| true`
                      (suppress non-zero exit so the Job stays Succeeded). The operator
                      parses validate's stdout into BackupRun.Validation.
                    type: boolean
                  verify:
                    description: |-
                      Verify is RESERVED and currently a no-op (#220) — it is accepted for
                      backward compatibility but the operator does not read it. For real
                      artifact verification use options.validate, which runs
                      `neo4j-admin backup validate` and records the result in
                      status.history[].validation.
                    type: boolean
                type: object
              retention:
                description: Retention policy for backup cleanup
                properties:
                  deletePolicy:
                    default: Delete
                    description: |-
                      Delete policy for expired backups. Only "Delete" is implemented;
                      "Archive" is RESERVED and currently behaves as a no-op (#220) — no
                      archival logic exists. Accepted for backward compatibility.
                    enum:
                    - Delete
                    - Archive
                    type: string
                  maxAge:
                    description: Maximum age of backups to keep
                    type: string
                  maxCount:
                    description: Maximum number of backups to keep
                    format: int32
                    type: integer
                type: object
              schedule:
                description: Schedule for automated backups (cron format)
                type: string
              storage:
                description: Storage defines where to store the backup
                properties:
                  bucket:
                    type: string
                  cloud:
                    description: Cloud provider configuration
                    properties:
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef is the name of a Kubernetes Secret containing
                          cloud provider credentials as environment variables. Optional when
                          using workload identity / IAM instance profiles.
                          For S3:    keys AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
                          For GCS:   key  GOOGLE_APPLICATION_CREDENTIALS_JSON (base64 service-account JSON)
                          For Azure: keys AZURE_STORAGE_ACCOUNT, AZURE_STORAGE_KEY
                        type: string
                      endpointURL:
                        description: |-
                          EndpointURL overrides the S3 API endpoint URL. Use this to target
                          S3-compatible stores such as MinIO, Ceph RGW, or Cloudflare R2.
                          Example: "http://minio.minio-ns.svc:9000"
                          Only applies to the "aws" provider; ignored for gcp and azure.
                        type: string
                      forcePathStyle:
                        description: |-
                          ForcePathStyle forces S3 path-style addressing, where the bucket name
                          appears in the URL path (e.g. http://endpoint/bucket/key) rather than
                          the subdomain (e.g. http://bucket.endpoint/key).
                          Required for MinIO and most self-hosted S3-compatible stores.
                          Only effective when EndpointURL is set.
                        type: boolean
                      identity:
                        description: |-
                          CloudIdentity defines cloud identity (IRSA / Workload Identity / Managed
                          Identity) configuration for backup/restore Job pods.
                        properties:
                          autoCreate:
                            description: AutoCreateSpec defines auto-creation of service
                              accounts
                            properties:
                              annotations:
                                additionalProperties:
                                  type: string
                                type: object
                              enabled:
                                default: true
                                description: |-
                                  Enabled is RESERVED and currently a no-op (#220): the operator always
                                  ensures the backup/restore ServiceAccount exists. Only Annotations is
                                  honored — use it for IRSA ("eks.amazonaws.com/role-arn") or Workload
                                  Identity ("iam.gke.io/gcp-service-account") bindings.
                                type: boolean
                            type: object
                          provider:
                            enum:
                            - aws
                            - gcp
                            - azure
                            type: string
                          serviceAccount:
                            description: |-
                              ServiceAccount is RESERVED and currently a no-op (#220): backup Jobs
                              always run as the operator-managed "neo4j-backup-sa" (restore Jobs:
                              "neo4j-restore-sa"). Bind your cloud IAM role via
                              autoCreate.annotations, which the operator applies to that SA.
                            type: string
                        required:
                        - provider
                        type: object
                      provider:
                        enum:
                        - aws
                        - gcp
                        - azure
                        type: string
                    type: object
                  path:
                    type: string
                  pvc:
                    description: PVC configuration
                    properties:
                      name:
                        description: Name of the PVC to use (for referencing existing
                          PVCs)
                        type: string
                      size:
                        type: string
                      storageClassName:
                        type: string
                    type: object
                  type:
                    enum:
                    - s3
                    - gcs
                    - azure
                    - pvc
                    type: string
                required:
                - type
                type: object
              suspend:
                description: Suspend the backup schedule
                type: boolean
              target:
                description: Target defines what to backup
                properties:
                  clusterRef:
                    description: |-
                      ClusterRef is the name of the Neo4jEnterpriseCluster (or Neo4jEnterpriseStandalone)
                      that owns the database. Required when Kind=Database or Kind=ShardedDatabase;
                      unused when Kind=Cluster.
                    type: string
                  kind:
                    enum:
                    - Cluster
                    - Database
                    - ShardedDatabase
                    type: string
                  name:
                    description: |-
                      Name of the target resource. For Kind=ShardedDatabase, this is the
                      Neo4jShardedDatabase CR (metadata) name; the operator resolves the logical
                      sharded-database name from that CR's spec.name and backs up all shards
                      (e.g. products-g000, products-p000, …) in one neo4j-admin invocation via a
                      glob. The CR name and spec.name often differ.
                    type: string
                  namespace:
                    description: Namespace of the target resource (defaults to backup
                      namespace)
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - storage
            - target
            type: object
          status:
            description: Neo4jBackupStatus defines the observed state of Neo4jBackup
            properties:
              conditions:
                description: Conditions represent the current state of the backup
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              history:
                description: History of recent backup runs
                items:
                  description: BackupRun represents a single backup execution
                  properties:
                    artifactFilename:
                      description: |-
                        ArtifactFilename is the filename of the `.backup` artifact produced
                        by this standard-DB run (e.g. "neo4j-2026-06-08T01-18-06.backup").
                        Populated by parsing the Job's Pod log after completion. Empty when
                        the operator couldn't fetch logs or the pattern didn't match.

                        Used by the cluster PVC-restore path: the operator builds a
                        per-restore HTTP proxy URL of the form
                          http://<proxy>:8080/<backupsPath>/<artifactFilename>
                        which is passed as seedURI to dbms.recreateDatabase /
                        CREATE DATABASE OPTIONS{seedURI}. Sharded backups populate
                        per-shard equivalents in ShardArtifacts[].Filename instead.
                      type: string
                    backupsPath:
                      description: |-
                        BackupsPath is the shared per-CR directory (relative to
                        spec.storage.path) where this run wrote its `.backup` artifact.
                        SAME VALUE FOR EVERY RUN OF ONE CR — all runs accumulate in this
                        directory so neo4j-admin can chain differential backups off the
                        prior full. Use the RunID field for per-run identity.
                      type: string
                    completionTime:
                      description: Completion time of the backup run
                      format: date-time
                      type: string
                    error:
                      description: Error message if the backup failed
                      type: string
                    runID:
                      description: |-
                        RunID uniquely identifies this backup execution. Populated from the
                        backing Job's name (e.g. "my-backup-backup" for a one-shot run,
                        "my-backup-cron-1737028800" for a scheduled child) so a history entry
                        is human-readable and maps directly to the Job found via
                        `kubectl get jobs` — the same value the backup Pod sees as
                        BACKUP_RUN_ID. Unique per run: one-shot Jobs are created once per CR;
                        CronJob children carry a Unix-second suffix.
                      type: string
                    shardArtifacts:
                      description: |-
                        ShardArtifacts records the per-shard `.backup` files produced by a
                        sharded backup run (target.kind=ShardedDatabase). Populated by the
                        backup controller after parsing the trailing `ls -la` output appended
                        to the backup command. Empty for non-sharded runs.
                      items:
                        description: ShardArtifact identifies one `.backup` file produced
                          by a sharded backup.
                        properties:
                          filename:
                            description: |-
                              Filename is the on-disk filename as written by neo4j-admin (e.g.
                              "products-g000-2025-06-11T21-04-42.backup").
                            type: string
                          shardName:
                            description: |-
                              ShardName is the per-shard database name (e.g. "products-g000",
                              "products-p000"). Derived by stripping the timestamp suffix from the
                              neo4j-admin output filename.
                            type: string
                          size:
                            description: |-
                              Size is the artifact size in bytes as reported by `ls -la`. Zero if
                              not parseable. Use `humanize.IBytes` or equivalent on the consumer
                              side for display.
                            format: int64
                            type: integer
                        required:
                        - shardName
                        type: object
                      type: array
                    startTime:
                      description: Start time of the backup run
                      format: date-time
                      type: string
                    stats:
                      description: Statistics for this backup run
                      properties:
                        duration:
                          description: Duration of the backup
                          type: string
                        fileCount:
                          description: Number of files in the backup
                          format: int32
                          type: integer
                        size:
                          description: Size of the backup
                          type: string
                        throughput:
                          description: Throughput of the backup
                          type: string
                      type: object
                    status:
                      description: Status of the backup run
                      type: string
                    validation:
                      description: |-
                        Validation captures the per-shard outcome of an optional
                        `neo4j-admin backup validate` step run after the backup completes.
                        Populated only when the operator was able to run validate and parse
                        its output (sharded backups on a Neo4j version that exposes the
                        validate subcommand). Absent on older versions or non-sharded runs.
                      properties:
                        overallStatus:
                          description: |-
                            OverallStatus is "OK" if every shard's chain is recoverable to the
                            same transaction or higher; "Degraded" if any shard is ahead/behind
                            beyond the lenient consistency window; "Unknown" if the validate step
                            failed or its output couldn't be parsed.
                          enum:
                          - OK
                          - Degraded
                          - Unknown
                          type: string
                        perShard:
                          description: PerShard holds the validate command's status
                            report for each shard.
                          items:
                            description: ShardValidationStatus is one row of validate
                              output.
                            properties:
                              message:
                                type: string
                              shardName:
                                type: string
                              status:
                                description: Status is one of OK / Ahead / Behind
                                  / Unknown.
                                enum:
                                - OK
                                - Ahead
                                - Behind
                                - Unknown
                                type: string
                            required:
                            - shardName
                            type: object
                          type: array
                        rawOutput:
                          description: |-
                            RawOutput is the truncated stdout of `neo4j-admin backup validate`,
                            kept for operator debugging when the parser couldn't classify a
                            per-shard line. Capped at 2 KiB; longer outputs are truncated with a
                            "…(truncated)" marker.
                          type: string
                      type: object
                  required:
                  - startTime
                  - status
                  type: object
                type: array
              lastRunTime:
                description: LastRunTime shows when the last backup was started
                format: date-time
                type: string
              lastSuccessTime:
                description: LastSuccessTime shows when the last successful backup
                  completed
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
              nextRunTime:
                description: NextRunTime shows when the next backup is scheduled
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation most recently
                  observed by the controller
                format: int64
                type: integer
              phase:
                description: Phase represents the current phase of the backup
                type: string
              stats:
                description: Backup statistics
                properties:
                  duration:
                    description: Duration of the backup
                    type: string
                  fileCount:
                    description: Number of files in the backup
                    format: int32
                    type: integer
