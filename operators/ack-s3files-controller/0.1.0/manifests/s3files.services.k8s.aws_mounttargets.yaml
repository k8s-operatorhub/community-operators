                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              availabilityZoneID:
                description: |-
                  The unique and consistent identifier of the Availability Zone where the mount
                  target is located. For example, use1-az1 is an Availability Zone ID for the
                  us-east-1 Amazon Web Services Region, and it has the same location in every
                  Amazon Web Services account.
                type: string
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              id:
                description: |-
                  The ID of the mount target, assigned by S3 Files. This ID is used to reference
                  the mount target in subsequent API calls.

                  Regex Pattern: `^fsmt-[0-9a-f]{17,40}$`
                type: string
              networkInterfaceID:
                description: |-
                  The ID of the network interface that S3 Files created when it created the
                  mount target. This network interface is managed by the service.
                type: string
              ownerID:
                description: |-
                  The Amazon Web Services account ID of the mount target owner.

                  Regex Pattern: `^(\d{12})|(\d{4}-{4}-\d{4})$`
                type: string
              status:
                description: |-
                  The lifecycle state of the mount target. Valid values are: AVAILABLE (the
                  mount target is available for use), CREATING (the mount target is being created),
                  DELETING (the mount target is being deleted), DELETED (the mount target has
                  been deleted), or ERROR (the mount target is in an error state), or UPDATING
                  (the mount target is being updated).
                type: string
              statusMessage:
                description: |-
                  Additional information about the mount target status. This field provides
                  more details when the status is ERROR, or during state transitions.
                type: string
              vpcID:
                description: The ID of the VPC where the mount target is located.
                type: string
            type: object
        type: object
