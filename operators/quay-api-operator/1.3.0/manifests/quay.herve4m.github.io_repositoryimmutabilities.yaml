            description: Spec defines the desired state of RepositoryImmutability
            properties:
              behavior:
                description: Specify the behavior of the matching pattern. If 'matching_immutable',
                  then tags that match the pattern are immutable. If 'not_matching_immutable',
                  then all the tags not matching the pattern are immutable. 'matching_immutable'
