apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runtimeprofiles.security.nextguard.io
  labels:
    app: nextguard-operator
spec:
  group: security.nextguard.io
  scope: Namespaced
  names:
    kind: RuntimeProfile
    plural: runtimeprofiles
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: RuntimeProfile defines runtime security profiles for Falco
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - tenantNamespace
            - action
            properties:
              tenantNamespace:
                type: string
              syscallRules:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    syscalls:
                      type: array
                      items:
                        type: string
                    containers:
                      type: array
                      items:
                        type: string
                    condition:
                      type: string
              fimRules:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    paths:
                      type: array
                      items:
                        type: string
                    readOnly:
                      type: boolean
              networkRules:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    direction:
                      type: string
                    ports:
                      type: array
                      items:
                        type: integer
                    protocols:
                      type: array
                      items:
                        type: string
              action:
                type: string
                enum:
                - ALERT_ONLY
                - KILL_PROCESS
                - ISOLATE_POD
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
              lastSyncedAt:
                type: string
                format: date-time
              syncId:
                type: string
              rulesCount:
                type: integer
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Action
      type: string
      jsonPath: .spec.action
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
