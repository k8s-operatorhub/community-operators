  group: kairos.maximilianopizarro.github.io
  names:
    kind: KairosAgent
    listKind: KairosAgentList
    plural: kairosagents
    singular: kairosagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
