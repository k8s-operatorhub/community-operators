    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PodTraceSession is a bounded, diagnose-mode trace. Running a session
          creates one privileged Job per node hosting a matched pod, each invoking
          `podtrace --diagnose <duration>` against the local subset.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PodTraceSessionSpec defines a bounded diagnose-mode trace. The operator
              reconciles this into one privileged Job per node hosting matched pods.
              The CEL one-of mirrors PodTraceSpec: without it, installs that disable
              the validating webhook (the chart default) accepted sessions with no
              target selection at all, or with conflicting ones.
            properties:
              containerName:
                type: string
              duration:
                type: string
              exporterRef:
                description: LocalObjectReference references an object in the same
                  namespace as the referent.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              filters:
                items:
                  description: EventFilter enumerates the event categories podtrace
                    can capture.
                  enum:
                  - dns
                  - net
                  - fs
                  - cpu
                  - proc
                  type: string
                type: array
              namespaceSelector:
                description: |-
                  A label selector is a label query over a set of resources. The result of matchLabels and
                  matchExpressions are ANDed. An empty label selector matches all objects. A null
                  label selector matches no objects.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              podRefs:
                items:
                  description: PodRef references a specific pod by namespace/name.
                  properties:
                    name:
                      description: Name is the name of the pod.
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the pod. If empty, defaults to the
                        namespace of the owning CR (for namespaced CRs).
                      type: string
                  required:
                  - name
                  type: object
                type: array
              reportRef:
                description: |-
                  ReportReference describes where a session's diagnose report is persisted.
                  Exactly one sink should be set.
                properties:
                  configMap:
                    description: |-
                      ConfigMap in the same namespace as the session. The operator will
                      create/update it with the report payload. Use this sink for small
                      reports; ConfigMaps are capped at 1MiB of data by etcd.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  objectStore:
                    description: |-
                      ObjectStore uploads the report to a cloud bucket (s3, gs, azblob).
                      Use this sink for reports that may exceed the 1MiB ConfigMap/Secret
                      limit. Requires the session pod to be on a Kubernetes 1.29+ cluster
                      so the native sidecar restartPolicy is honoured.
                    properties:
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef names a Secret in the session's namespace
                          whose keys the uploader reads.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      uri:
                        description: |-
                          URI of the destination. Three schemes:

                            s3://bucket/key-or-prefix
                            gs://bucket/key-or-prefix
                            azblob://account/container/key-or-prefix

                          A trailing slash means "prefix mode" — the uploader appends a
                          per-session filename (<pod-name>-<rfc3339>.txt) and an additional
                          <key>.summary.json object. Without a trailing slash, the URI's
                          path is used verbatim as the object key.
                        type: string
                    required:
                    - uri
                    type: object
                  secret:
                    description: |-
                      Secret in the same namespace as the session. Prefer this sink when the
                      report may contain sensitive hostnames/paths/payloads.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              samplePercent:
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              selector:
                description: |-
                  A label selector is a label query over a set of resources. The result of matchLabels and
                  matchExpressions are ANDed. An empty label selector matches all objects. A null
                  label selector matches no objects.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              thresholds:
                description: Thresholds control anomaly detection on the agent side.
                properties:
                  errorRatePercent:
                    description: |-
                      ErrorRatePercent triggers issue detection when errors exceed this
                      percentage over the rolling window. 0-100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  fsSlowMs:
                    description: |-
                      FSSlowMs triggers issue detection when a filesystem operation takes
