---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
    helm.sh/resource-policy: {{ ternary "keep" "delete" .Values.crds.keep }}
  name: podtracesessions.podtrace.io
spec:
  group: podtrace.io
  names:
    categories:
    - podtrace
    kind: PodTraceSession
    listKind: PodTraceSessionList
    plural: podtracesessions
    shortNames:
    - pts
    singular: podtracesession
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.duration
      name: Duration
      type: string
    - jsonPath: .spec.exporterRef.name
      name: Exporter
      type: string
    - jsonPath: .status.summary.totalEvents
      name: Events
