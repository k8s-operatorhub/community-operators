  description: |
    The LiteLLM Operator is a Kubernetes operator for deploying and managing
    production-ready [LiteLLM](https://www.litellm.ai/) AI Gateway instances.

    Built with [Operator SDK](https://sdk.operatorframework.io/) for OLM integration,
    OperatorHub distribution, and first-class OpenShift support.

    ## Features

    - **Declarative LiteLLM deployment** — manage proxy instances, organizations, models, teams, users, customers, credentials, guardrails, and virtual keys as Kubernetes custom resources
    - **Bidirectional config sync** — reconciles CRD state with the LiteLLM REST API on every sync interval
    - **Team member management** — three modes: CRD authoritative, SSO authoritative, and mixed
    - **VirtualKey secret management** — generated API keys stored in Kubernetes Secrets with owner references
    - **Reusable credentials** — `LiteLLMCredential` CRs produce a shared `credential_list` referenced by any model, with API keys injected from Secrets as env vars
    - **Content moderation** — `LiteLLMGuardrail` CRs configure Aporia, Lakera, Bedrock, Presidio, and other guardrail providers with per-key and per-team opt-in
    - **Customer / end-user billing** — `LiteLLMCustomer` CRs manage external end-user budgets, rate limits, and model access for multi-tenant applications
    - **Organization hierarchy** — `LiteLLMOrganization` groups teams under a shared budget and rate limit envelope
    - **SSO/SCIM support** — configure Azure Entra ID, Okta, Google, or generic OIDC providers declaratively
    - **Production-ready** — HPA, PDB, NetworkPolicy, health checks, resource limits, security contexts, ServiceMonitor, PrometheusRule, Grafana dashboard

    ## Prerequisites

    - Kubernetes v1.28+
    - A PostgreSQL database for LiteLLM state storage (connection string provided via a Secret)
    - (Optional) Redis for caching and rate limiting
    - (Optional) An OIDC provider for SSO (Azure Entra ID, Okta, Google, or generic OIDC)
