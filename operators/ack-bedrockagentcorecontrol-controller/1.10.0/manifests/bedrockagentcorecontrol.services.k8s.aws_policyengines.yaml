                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  partition:
                    description: Partition is the AWS partition in which the resource
                      exists or will exist
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              createdAt:
                description: The timestamp when the policy engine was originally created.
                format: date-time
                type: string
              id:
                description: |-
                  The unique identifier for the created policy engine. This system-generated
                  identifier consists of the user name plus a 10-character generated suffix
                  and is used for all subsequent policy engine operations.

                  Regex Pattern: `^[A-Za-z][A-Za-z0-9_]*-[a-z0-9_]{10}$`
                type: string
              status:
                description: |-
                  The current status of the policy engine. A status of ACTIVE indicates the
                  policy engine is ready for use.
                type: string
              statusReasons:
                description: |-
                  Additional information about the policy engine status. This provides details
                  about any failures or the current state of the policy engine.
                items:
                  type: string
                type: array
              updatedAt:
                description: |-
                  The timestamp when the policy engine was last modified. This tracks the most
                  recent changes to the policy engine configuration.
                format: date-time
                type: string
            type: object
        type: object
