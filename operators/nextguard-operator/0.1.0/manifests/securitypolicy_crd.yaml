apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securitypolicies.security.nextguard.io
  labels:
    app: nextguard-operator
spec:
  group: security.nextguard.io
  scope: Namespaced
  names:
    kind: SecurityPolicy
    plural: securitypolicies
    shortNames:
    - secpol
    - secpols
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: SecurityPolicy is a network security policy for pods
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            description: SecurityPolicySpec defines the desired state
            required:
            - tenantNamespace
            - policyType
            properties:
              tenantNamespace:
                type: string
                description: Target namespace where the NetworkPolicy will be created
              policyType:
                type: string
                description: "Type of policy: Ingress, Egress, or Both"
              podSelector:
                type: object
                description: Labels to select pods this policy applies to
                x-kubernetes-preserve-unknown-fields: true
                additionalProperties:
                  type: string
              ingressRules:
                type: array
                description: Ingress traffic rules
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    from:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        properties:
                          podSelector:
                            type: object
                            additionalProperties:
                              type: string
                          namespaceSelector:
                            type: object
                            additionalProperties:
                              type: string
                          ipBlock:
                            type: object
                            properties:
                              cidr:
                                type: string
                              except:
                                type: array
                                items:
                                  type: string
                    ports:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        properties:
                          protocol:
                            type: string
                          port:
                            type: string
              egressRules:
                type: array
                description: Egress traffic rules
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  properties:
                    to:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        properties:
                          podSelector:
                            type: object
                            additionalProperties:
                              type: string
                          namespaceSelector:
                            type: object
                            additionalProperties:
                              type: string
                          ipBlock:
                            type: object
                            properties:
                              cidr:
                                type: string
                              except:
                                type: array
                                items:
                                  type: string
                    ports:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        properties:
                          protocol:
                            type: string
                          port:
                            type: string
              dryRun:
                type: boolean
                description: If true, generate YAML without applying to cluster
              priority:
                type: integer
                description: Policy priority (lower = higher priority)
          status:
            type: object
            description: SecurityPolicyStatus defines the observed state
            x-kubernetes-preserve-unknown-fields: true
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Applied
                - Failed
                - DryRun
                - Updated
              message:
                type: string
              lastSyncedAt:
                type: string
                format: date-time
              generatedYAML:
                type: string
              syncId:
                type: string
              observedGeneration:
                type: integer
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Namespace
      type: string
      jsonPath: .spec.tenantNamespace
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
