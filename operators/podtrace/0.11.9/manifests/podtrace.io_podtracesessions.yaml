---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
    helm.sh/resource-policy: keep
  name: podtracesessions.podtrace.io
spec:
  group: podtrace.io
  names:
    categories:
    - podtrace
    kind: PodTraceSession
    listKind: PodTraceSessionList
    plural: podtracesessions
    shortNames:
    - pts
    singular: podtracesession
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.duration
      name: Duration
      type: string
    - jsonPath: .spec.exporterRef.name
      name: Exporter
      type: string
    - jsonPath: .status.summary.totalEvents
      name: Events
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PodTraceSession is a bounded, diagnose-mode trace. Running a session
          creates one privileged Job per node hosting a matched pod, each invoking
          `podtrace --diagnose <duration>` against the local subset.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PodTraceSessionSpec defines a bounded diagnose-mode trace. The operator
              reconciles this into one privileged Job per node hosting matched pods.
            properties:
              containerName:
                description: ContainerName restricts tracing to a specific container.
                type: string
              duration:
                description: |-
                  Duration is the total wall-clock time the session should run. Required.
                  Format: Go duration, e.g. "30s", "5m". Maximum is enforced by the
                  operator against TracerConfig.spec.session.maxDuration.
                type: string
              exporterRef:
                description: ExporterRef names an ExporterConfig in the same namespace.
                  Required.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              filters:
                description: Filters restricts the event categories captured. When
                  empty, all are captured.
                items:
                  description: EventFilter enumerates the event categories podtrace
                    can capture.
                  enum:
                  - dns
                  - net
                  - fs
                  - cpu
                  - proc
                  type: string
                type: array
              namespaceSelector:
                description: |-
                  NamespaceSelector scopes the Selector across namespaces. When unset
                  the selector is evaluated within the session's own namespace only.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              podRefs:
                description: PodRefs explicitly enumerates target pods.
                items:
                  description: PodRef references a specific pod by namespace/name.
                  properties:
                    name:
                      description: Name is the name of the pod.
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the pod. If empty, defaults to the
                        namespace of the owning CR (for namespaced CRs).
                      type: string
                  required:
                  - name
                  type: object
                type: array
              reportRef:
                description: |-
                  ReportRef points at where the diagnose report summary should be persisted.
                  If unset, only the exporter receives events and the session status
                  retains a small inline summary.
                properties:
                  configMap:
                    description: |-
                      ConfigMap in the same namespace as the session. The operator will
                      create/update it with the report payload. Use this sink for small
                      reports; ConfigMaps are capped at 1MiB of data by etcd.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  objectStore:
                    description: |-
                      ObjectStore uploads the report to a cloud bucket (s3, gs, az). Use
                      this sink for reports that may exceed the 1MiB ConfigMap/Secret
                      limit. Rejected by the validating webhook in v1alpha1 — the
                      schema is reserved so clients can adopt it without a CRD bump
                      later.
                    properties:
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef names a Secret in the session's namespace
                          whose keys the uploader reads (e.g. "access_key_id",
                          "secret_access_key"). Implementation-specific — interpretation is
                          left to the CLI uploader.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      uri:
                        description: URI of the destination, e.g. "s3://bucket/path/"
                          or "gs://bucket/path/".
                        type: string
                    required:
                    - uri
                    type: object
                  secret:
                    description: |-
                      Secret in the same namespace as the session. Prefer this sink when the
                      report may contain sensitive hostnames/paths/payloads.
                    properties:
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              samplePercent:
                description: SamplePercent sets the sampling rate for exported traces,
                  0-100.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              selector:
                description: Selector picks target pods by label. Mutually exclusive
                  with PodRefs.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              thresholds:
                description: Thresholds override the session's default anomaly-detection
                  settings.
                properties:
                  errorRatePercent:
                    description: |-
                      ErrorRatePercent triggers issue detection when errors exceed this
                      percentage over the rolling window. 0-100.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  fsSlowMs:
                    description: |-
                      FSSlowMs triggers issue detection when a filesystem operation takes
                      longer than this value in milliseconds.
                    format: int32
                    minimum: 0
                    type: integer
                  rttSpikeMs:
                    description: |-
                      RTTSpikeMs triggers issue detection when network RTT exceeds this
                      value in milliseconds.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              ttlSecondsAfterFinished:
                description: |-
                  TTLSecondsAfterFinished cleans up the session resource after completion.
                  If unset, the operator default applies.
                format: int32
                minimum: 0
                type: integer
            required:
            - duration
            - exporterRef
            type: object
          status:
            description: PodTraceSessionStatus reflects the observed state of a PodTraceSession.
            properties:
              completionTime:
                description: CompletionTime is set when all child Jobs have finished.
                format: date-time
                type: string
              conditions:
                description: Conditions is the latest available observations of session
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              jobs:
                description: Jobs lists the per-node Job children managed by this
                  session.
                items:
                  description: SessionJobRef describes a child Job created by the
                    session reconciler.
                  properties:
                    completed:
                      description: Completed indicates whether the Job has finished
                        (success or failure).
                      type: boolean
                    completionTime:
                      description: CompletionTime of the Job's pod, if finished.
                      format: date-time
                      type: string
                    eventCount:
                      description: EventCount is the number of events this Job's tracer
                        reported.
                      format: int64
                      type: integer
                    message:
                      description: Message carries Job-level error text when Completed
                        is true and the Job failed.
                      type: string
                    name:
                      description: Name of the Job resource.
                      type: string
                    node:
                      description: Node the Job is pinned to. Unique within the array.
                      type: string
                    startTime:
                      description: StartTime of the Job's pod.
                      format: date-time
                      type: string
                  required:
                  - completed
                  - name
                  - node
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - node
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this session.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level state of the session.
                enum:
                - Pending
                - Running
                - Completed
                - Failed
                type: string
              startTime:
                description: StartTime is set when the first child Job enters Running.
                format: date-time
                type: string
              summary:
                description: Summary is a compact per-category event roll-up for this
                  session.
                properties:
                  cpuEvents:
                    format: int64
                    type: integer
                  dnsEvents:
                    format: int64
                    type: integer
                  errorsDetected:
                    format: int32
                    type: integer
                  fsEvents:
                    format: int64
                    type: integer
                  netEvents:
                    format: int64
                    type: integer
                  procEvents:
                    format: int64
                    type: integer
                  totalEvents:
                    format: int64
                    type: integer
                required:
                - totalEvents
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
