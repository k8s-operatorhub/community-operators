    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ValkeyRestore — 기존 backup (PVC 또는 외부 target) 에서 RDB 를 복원.
          ADR-0015 (Init Container 패턴 + STS template patch + 원복).
