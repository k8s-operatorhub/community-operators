    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - apiextensions.k8s.io
              resources:
                - customresourcedefinitions
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - proxmox.alperen.cloud
              resources:
                - containers
                - customcertificates
                - managedvirtualmachines
                - proxmoxconnections
                - storagedownloadurls
                - virtualmachines
                - virtualmachinesets
                - virtualmachinesnapshotpolicies
                - virtualmachinesnapshots
                - virtualmachinetemplates
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - proxmox.alperen.cloud
              resources:
                - containers/finalizers
                - customcertificates/finalizers
                - managedvirtualmachines/finalizers
                - proxmoxconnections/finalizers
                - storagedownloadurls/finalizers
                - virtualmachines/finalizers
                - virtualmachinesets/finalizers
                - virtualmachinesnapshotpolicies/finalizers
                - virtualmachinesnapshots/finalizers
                - virtualmachinetemplates/finalizers
              verbs:
                - update
            - apiGroups:
                - proxmox.alperen.cloud
              resources:
                - containers/status
                - customcertificates/status
                - managedvirtualmachines/status
                - proxmoxconnections/status
                - storagedownloadurls/status
                - virtualmachines/status
                - virtualmachinesets/status
                - virtualmachinesnapshotpolicies/status
                - virtualmachinesnapshots/status
                - virtualmachinetemplates/status
              verbs:
                - get
                - patch
                - update
          serviceAccountName: kubemox-controller-manager
      permissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - coordination.k8s.io
              resources:
                - leases
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
          serviceAccountName: kubemox-controller-manager
      deployments:
        - label:
            app.kubernetes.io/component: manager
            app.kubernetes.io/created-by: kubemox
            app.kubernetes.io/instance: controller-manager
            app.kubernetes.io/managed-by: kustomize
            app.kubernetes.io/name: deployment
            app.kubernetes.io/part-of: kubemox
            control-plane: controller-manager
          name: kubemox-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            strategy: {}
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  control-plane: controller-manager
              spec:
                containers:
                  - args:
                      - --leader-elect
                    image: docker.io/alperencelik/kubemox:v0.5.9
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 128Mi
                      requests:
                        cpu: 10m
                        memory: 64Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                securityContext:
                  runAsNonRoot: true
                serviceAccountName: kubemox-controller-manager
                terminationGracePeriodSeconds: 10
    strategy: deployment
