apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: applications.emrserverless.services.k8s.aws
spec:
  group: emrserverless.services.k8s.aws
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Application is the Schema for the Applications API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ApplicationSpec defines the desired state of Application.

              Information about an application. Amazon EMR Serverless uses applications
              to run jobs.
            properties:
              architecture:
                description: The CPU architecture of an application.
                type: string
              autoStartConfiguration:
                description: The configuration for an application to automatically
                  start on job submission.
                properties:
                  enabled:
                    type: boolean
                type: object
              autoStopConfiguration:
                description: |-
                  The configuration for an application to automatically stop after a certain
                  amount of time being idle.
                properties:
                  enabled:
                    type: boolean
                  idleTimeoutMinutes:
                    format: int64
                    type: integer
                type: object
              diskEncryptionConfiguration:
                description: The configuration object that allows encrypting local
                  disks.
                properties:
                  encryptionContext:
                    additionalProperties:
                      type: string
                    type: object
                  encryptionKeyARN:
                    type: string
                  encryptionKeyRef:
                    description: Reference field for EncryptionKeyARN
                    properties:
                      from:
                        description: |-
                          AWSResourceReference provides all the values necessary to reference another
                          k8s resource for finding the identifier(Id/ARN/Name)
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                        type: object
                    type: object
                type: object
              identityCenterConfiguration:
                description: |-
                  The IAM Identity Center Configuration accepts the Identity Center instance
                  parameter required to enable trusted identity propagation. This configuration
                  allows identity propagation between integrated services and the Identity
                  Center instance.
                properties:
                  identityCenterInstanceARN:
                    type: string
                  userBackgroundSessionsEnabled:
                    type: boolean
                type: object
              imageConfiguration:
                description: |-
                  The image configuration for all worker types. You can either set this parameter
                  or imageConfiguration for each worker type in workerTypeSpecifications.
                properties:
                  imageURI:
                    type: string
                type: object
              initialCapacity:
                additionalProperties:
                  description: The initial capacity configuration per worker.
                  properties:
                    workerConfiguration:
                      description: |-
                        The cumulative configuration requirements for every worker instance of the
                        worker type.
                      properties:
                        cpu:
                          type: string
                        disk:
                          type: string
                        diskType:
                          type: string
                        memory:
                          type: string
                      type: object
                    workerCount:
                      format: int64
                      type: integer
                  type: object
                description: The capacity to initialize when the application is created.
                type: object
              interactiveConfiguration:
                description: |-
                  The interactive configuration object that enables the interactive use cases
                  to use when running an application.
                properties:
                  livyEndpointEnabled:
                    type: boolean
                  studioEnabled:
                    type: boolean
                type: object
              jobLevelCostAllocationConfiguration:
                description: The configuration object that enables job level cost
                  allocation.
                properties:
                  enabled:
                    type: boolean
                type: object
              maximumCapacity:
                description: |-
                  The maximum capacity to allocate when the application is created. This is
                  cumulative across all workers at any given point in time, not just when an
                  application is created. No new resources will be created once any one of
                  the defined limits is hit.
                properties:
                  cpu:
                    type: string
                  disk:
                    type: string
                  memory:
                    type: string
                type: object
              monitoringConfiguration:
                description: The configuration setting for monitoring.
                properties:
                  cloudWatchLoggingConfiguration:
                    description: |-
                      The Amazon CloudWatch configuration for monitoring logs. You can configure
                      your jobs to send log information to CloudWatch.
                    properties:
                      enabled:
                        type: boolean
                      encryptionKeyARN:
                        type: string
                      encryptionKeyRef:
                        description: Reference field for EncryptionKeyARN
                        properties:
                          from:
                            description: |-
                              AWSResourceReference provides all the values necessary to reference another
                              k8s resource for finding the identifier(Id/ARN/Name)
                            properties:
                              name:
                                type: string
                              namespace:
                                type: string
                            type: object
                        type: object
                      logGroupName:
                        type: string
                      logStreamNamePrefix:
                        type: string
                      logTypes:
                        additionalProperties:
                          items:
                            type: string
                          type: array
                        type: object
                    type: object
                  managedPersistenceMonitoringConfiguration:
                    description: The managed log persistence configuration for a job
                      run.
                    properties:
                      enabled:
                        type: boolean
                      encryptionKeyARN:
                        type: string
                      encryptionKeyRef:
                        description: Reference field for EncryptionKeyARN
                        properties:
                          from:
                            description: |-
                              AWSResourceReference provides all the values necessary to reference another
                              k8s resource for finding the identifier(Id/ARN/Name)
                            properties:
                              name:
                                type: string
                              namespace:
                                type: string
                            type: object
                        type: object
                    type: object
                  prometheusMonitoringConfiguration:
                    description: |-
                      The monitoring configuration object you can configure to send metrics to
                      Amazon Managed Service for Prometheus for a job run.
                    properties:
                      remoteWriteURL:
                        type: string
                    type: object
                  s3MonitoringConfiguration:
                    description: |-
                      The Amazon S3 configuration for monitoring log publishing. You can configure
                      your jobs to send log information to Amazon S3.
                    properties:
                      encryptionKeyARN:
                        type: string
                      encryptionKeyRef:
                        description: Reference field for EncryptionKeyARN
                        properties:
                          from:
                            description: |-
                              AWSResourceReference provides all the values necessary to reference another
                              k8s resource for finding the identifier(Id/ARN/Name)
                            properties:
                              name:
                                type: string
                              namespace:
                                type: string
                            type: object
                        type: object
                      logURI:
                        type: string
                    type: object
                type: object
              name:
                description: |-
                  The name of the application.

                  Regex Pattern: `^[A-Za-z0-9._/#-]+$`
                type: string
              networkConfiguration:
                description: The network configuration for customer VPC connectivity.
                properties:
                  securityGroupIDs:
                    items:
                      type: string
                    type: array
                  securityGroupRefs:
                    description: Reference field for SecurityGroupIDs
                    items:
                      description: "AWSResourceReferenceWrapper provides a wrapper
                        around *AWSResourceReference\ntype to provide more user friendly
                        syntax for references using 'from' field\nEx:\nAPIIDRef:\n\n\tfrom:\n\t
                        \ name: my-api"
                      properties:
                        from:
                          description: |-
                            AWSResourceReference provides all the values necessary to reference another
                            k8s resource for finding the identifier(Id/ARN/Name)
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                          type: object
                      type: object
                    type: array
                  subnetIDs:
                    items:
                      type: string
                    type: array
                  subnetRefs:
                    description: Reference field for SubnetIDs
                    items:
                      description: "AWSResourceReferenceWrapper provides a wrapper
                        around *AWSResourceReference\ntype to provide more user friendly
                        syntax for references using 'from' field\nEx:\nAPIIDRef:\n\n\tfrom:\n\t
                        \ name: my-api"
                      properties:
                        from:
                          description: |-
                            AWSResourceReference provides all the values necessary to reference another
                            k8s resource for finding the identifier(Id/ARN/Name)
                          properties:
                            name:
                              type: string
                            namespace:
                              type: string
                          type: object
                      type: object
                    type: array
                type: object
              releaseLabel:
                description: |-
                  The Amazon EMR release associated with the application.

                  Regex Pattern: `^[A-Za-z0-9._/-]+$`
                type: string
              runtimeConfiguration:
                description: |-
                  The Configuration (https://docs.aws.amazon.com/emr-serverless/latest/APIReference/API_Configuration.html)
                  specifications to use when creating an application. Each configuration consists
                  of a classification and properties. This configuration is applied to all
                  the job runs submitted under the application.
                items:
                  description: |-
                    A configuration specification to be used when provisioning an application.
                    A configuration consists of a classification, properties, and optional nested
                    configurations. A classification refers to an application-specific configuration
                    file. Properties are the settings you want to change in that file.
                  properties:
                    classification:
                      type: string
                    properties:
                      additionalProperties:
                        type: string
                      type: object
                  type: object
                type: array
              schedulerConfiguration:
                description: |-
                  The scheduler configuration for batch and streaming jobs running on this
                  application. Supported with release labels emr-7.0.0 and above.
                properties:
                  maxConcurrentRuns:
                    format: int64
                    type: integer
                  queueTimeoutMinutes:
                    format: int64
                    type: integer
                type: object
              tags:
                additionalProperties:
                  type: string
                description: The tags assigned to the application.
                type: object
              type:
                description: The type of application you want to start, such as Spark
                  or Hive.
                type: string
              workerTypeSpecifications:
                additionalProperties:
                  description: The specifications for a worker type.
                  properties:
                    imageConfiguration:
                      description: The applied image configuration.
                      properties:
                        imageURI:
                          type: string
                        resolvedImageDigest:
                          type: string
                      type: object
                  type: object
                description: The specification applied to each worker type.
                type: object
            required:
            - releaseLabel
            - type
            type: object
          status:
            description: ApplicationStatus defines the observed state of Application
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              createdAt:
                description: The date and time when the application run was created.
                format: date-time
                type: string
              id:
                description: |-
                  The output contains the application ID.

                  Regex Pattern: `^[0-9a-z]+$`
                type: string
              identityCenterApplicationARN:
                description: |-
                  The ARN of the EMR Serverless created IAM Identity Center Application that
                  provides trusted-identity propagation.

                  Regex Pattern: `^arn:(aws[a-zA-Z0-9-]*):sso::\d{12}:application/(sso)?ins-[a-zA-Z0-9-.]{16}/apl-[a-zA-Z0-9]{16}$`
                type: string
              resolvedImageDigest:
                description: |-
                  The SHA256 digest of the image URI. This indicates which specific image the
                  application is configured for. The image digest doesn't exist until an application
                  has started.

                  Regex Pattern: `^sha256:[0-9a-f]{64}$`
                type: string
              state:
                description: The state of the application.
                type: string
              stateDetails:
                description: |-
                  The state details of the application.

                  Regex Pattern: `.*\S.*`
                type: string
              updatedAt:
                description: The date and time when the application run was last updated.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
