---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
    helm.sh/resource-policy: keep
  name: exporterconfigs.podtrace.io
spec:
  group: podtrace.io
  names:
    categories:
    - podtrace
    kind: ExporterConfig
    listKind: ExporterConfigList
    plural: exporterconfigs
    shortNames:
    - ec
    singular: exporterconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.referencedBy
      name: Refs
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ExporterConfig is a reusable trace exporter configuration referenced by
          PodTrace and PodTraceSession. It decouples endpoint/credential management
          from trace intent.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ExporterConfigSpec configures a reusable trace exporter.
              Exactly one of the typed fields (OTLP, Jaeger, Zipkin, Splunk, DataDog)
              must be populated, and it must match the Type field.
            properties:
              datadog:
                description: DataDogExporter configures the DataDog exporter.
                properties:
                  apiKeySecretRef:
                    description: |-
                      APIKeySecretRef references the DataDog API key in a Secret in the
                      same namespace as the ExporterConfig.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  site:
                    description: Site, e.g. "datadoghq.com" or "datadoghq.eu". Defaults
                      to datadoghq.com.
                    type: string
                required:
                - apiKeySecretRef
                type: object
              jaeger:
                description: JaegerExporter configures the Jaeger exporter.
                properties:
                  endpoint:
                    description: Endpoint, e.g. "http://jaeger-collector.observability:14268/api/traces".
                    type: string
                required:
                - endpoint
                type: object
              otlp:
                description: OTLPExporter configures the OpenTelemetry OTLP exporter.
                properties:
                  endpoint:
                    description: Endpoint of the OTLP receiver, e.g. "otel-collector.observability:4318".
                    type: string
                  headers:
                    description: |-
                      Headers to attach to every export request. Secret-backed headers use
                      the HeadersFromSecret field.
                    items:
                      description: OTLPHeader is a single literal or secret-backed
                        OTLP header.
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          description: SecretKeySelector selects a key from a Secret
                            in the same namespace.
                          properties:
                            key:
                              type: string
                            name:
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  headersFromSecret:
                    description: |-
                      HeadersFromSecret pulls additional headers from a Secret in the same
                      namespace. Each key in the secret becomes a header; values are used verbatim.
                    properties:
                      name:
                        type: string
                    required:
                    - name
                    type: object
                  insecure:
                    description: Insecure disables TLS. Do not use in production.
                    type: boolean
                  protocol:
                    description: Protocol selects http or grpc. Defaults to http.
                    enum:
                    - http
                    - grpc
                    type: string
                required:
                - endpoint
                type: object
              samplePercent:
                description: |-
                  SamplePercent sets an exporter-level sampling rate cap, 0-100.
                  If both this and the referent trace's SamplePercent are set, the minimum applies.
                format: int32
                maximum: 100
                minimum: 0
                type: integer
              splunk:
                description: SplunkExporter configures the Splunk HEC exporter.
                properties:
                  endpoint:
                    description: Endpoint of the Splunk HEC receiver.
                    type: string
                  tokenSecretRef:
                    description: |-
                      TokenSecretRef references the Splunk HEC token in a Secret in the
                      same namespace as the ExporterConfig.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - endpoint
                - tokenSecretRef
                type: object
              type:
                description: Type selects the exporter implementation.
                enum:
                - otlp
                - jaeger
                - zipkin
                - splunk
                - datadog
                type: string
              zipkin:
                description: ZipkinExporter configures the Zipkin exporter.
                properties:
                  endpoint:
                    description: Endpoint, e.g. "http://zipkin.observability:9411/api/v2/spans".
                    type: string
                required:
                - endpoint
                type: object
            required:
            - type
            type: object
          status:
            description: ExporterConfigStatus reports the observed state of an ExporterConfig.
            properties:
              conditions:
                description: Conditions is the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed.
                format: int64
                type: integer
              ready:
                description: Ready is true when referenced Secrets exist and credentials
                  validate.
                type: boolean
              referencedBy:
                description: ReferencedBy counts how many PodTraces and PodTraceSessions
                  reference this exporter.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
