---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: projects.forge.forgeplatform.io
spec:
  group: forge.forgeplatform.io
  names:
    categories:
    - forge
    kind: Project
    listKind: ProjectList
    plural: projects
    shortNames:
    - prj
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.forgeId
      name: Forge ID
      type: integer
    - jsonPath: .spec.scmType
      name: SCM
      type: string
    - jsonPath: .spec.scmUrl
      name: URL
      priority: 1
      type: string
    - jsonPath: .spec.scmBranch
      name: Branch
      priority: 1
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the Schema for the projects API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ProjectSpec mirrors a subset of Forge `/api/v2/projects/`.
              SCM credential (if any) is referenced by name and resolved at reconcile.
            properties:
              allowOverride:
                type: boolean
              defaultEnvironment:
                description: Default Execution Environment name. Empty = global default.
                type: string
              description:
                type: string
              forgeInstance:
                description: Optional ForgeInstance reference (for multi-cluster).
                  Empty = default.
                type: string
              name:
                description: Display name in Forge. Defaults to metadata.name.
                type: string
              organization:
                description: Forge organization name. Required.
                type: string
              scmBranch:
                description: Branch / revision / tag.
                type: string
              scmClean:
                type: boolean
              scmCredential:
                description: SCM credential name (looked up in Forge). Empty = public/no
                  auth.
                type: string
              scmDeleteOnUpdate:
                type: boolean
              scmRefspec:
                description: Refspec (git only). Useful for fetching PR refs.
                type: string
              scmType:
                default: git
                description: SCM type. "manual" means a pre-populated project directory
                  on disk.
                enum:
                - git
                - hg
                - svn
                - insights
                - archive
                - manual
                type: string
              scmUpdateCacheTimeout:
                description: SCM update cache TTL in seconds (Forge default 0 = always
                  update).
                format: int32
                minimum: 0
                type: integer
              scmUpdateOnLaunch:
                type: boolean
              scmUrl:
                description: Repository URL. Required for non-manual SCM types.
                type: string
              timeout:
                description: Timeout in seconds for SCM update (0 = Forge default).
                format: int32
                minimum: 0
                type: integer
            required:
            - organization
            type: object
          status:
            description: ProjectStatus reflects observed state in Forge.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              forgeId:
                format: int64
                type: integer
              observedGeneration:
                format: int64
                type: integer
              scmRevision:
                description: Last SCM update status reported by Forge (successful
                  / failed / never).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
