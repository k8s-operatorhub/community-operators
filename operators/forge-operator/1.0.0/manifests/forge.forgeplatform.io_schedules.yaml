  names:
    categories:
    - forge
    kind: Schedule
    listKind: ScheduleList
    plural: schedules
    shortNames:
    - sch
    singular: schedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.forgeId
      name: Forge ID
      type: integer
    - jsonPath: .spec.jobTemplate
      name: JobTemplate
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.nextRun
      name: Next Run
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Schedule is the Schema for the schedules API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ScheduleSpec defines the desired state of a Forge Schedule.

              Forge schedules attach to a "unified job template" (JobTemplate or
              WorkflowJobTemplate). MVP supports only JobTemplate references.
            properties:
              description:
                type: string
              enabled:
                default: true
                description: Whether the schedule is active. Defaults to true.
                type: boolean
              extraData:
                description: |-
                  Free-form YAML/JSON passed as extra_data overrides at launch
                  time. Same shape as JobTemplate.spec.extraVars.
                type: string
              jobTemplate:
                description: |-
                  JobTemplate is the name of the JobTemplate (Forge entity) this
                  schedule fires. Operator resolves it to a numeric ID.
                type: string
              name:
                type: string
              rrule:
                description: |-
                  RRule is an RFC 5545 recurrence rule. Examples:
                    "DTSTART;TZID=America/New_York:20260101T090000 RRULE:FREQ=DAILY;INTERVAL=1"
                    "DTSTART:20260101T000000Z RRULE:FREQ=WEEKLY;BYDAY=MO,WE,FR"
                type: string
            required:
            - jobTemplate
            - rrule
            type: object
          status:
            description: ScheduleStatus reflects the observed Forge state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              forgeId:
                format: int64
                type: integer
              jobTemplateId:
                description: JobTemplateID is the resolved Forge ID of the referenced
                  JT.
                format: int64
                type: integer
              nextRun:
                description: NextRun is the next scheduled execution time as reported
                  by Forge.
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
