apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMCredential",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "azure-east"
          },
          "spec": {
            "apiBase": "https://azure-east.openai.azure.com",
            "apiKeySecretRef": {
              "key": "AZURE_API_KEY",
              "name": "azure-credentials"
            },
            "apiVersion": "2024-02-01",
            "credentialName": "azure-east",
            "instanceRef": {
              "name": "litellminstance-sample"
            }
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMCredential",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "openai-prod"
          },
          "spec": {
            "apiBase": "https://api.openai.com/v1",
            "apiKeySecretRef": {
              "key": "OPENAI_API_KEY",
              "name": "openai-credentials"
            },
            "credentialName": "openai-prod",
            "instanceRef": {
              "name": "litellminstance-sample"
            }
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMCustomer",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "sample-customer"
          },
          "spec": {
            "alias": "Acme End-User",
            "budgetDuration": "30d",
            "customerId": "customer-42",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "maxBudget": 100,
            "metadata": {
              "source": "crm",
              "tier": "premium"
            },
            "models": [
              "gpt-4o",
              "claude-4-sonnet"
            ],
            "rpmLimit": 500,
            "tpmLimit": 50000
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMGuardrail",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "bedrock-pii"
          },
          "spec": {
            "apiKeySecretRef": {
              "key": "AWS_SECRET_ACCESS_KEY",
              "name": "aws-credentials"
            },
            "guardrailName": "bedrock-pii",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "mode": "post_call",
            "params": {
              "aws_region_name": "us-east-1",
              "guardrailIdentifier": "abc123",
              "guardrailVersion": "DRAFT"
            },
            "provider": "bedrock"
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMGuardrail",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "pii-detector"
          },
          "spec": {
            "apiBase": "https://gr-prd-dc.aporia.com",
            "apiKeySecretRef": {
              "key": "APORIA_API_KEY",
              "name": "aporia-credentials"
            },
            "defaultOn": false,
            "guardrailName": "pii-detector",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "mode": "pre_call",
            "provider": "aporia"
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMGuardrail",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "presidio-redact"
          },
          "spec": {
            "guardrailName": "presidio-redact",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "mode": "pre_call",
            "params": {
              "presidio_analyzer_api_base": "http://presidio-analyzer.guardrails.svc.cluster.local:3000",
              "presidio_anonymizer_api_base": "http://presidio-anonymizer.guardrails.svc.cluster.local:3000"
            },
            "provider": "presidio"
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMInstance",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "litellminstance-sample"
          },
          "spec": {
            "database": {
              "external": {
                "connectionSecretRef": {
                  "key": "DATABASE_URL",
                  "name": "litellm-db-credentials"
                }
              }
            },
            "generalSettings": {
              "alerting": [
                "slack"
              ],
              "masterKeyRequired": true
            },
            "image": {
              "pullPolicy": "IfNotPresent",
              "repository": "ghcr.io/berriai/litellm",
              "tag": "main-v1.60.0"
            },
            "masterKey": {
              "autoGenerate": true
            },
            "redis": {
              "external": {
                "connectionSecretRef": {
                  "key": "REDIS_URL",
                  "name": "litellm-redis-credentials"
                }
              }
            },
            "replicas": 2,
            "resources": {
              "limits": {
                "cpu": "1",
                "memory": "512Mi"
              },
              "requests": {
                "cpu": "250m",
                "memory": "256Mi"
              }
            },
            "service": {
              "port": 4000,
              "type": "ClusterIP"
            }
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMModel",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "claude-sonnet"
          },
          "spec": {
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "litellmParams": {
              "apiKeySecretRef": {
                "key": "ANTHROPIC_API_KEY",
                "name": "anthropic-credentials"
              },
              "model": "anthropic/claude-sonnet-4-20250514",
              "rpm": 300,
              "timeout": 120,
              "tpm": 80000
            },
            "modelInfo": {
              "maxTokens": 200000
            },
            "modelName": "claude-4-sonnet"
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMModel",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "gpt4o"
          },
          "spec": {
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "litellmParams": {
              "apiKeySecretRef": {
                "key": "OPENAI_API_KEY",
                "name": "openai-credentials"
              },
              "model": "openai/gpt-4o",
              "rpm": 500,
              "timeout": 60,
              "tpm": 100000
            },
            "modelInfo": {
              "maxTokens": 128000
            },
            "modelName": "gpt-4o"
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMOrganization",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "acme-corp"
          },
          "spec": {
            "budgetDuration": "30d",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "maxBudget": 5000,
            "members": [
              {
                "email": "admin@acme.com",
                "role": "org_admin"
              },
              {
                "email": "user@acme.com",
                "role": "internal_user"
              }
            ],
            "models": [
              "gpt-4o",
              "claude-4-sonnet"
            ],
            "organizationAlias": "acme-corp",
            "rpmLimit": 1000,
            "tpmLimit": 200000
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMTeam",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "engineering"
          },
          "spec": {
            "budgetDuration": "30d",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "maxBudgetMonthly": 1000,
            "memberManagement": "mixed",
            "members": [
              {
                "email": "lead@example.com",
                "role": "admin"
              },
              {
                "email": "dev1@example.com",
                "role": "user"
              },
              {
                "email": "dev2@example.com",
                "role": "user"
              }
            ],
            "models": [
              "gpt-4o",
              "claude-4-sonnet"
            ],
            "rpmLimit": 200,
            "teamAlias": "engineering",
            "tpmLimit": 50000
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMUser",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "service-bot"
          },
          "spec": {
            "budgetDuration": "30d",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "maxBudget": 500,
            "models": [
              "gpt-4o"
            ],
            "teams": [
              {
                "role": "user",
                "teamRef": {
                  "name": "engineering"
                }
              }
            ],
            "userEmail": "service-bot@example.com",
            "userId": "service-bot@example.com",
            "userRole": "internal_user"
          }
        },
        {
          "apiVersion": "litellm.palena.ai/v1alpha1",
          "kind": "LiteLLMVirtualKey",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "litellm-operator"
            },
            "name": "engineering-ci-key"
          },
          "spec": {
            "budgetDuration": "30d",
            "instanceRef": {
              "name": "litellminstance-sample"
            },
            "keyAlias": "engineering-ci-key",
            "keySecretName": "engineering-ci-api-key",
            "maxBudget": "100",
            "models": [
              "gpt-4o"
            ],
            "rpmLimit": 60,
            "teamRef": {
              "name": "engineering"
            }
          }
        }
      ]
    capabilities: Deep Insights
    categories: AI/Machine Learning
    containerImage: ghcr.io/palenaai/litellm-operator:v0.11.3
    createdAt: "2026-04-17T14:29:07Z"
    description: Kubernetes operator for deploying and managing production-ready LiteLLM
      AI Gateway instances.
    operators.operatorframework.io/builder: operator-sdk-v1.42.1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/PalenaAI/litellm-operator
    support: bitkaio LLC
  name: litellm-operator.v0.11.3
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: LiteLLMCredential is the Schema for the litellmcredentials API
        — reusable provider credentials rendered into the proxy config.
      displayName: LiteLLM Credential
      kind: LiteLLMCredential
      name: litellmcredentials.litellm.palena.ai
      resources:
      - kind: ConfigMap
        name: ""
        version: v1
      - kind: Deployment
        name: ""
        version: apps/v1
      - kind: Secret
        name: ""
        version: v1
      specDescriptors:
      - displayName: API Base
        path: apiBase
      - displayName: API Key Secret Ref
        path: apiKeySecretRef
      - displayName: API Version
        path: apiVersion
      - displayName: Credential Name
        path: credentialName
      - displayName: Instance Ref
        path: instanceRef
      - displayName: Params
        path: params
      version: v1alpha1
    - description: |-
        LiteLLMCustomer is the Schema for the litellmcustomers API.
        A Customer represents an external end-user of the AI gateway with its own
        spending, rate, and access policies.
      displayName: LiteLLM Customer
      kind: LiteLLMCustomer
      name: litellmcustomers.litellm.palena.ai
      resources:
      - kind: LiteLLMInstance
        name: ""
        version: v1alpha1
      specDescriptors:
      - description: Human-readable alias for the customer.
        displayName: Alias
        path: alias
      - description: List of models this customer is allowed to access.
        displayName: Allowed Model Region
        path: allowedModelRegion
      - description: Whether the customer is blocked from making requests.
        displayName: Blocked
        path: blocked
      - description: Budget reset duration (e.g., "1d", "7d", "30d").
        displayName: Budget Duration
        path: budgetDuration
      - description: |-
          Reference to a predefined budget tier by budget_id.
          Mutually exclusive with MaxBudget.
        displayName: Budget ID
        path: budgetId
      - description: |-
          Unique customer identifier (typically an external user ID).
          Maps to LiteLLM's `user_id` / `end_user_id` field.
        displayName: Customer ID
        path: customerId
      - description: Default model to use for this customer.
        displayName: Default Model
        path: defaultModel
      - description: Reference to the LiteLLMInstance this customer belongs to.
        displayName: Instance Ref
        path: instanceRef
      - description: Maximum budget in USD.
        displayName: Max Budget
        path: maxBudget
      - description: Metadata key-value pairs stored with the customer.
        displayName: Metadata
        path: metadata
      - description: List of models this customer is allowed to access.
        displayName: Models
        path: models
      - description: Object permissions (MCP servers, vector stores, agents, access
          groups).
        displayName: Object Permission
        path: objectPermission
      - description: RPM (requests-per-minute) limit for this customer.
        displayName: RPM Limit
        path: rpmLimit
      - description: TPM (tokens-per-minute) limit for this customer.
        displayName: TPM Limit
        path: tpmLimit
      version: v1alpha1
    - description: LiteLLMGuardrail is the Schema for the litellmguardrails API —
        content moderation and safety integrations rendered into the proxy config.
      displayName: LiteLLM Guardrail
      kind: LiteLLMGuardrail
      name: litellmguardrails.litellm.palena.ai
      resources:
      - kind: ConfigMap
        name: ""
        version: v1
      - kind: Deployment
        name: ""
        version: apps/v1
      - kind: Secret
        name: ""
        version: v1
      specDescriptors:
      - displayName: API Base
        path: apiBase
      - displayName: API Key Secret Ref
        path: apiKeySecretRef
      - displayName: Default On
        path: defaultOn
      - displayName: Env Vars
        path: envVars
      - displayName: Guardrail Name
        path: guardrailName
      - displayName: Instance Ref
        path: instanceRef
      - displayName: Mode
        path: mode
      - displayName: Params
        path: params
      - displayName: Provider
        path: provider
      version: v1alpha1
    - description: LiteLLMInstance is the Schema for the litellminstances API.
      displayName: LiteLLM Instance
      kind: LiteLLMInstance
      name: litellminstances.litellm.palena.ai
      resources:
      - kind: ConfigMap
        name: ""
        version: v1
      - kind: Deployment
        name: ""
        version: apps/v1
      - kind: HorizontalPodAutoscaler
        name: ""
        version: autoscaling/v2
      - kind: Ingress
        name: ""
        version: networking.k8s.io/v1
      - kind: Job
        name: ""
        version: batch/v1
      - kind: NetworkPolicy
        name: ""
        version: networking.k8s.io/v1
      - kind: PodDisruptionBudget
        name: ""
        version: policy/v1
      - kind: Secret
        name: ""
        version: v1
      - kind: Service
        name: ""
        version: v1
      - kind: ServiceAccount
        name: ""
        version: v1
      specDescriptors:
      - description: |-
          Admin UI configuration.
          Controls UI availability, access restrictions, model persistence, and personal key creation.
        displayName: Admin UI
        path: adminUI
      - description: Autoscaling configuration.
        displayName: Autoscaling
        path: autoscaling
      - description: Response caching configuration.
        displayName: Caching
        path: caching
      - description: Callback configuration.
        displayName: Callbacks
        path: callbacks
      - description: Config sync settings for bidirectional synchronization.
        displayName: Config Sync
        path: configSync
      - description: Database configuration for LiteLLM state storage.
        displayName: Database
        path: database
      - description: |-
          Default budget settings applied to all end-users/customers.
          Written to litellm_settings.max_end_user_budget / max_end_user_budget_id.
        displayName: Default Customer Budget
        path: defaultCustomerBudget
      - description: Extra environment variable sources.
        displayName: Extra Env From
        path: extraEnvFrom
      - description: Extra environment variables for the LiteLLM container.
        displayName: Extra Env Vars
        path: extraEnvVars
      - description: Fallback configuration for model routing.
        displayName: Fallbacks
        path: fallbacks
      - description: Gateway API HTTPRoute configuration.
        displayName: Gateway HTTP Route
        path: gatewayHTTPRoute
      - description: General settings for the LiteLLM proxy.
        displayName: General Settings
        path: generalSettings
      - description: Health check configuration.
        displayName: Health Check
        path: healthCheck
      - description: Image configuration for the LiteLLM proxy.
        displayName: Image
        path: image
      - description: Ingress configuration.
        displayName: Ingress
        path: ingress
      - description: |-
          JWT authentication configuration (enterprise).
          Enables API-level authentication via JWT tokens from identity providers.
        displayName: JWT Auth
        path: jwtAuth
      - description: |-
          Logging configuration for the instance.
          Controls audit logs, global message logging, and spend log retention.
        displayName: Logging
        path: logging
      - description: Master key configuration for LiteLLM admin access.
        displayName: Master Key
        path: masterKey
      - description: |-
          OAuth2 machine-to-machine authentication configuration (enterprise).
          Maps JWT fields to LiteLLM attributes for service-to-service auth.
        displayName: OAuth2 Auth
        path: oauth2Auth
      - description: Observability configuration.
        displayName: Observability
        path: observability
      - description: |-
          Pass-through endpoint definitions.
          Allows proxying arbitrary API requests to upstream services through LiteLLM.
        displayName: Pass Through Endpoints
        path: passThroughEndpoints
      - description: Pod disruption budget configuration.
        displayName: Pod Disruption Budget
        path: podDisruptionBudget
      - description: |-
          Role-based access control configuration.
          Controls route restrictions, key generation permissions, and per-role access.
          Some features (key_generation_settings, role_permissions) require a LiteLLM Enterprise license.
        displayName: RBAC
        path: rbac
      - description: Redis configuration for caching and routing.
        displayName: Redis
        path: redis
      - description: Number of LiteLLM proxy replicas.
        displayName: Replicas
        path: replicas
      - description: Resource requirements for the LiteLLM container.
        displayName: Resources
        path: resources
      - description: OpenShift Route configuration.
        displayName: Route
        path: route
      - description: Router settings for model routing.
        displayName: Router Settings
        path: routerSettings
      - description: Salt key for hashing.
        displayName: Salt Key
        path: saltKey
      - description: SCIM v2 provisioning configuration.
        displayName: SCIM
        path: scim
      - description: |-
          External secret manager configuration.
          When configured, LiteLLM fetches secrets from the provider at runtime
          instead of reading them from Kubernetes Secrets.
        displayName: Secret Manager
        path: secretManager
      - description: Security settings.
        displayName: Security
        path: security
      - description: Service configuration.
        displayName: Service
        path: service
      - description: SSO configuration.
        displayName: SSO
        path: sso
      - description: Topology spread constraints.
        displayName: Topology Spread Constraints
        path: topologySpreadConstraints
      - description: Upgrade strategy configuration.
        displayName: Upgrade
        path: upgrade
      version: v1alpha1
    - description: LiteLLMModel is the Schema for the litellmmodels API.
      displayName: LiteLLM Model
      kind: LiteLLMModel
      name: litellmmodels.litellm.palena.ai
      resources:
      - kind: LiteLLMInstance
        name: ""
        version: v1alpha1
      specDescriptors:
      - description: Reference to the LiteLLMInstance.
        displayName: Instance Ref
        path: instanceRef
      - description: LiteLLM-specific parameters for this model.
        displayName: LiteLLM Params
        path: litellmParams
      - description: Optional model metadata.
        displayName: Model Info
        path: modelInfo
      - description: Model name exposed to clients.
        displayName: Model Name
        path: modelName
      - description: |-
          Tags for tag-based routing. Requests with matching tags
          will be routed to this model deployment.
        displayName: Tags
        path: tags
      version: v1alpha1
    - description: LiteLLMOrganization is the Schema for the litellmorganizations
        API.
      displayName: LiteLLM Organization
      kind: LiteLLMOrganization
      name: litellmorganizations.litellm.palena.ai
      resources:
      - kind: LiteLLMInstance
        name: ""
        version: v1alpha1
      specDescriptors:
      - displayName: Budget Duration
        path: budgetDuration
      - displayName: Instance Ref
        path: instanceRef
      - displayName: Max Budget
        path: maxBudget
      - displayName: Members
        path: members
      - displayName: Metadata
        path: metadata
      - displayName: Models
        path: models
      - displayName: Organization Alias
        path: organizationAlias
      - displayName: RPM Limit
        path: rpmLimit
      - displayName: TPM Limit
        path: tpmLimit
      version: v1alpha1
    - description: LiteLLMTeam is the Schema for the litellmteams API.
      displayName: LiteLLM Team
      kind: LiteLLMTeam
      name: litellmteams.litellm.palena.ai
      resources:
      - kind: LiteLLMInstance
        name: ""
        version: v1alpha1
      - kind: LiteLLMOrganization
        name: ""
        version: v1alpha1
      specDescriptors:
      - description: Budget reset duration (e.g., "30d", "7d").
        displayName: Budget Duration
        path: budgetDuration
      - description: |-
          Guardrails to activate for this team. Each entry must match the
          guardrailName of a LiteLLMGuardrail CR bound to the same instance.
          Requires a LiteLLM Enterprise license.
        displayName: Guardrails
        path: guardrails
      - description: Reference to the LiteLLMInstance.
        displayName: Instance Ref
        path: instanceRef
      - description: |-
          Logging configuration for this team (enterprise).
          Enables per-team logging destinations and GDPR logging disable.
        displayName: Logging
        path: logging
      - description: Maximum monthly budget in USD.
        displayName: Max Budget Monthly
        path: maxBudgetMonthly
      - description: Maximum concurrent requests for this team.
        displayName: Max Parallel Requests
        path: maxParallelRequests
      - description: |-
          Controls who owns team membership.
            "crd"   — CRD is authoritative. Only listed members exist.
            "sso"   — IdP is authoritative. spec.members is ignored.
            "mixed" — CRD members are additive. SSO members are preserved.
        displayName: Member Management
        path: memberManagement
      - description: |-
          Team members. Behavior depends on memberManagement mode.
          Ignored when memberManagement is "sso".
        displayName: Members
        path: members
      - description: Custom metadata for the team.
        displayName: Metadata
        path: metadata
      - description: Models this team can access.
        displayName: Models
        path: models
      - description: Reference to the organization this team belongs to.
        displayName: Organization Ref
        path: organizationRef
      - description: RPM limit for the team.
        displayName: RPM Limit
        path: rpmLimit
      - description: |-
          Tags associated with this team. Keys generated for team members
          will inherit these tags for tag-based routing.
        displayName: Tags
        path: tags
