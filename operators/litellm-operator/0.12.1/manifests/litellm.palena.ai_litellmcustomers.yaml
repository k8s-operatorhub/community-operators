    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LiteLLMCustomer is the Schema for the litellmcustomers API.
          A Customer represents an external end-user of the AI gateway with its own
          spending, rate, and access policies.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              LiteLLMCustomerSpec defines the desired state of LiteLLMCustomer.

              A Customer represents an external end-user of the LiteLLM AI gateway —
              typically the user of an application built on top of LiteLLM. Customers
              are identified by LiteLLM as "end_users" and can have their own budgets,
              rate limits, and model access policies.
            properties:
              alias:
                description: Human-readable alias for the customer.
                type: string
              allowedModelRegion:
                description: List of models this customer is allowed to access.
                type: string
              blocked:
                description: Whether the customer is blocked from making requests.
                type: boolean
              budgetDuration:
                description: Budget reset duration (e.g., "1d", "7d", "30d").
                type: string
              budgetId:
                description: |-
                  Reference to a predefined budget tier by budget_id.
                  Mutually exclusive with MaxBudget.
                type: string
              customerId:
                description: |-
                  Unique customer identifier (typically an external user ID).
                  Maps to LiteLLM's `user_id` / `end_user_id` field.
                type: string
              defaultModel:
                description: Default model to use for this customer.
                type: string
              instanceRef:
                description: Reference to the LiteLLMInstance this customer belongs
                  to.
                properties:
                  name:
                    description: Name of the LiteLLMInstance CR.
                    type: string
                required:
                - name
                type: object
              maxBudget:
                description: Maximum budget in USD.
                type: number
              metadata:
                additionalProperties:
                  type: string
                description: Metadata key-value pairs stored with the customer.
                type: object
              models:
                description: List of models this customer is allowed to access.
                items:
                  type: string
                type: array
              objectPermission:
                description: Object permissions (MCP servers, vector stores, agents,
                  access groups).
                properties:
                  accessGroups:
                    description: Allowed access groups.
                    items:
                      type: string
                    type: array
                  agents:
                    description: Allowed agents.
                    items:
                      type: string
                    type: array
                  mcpServers:
                    description: Allowed MCP servers.
                    items:
                      type: string
                    type: array
                  vectorStores:
                    description: Allowed vector stores.
                    items:
                      type: string
                    type: array
                type: object
              rpmLimit:
                description: RPM (requests-per-minute) limit for this customer.
                format: int64
                type: integer
              tpmLimit:
                description: TPM (tokens-per-minute) limit for this customer.
                format: int64
                type: integer
            required:
            - customerId
            - instanceRef
            type: object
          status:
            description: LiteLLMCustomerStatus defines the observed state of LiteLLMCustomer.
            properties:
              blocked:
                description: Whether the customer is blocked (as reported by LiteLLM).
                type: boolean
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
