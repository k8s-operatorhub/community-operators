                      Namespace of the secret resource. By default, the secret resource is retrieved from the same namespace as the current RepositoryImmutability resource.
                    type: string
                required:
                - name
                type: object
              newTagPattern:
                description: New regular expression for the immutability policy. Setting
                  this option changes the regular expression of the policy which current
                  pattern is provided in 'tagPattern'.
                type: string
              preserveInQuayOnDeletion:
                default: false
                description: |
                  Whether to preserve the corresponding Quay object when you delete the RepositoryImmutability resource. When set to 'false' (the default), the object is deleted from Quay.
                type: boolean
              repository:
                description: Name of the existing repository to configure. The format
                  for the name is 'namespace'/'shortname'. The namespace can be an
                  organization or your personal namespace. If you omit the namespace
                  part in the name, then the resource looks for the repository in
                  your personal namespace. You can manage tag immutability policies
                  for repositories in your personal namespace, but not in the personal
                  namespace of other users. The token you use in 'quayToken' determines
                  the user account you are using.
                type: string
              tagPattern:
                description: Regular expression to select the tags to protect.
                type: string
            required:
