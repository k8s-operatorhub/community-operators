    - name: Paperclip Operator
      url: https://github.com/paperclipinc/paperclip-operator
    - name: Report an Issue
      url: https://github.com/paperclipinc/paperclip-operator/issues
  maintainers:
    - email: contact@paperclip.inc
      name: Paperclip Team
  maturity: alpha
  minKubeVersion: 1.28.0
  provider:
    name: Paperclip Inc
    url: https://paperclip.inc
