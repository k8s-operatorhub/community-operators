  description: |
    ## Overview

    Kubemox is a Kubernetes operator for managing [Proxmox](https://www.proxmox.com/) virtual infrastructure declaratively. It brings the power of Kubernetes control loops to Proxmox, enabling GitOps-style management of virtual machines, LXC containers, snapshots, and storage resources.

    ## Features

    ### Virtual Machine Management
    - **VirtualMachine**: Create and lifecycle-manage individual Proxmox VMs from Kubernetes. Every change to the resource is reconciled back to Proxmox automatically.
    - **VirtualMachineSet**: Deploy multiple identical VMs at once — similar to how a Deployment manages Pods. Scales replicas up/down by cloning a Proxmox template.
    - **VirtualMachineTemplate**: Manage Proxmox VM templates declaratively.

    ### Snapshot Management
    - **VirtualMachineSnapshot**: Take a one-time, named snapshot of any managed VM.
    - **VirtualMachineSnapshotPolicy**: Define recurring snapshot schedules with cron expressions and label selectors to automatically snapshot matching VMs.

    ### LXC Container Management
    - **Container**: Create and manage Proxmox Linux containers (LXC) declaratively with the same reconciliation guarantees as VMs.

    ### Infrastructure
    - **ProxmoxConnection**: Store Proxmox cluster connection details (endpoint, API token) as a cluster-scoped resource.
    - **CustomCertificate**: Manage custom TLS certificates for Proxmox UI.
    - **StorageDownloadURL**: Download content directly to Proxmox storage nodes via URL.

    ## Prerequisites

    - Kubernetes cluster v1.25+
    - A running Proxmox cluster (v6.3+) accessible from the Kubernetes cluster
    - A Proxmox API token (recommended) or username/password credentials

    ## Getting Started

    1. Install the operator via OLM.
    2. Create a `ProxmoxConnection` resource pointing at your Proxmox endpoint with credentials.
    3. Create `VirtualMachine` or `Container` resources referencing your Proxmox templates.

    See the [full documentation](https://alperencelik.github.io/kubemox/) for detailed guides and examples.

    ## GitOps & Automation

    Kubemox is designed to integrate with GitOps tooling (Flux, ArgoCD). Store your `VirtualMachine` and `VirtualMachineSet` manifests in Git and let Kubernetes continuously reconcile your Proxmox infrastructure to match the desired state.

