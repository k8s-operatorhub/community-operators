      displayName: MongoDB Sharded
      kind: MongoDBSharded
      name: mongodbshardeds.mongodb.keiailab.com
      version: v1alpha1
  description: |
    # MongoDB Operator

    Kubernetes operator for [MongoDB](https://www.mongodb.com/) — manages
    `MongoDB` (ReplicaSet) and `MongoDBSharded` (config server + shards +
    mongos) Custom Resources with declarative reconciliation.

    ## Features

    - **MongoDB CRD** — ReplicaSet topology with primary + secondaries +
      optional arbiter / hidden / delayed members.
    - **MongoDBSharded CRD** — config server RS + N shards × RS + mongos
      router. Declarative scale-in / scale-out with backoff drain.
    - **K8s Lease distributed lock** — race-free admin user bootstrap
      (ADR-0002 bootstrap_lease pattern).
    - **HPA support** — mongos HorizontalPodAutoscaler with deliberate guard
      to prevent unintended RS member changes.
    - **MongoDBBackup CRD** — mongodump-based backup Job, PVC or external
      storage target (S3 ADR-0016).
    - **Supply chain** — Cosign signed container images + SBOM (SPDX-2.3) on
      every release.
    - **Security baseline** — Pod Security Standards, RBAC least-privilege,
      NetworkPolicy isolation, non-root runAsUser.

    ## Documentation

    - GitHub: https://github.com/keiailab/mongodb-operator
    - Helm Chart: https://artifacthub.io/packages/helm/mongodb-operator/mongodb-operator
    - Discussions: https://github.com/keiailab/mongodb-operator/discussions

    ## Prerequisites

    - Kubernetes 1.26+
    - Storage class for PVCs (recommended: ceph-rbd or comparable RWO)
    - (Optional) cert-manager for automatic TLS certificate management
    - (Optional) Prometheus Operator for `ServiceMonitor` scraping
