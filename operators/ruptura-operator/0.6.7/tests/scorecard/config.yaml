apiVersion: scorecard.operatorframework.io/v1alpha3
kind: Configuration
metadata:
  name: config
stages:
  - parallel: true
    tests:
      - entrypoint:
          - scorecard-test
          - basic-check-spec
        image: quay.io/operator-framework/scorecard-test:v1.34.0
        labels:
          suite: basic
          test: basic-check-spec
      - entrypoint:
          - scorecard-test
          - olm-bundle-validation
        image: quay.io/operator-framework/scorecard-test:v1.34.0
        labels:
          suite: olm
          test: olm-bundle-validation
      - entrypoint:
          - scorecard-test
          - olm-crds-have-validation
        image: quay.io/operator-framework/scorecard-test:v1.34.0
        labels:
          suite: olm
          test: olm-crds-have-validation
      - entrypoint:
          - scorecard-test
          - olm-crds-have-resources
        image: quay.io/operator-framework/scorecard-test:v1.34.0
        labels:
          suite: olm
          test: olm-crds-have-resources
      - entrypoint:
          - scorecard-test
          - olm-spec-descriptors
        image: quay.io/operator-framework/scorecard-test:v1.34.0
        labels:
          suite: olm
          test: olm-spec-descriptors
      - entrypoint:
          - scorecard-test
          - olm-status-descriptors
        image: quay.io/operator-framework/scorecard-test:v1.34.0
        labels:
          suite: olm
          test: olm-status-descriptors
