apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "gitops.hybrid-cloud-patterns.io/v1alpha1",
          "kind": "Pattern",
          "metadata": {
            "name": "pattern-sample"
          },
          "spec": {
            "clusterGroupName": "hub",
            "gitSpec": {
              "targetRepo": "https://github.com/validatedpatterns/multicloud-gitops",
              "targetRevision": "main"
            },
            "multiSourceConfig": {
              "enabled": true
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: OpenShift Optional
    containerImage: quay.io/validatedpatterns/patterns-operator@sha256:6ba40d6ff4c590426cc0d39997c4b69defe1fbd75fc7ee6291a19f599f4a2d9e
    createdAt: 2026-04-27 09:33:08
    description: "An operator to deploy and manage architecture patterns from https://validatedpatterns.io.
      \nThis operator collects some Analytics like cluster version, cloud type, etc.
      To disable this\nadd \"ANALYTICS: false\" to the environment variables in the
      subscription."
    features.operators.openshift.io/disconnected: "true"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "true"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
    operatorframework.io/suggested-namespace: patterns-operator
    operators.openshift.io/must-gather-image: quay.io/validatedpatterns/must-gather@sha256:ac23dfe8c3b8404f75f4bdf0eb54470acc98bbb5f892de34d2580066e93ee63d
    operators.operatorframework.io/builder: operator-sdk-v1.42.2+git
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/validatedpatterns/patterns-operator
    support: validatedpatterns@googlegroups.com
  labels:
    operatorframework.io/arch.amd64: supported
    operatorframework.io/arch.arm64: supported
  name: patterns-operator.v0.0.72
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Pattern is the Schema for the patterns API
      displayName: Pattern
      kind: Pattern
      name: patterns.gitops.hybrid-cloud-patterns.io
      resources:
      - kind: Pattern
        name: patterns
        version: v1alpha1
      specDescriptors:
      - displayName: Name
        path: extraParameters[0].name
      - displayName: Value
        path: extraParameters[0].value
      - displayName: Cluster Group Name
        path: clusterGroupName
      - displayName: Git Config
        path: gitSpec
      - displayName: Multi Source Config
        path: multiSourceConfig
      - description: |-
          .Name is dot separated per the helm --set syntax, such as:
            global.something.field
        displayName: Extra Parameters
        path: extraParameters
      - description: URLs to additional Helm parameter files
        displayName: Extra Value Files
        path: extraValueFiles
      - displayName: Git Ops Config
        path: gitOpsSpec
      - description: Analytics UUID. Leave empty to autogenerate a random one. Not
          PII information
        displayName: Analytics UUID
        path: analyticsUUID
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Comma separated capabilities to enable certain experimental features
        displayName: Experimental Capabilities
        path: experimentalCapabilities
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: (EXPERIMENTAL) Enable in-cluster git server (avoids the need
          of forking the upstream repository)
        displayName: In Cluster Git Server
        path: gitSpec.inClusterGitServer
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      - description: Git repo containing the pattern to deploy. Must use https/http
          or, for ssh, git@server:foo/bar.git
        displayName: Target Repo
        path: gitSpec.targetRepo
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldDependency:gitSpec.inClusterGitServer:false
      - description: |-
          Upstream git repo containing the pattern to deploy. Used when in-cluster fork to point to the upstream pattern repository.
          Takes precedence over TargetRepo
        displayName: Origin Repo
        path: gitSpec.originRepo
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldDependency:gitSpec.inClusterGitServer:true
      - description: (DEPRECATED) Branch, tag or commit in the upstream git repository.
          Does not support short-sha's. Default to HEAD
        displayName: Origin Revision
        path: gitSpec.originRevision
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:hidden
      - description: 'Branch, tag, or commit to deploy.  Does not support short-sha''s.
          Default: HEAD'
        displayName: Target Revision
        path: gitSpec.targetRevision
      - description: Optional. FQDN of the git server if automatic parsing from TargetRepo
          is broken
        displayName: Hostname
        path: gitSpec.hostname
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: |-
          Optional. K8s secret name where the info for connecting to git can be found. The supported secrets are modeled after the
          private repositories in argo (https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#repositories)
          currently ssh and username+password are supported
        displayName: Token Secret
        path: gitSpec.tokenSecret
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Optional. K8s secret namespace where the token for connecting
          to git can be found
        displayName: Token Secret Namespace
        path: gitSpec.tokenSecretNamespace
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: (EXPERIMENTAL) Enable multi-source support when deploying the
          clustergroup argo application
        displayName: Enabled
        path: multiSourceConfig.enabled
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      - description: The helm chart url to fetch the helm charts from in order to
          deploy the pattern. Defaults to https://charts.validatedpatterns.io/
        displayName: Helm Repo Url
        path: multiSourceConfig.helmRepoUrl
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldDependency:multiSourceConfig.enabled:true
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: Which chart version for the clustergroup helm chart. Defaults
          to "0.8.*"
        displayName: Cluster Group Chart Version
        path: multiSourceConfig.clusterGroupChartVersion
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldDependency:multiSourceConfig.enabled:true
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: |-
          The url when deploying the clustergroup helm chart directly from a git repo
          Defaults to '' which means not used (Only used when developing the clustergroup helm chart)
        displayName: Cluster Group Git Repo Url
        path: multiSourceConfig.clusterGroupGitRepoUrl
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldDependency:multiSourceConfig.enabled:true
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: |-
          The git reference when deploying the clustergroup helm chart directly from a git repo
          Defaults to 'main'. (Only used when developing the clustergroup helm chart)
        displayName: Cluster Group Chart Git Revision
        path: multiSourceConfig.clusterGroupChartGitRevision
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:fieldDependency:multiSourceConfig.enabled:true
        - urn:alm:descriptor:com.tectonic.ui:advanced
      - description: 'Require manual intervention before Argo will sync new content.
          Default: False'
        displayName: Manual Sync
        path: gitOpsSpec.manualSync
      statusDescriptors:
      - displayName: Analytics Sent
        path: analyticsSent
      - displayName: Analytics UUID
        path: analyticsUUID
      - displayName: App Cluster Domain
        path: appClusterDomain
      - displayName: Cluster Domain
        path: clusterDomain
      - displayName: Cluster ID
        path: clusterID
      - displayName: Cluster Name
        path: clusterName
      - displayName: Cluster Platform
        path: clusterPlatform
      - displayName: Cluster Version
        path: clusterVersion
      - description: "DeletionPhase tracks the current phase of pattern deletion\nValues:
          \"\" (not deleting), \"DeleteSpokeChildApps\" (Phase 1: Delete child applications
          from spoke clusters), \"DeleteSpoke\" (Phase 2: Delete app of apps from
          spoke),\n\t\t\t\t \"DeleteHubChildApps\" (Phase 3: Delete applications from
          hub), \"DeleteHub\" (Phase 4: Delete app of apps from hub)"
        displayName: Deletion Phase
        path: deletionPhase
      - description: Last error encountered by the pattern
        displayName: Last Error
        path: lastError
      - description: Last action related to the pattern
        displayName: Last Step
        path: lastStep
      - displayName: Local Checkout Path
        path: path
      - description: Number of updates to the pattern
        displayName: Version
        path: version
      version: v1alpha1
  description: Deploys and manages architecture patterns from https://validatedpatterns.io
  displayName: Validated Patterns Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          - namespaces
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - nodes
          verbs:
          - get
          - list
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - create
          - get
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - services
          verbs:
          - create
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - deployments
          verbs:
          - create
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - argoproj.io
          resources:
          - applications
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
        - apiGroups:
          - argoproj.io
          resources:
          - argocds
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - cluster.open-cluster-management.io
          resources:
          - managedclusters
          verbs:
          - delete
          - list
        - apiGroups:
          - config.openshift.io
          resources:
          - clusterversions
          - infrastructures
          - ingresses
          verbs:
          - get
          - list
        - apiGroups:
          - console.openshift.io
          resources:
          - consolelinks
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
        - apiGroups:
          - console.openshift.io
          resources:
          - consoleplugins
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - gitops.hybrid-cloud-patterns.io
          resources:
          - patterns
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - gitops.hybrid-cloud-patterns.io
          resources:
          - patterns/finalizers
          verbs:
          - update
        - apiGroups:
          - gitops.hybrid-cloud-patterns.io
          resources:
          - patterns/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - machine.openshift.io
          resources:
          - machines
          verbs:
          - get
          - list
        - apiGroups:
          - operator.open-cluster-management.io
          resources:
          - multiclusterhubs
          verbs:
          - get
          - list
        - apiGroups:
          - operator.openshift.io
          resources:
          - consoles
          verbs:
          - get
          - list
          - update
          - watch
        - apiGroups:
          - operator.openshift.io
          resources:
          - openshiftcontrollermanagers
          verbs:
          - get
          - list
        - apiGroups:
          - operators.coreos.com
          resources:
          - operatorgroups
          - subscriptions
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
        - apiGroups:
          - view.open-cluster-management.io
          resources:
          - managedclusterviews
          verbs:
          - create
        serviceAccountName: patterns-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: patterns-operator
          control-plane: controller-manager
        name: patterns-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --leader-elect
                command:
                - /manager
                env:
                - name: OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                image: quay.io/validatedpatterns/patterns-operator@sha256:6ba40d6ff4c590426cc0d39997c4b69defe1fbd75fc7ee6291a19f599f4a2d9e
                imagePullPolicy: IfNotPresent
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                ports:
                - containerPort: 9443
                  name: webhook-server
                  protocol: TCP
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 512Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                volumeMounts:
                - mountPath: /tmp/k8s-webhook-server/serving-certs
                  name: cert
                  readOnly: true
              securityContext:
                runAsNonRoot: true
              serviceAccountName: patterns-operator-controller-manager
              terminationGracePeriodSeconds: 10
              volumes:
              - name: cert
                secret:
                  defaultMode: 420
                  secretName: webhook-server-cert
      - label:
          app.kubernetes.io/component: patterns-operator-console-plugin
        name: patterns-operator-console-plugin
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/component: patterns-operator-console-plugin
          strategy:
            rollingUpdate:
              maxSurge: 25%
              maxUnavailable: 25%
            type: RollingUpdate
          template:
            metadata:
              labels:
                app.kubernetes.io/component: patterns-operator-console-plugin
            spec:
              containers:
              - env:
                - name: OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                image: quay.io/validatedpatterns/patterns-operator-console@sha256:97c704a1b6fae99de6944220a7a34aa1635a980412e8b59f7e3d8cc817fc4872
                name: patterns-operator-console-plugin
                ports:
                - containerPort: 9443
                  name: https
                  protocol: TCP
                resources:
                  requests:
                    cpu: 10m
                    memory: 50Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                volumeMounts:
                - mountPath: /var/cert
                  name: console-plugin-cert
                  readOnly: true
                - mountPath: /etc/nginx/nginx.conf
                  name: nginx-conf
                  readOnly: true
                  subPath: nginx.conf
              dnsPolicy: ClusterFirst
              restartPolicy: Always
              securityContext:
                runAsNonRoot: true
              serviceAccountName: patterns-operator-controller-manager
              volumes:
              - name: console-plugin-cert
                secret:
                  defaultMode: 420
                  secretName: patterns-operator-console-plugin-cert
              - configMap:
                  defaultMode: 420
                  name: patterns-operator-console-plugin
                name: nginx-conf
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: patterns-operator-controller-manager
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - Validated
  - Pattern
  - Blueprint
  - Architecture
  links:
  - name: Hybrid Cloud Patterns
    url: https://validatedpatterns.io
  maintainers:
  - email: validatedpatterns@googlegroups.com
    name: patterns-team
  maturity: alpha
  minKubeVersion: 1.23.0
  provider:
    name: Red Hat
    url: https://www.redhat.com/en/products/edge/validated-patterns
  relatedImages:
  - image: quay.io/validatedpatterns/patterns-operator@sha256:6ba40d6ff4c590426cc0d39997c4b69defe1fbd75fc7ee6291a19f599f4a2d9e
    name: manager
  - image: quay.io/validatedpatterns/patterns-operator-console@sha256:97c704a1b6fae99de6944220a7a34aa1635a980412e8b59f7e3d8cc817fc4872
    name: patterns-operator-console-plugin
  - image: quay.io/validatedpatterns/must-gather@sha256:ac23dfe8c3b8404f75f4bdf0eb54470acc98bbb5f892de34d2580066e93ee63d
    name: must-gather-ac23dfe8c3b8404f75f4bdf0eb54470acc98bbb5f892de34d2580066e93ee63d-annotation
  version: 0.0.72
  webhookdefinitions:
  - admissionReviewVersions:
    - v1
    containerPort: 443
    deploymentName: patterns-operator-controller-manager
    failurePolicy: Fail
    generateName: vpattern.gitops.hybrid-cloud-patterns.io
    rules:
    - apiGroups:
      - gitops.hybrid-cloud-patterns.io
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      resources:
      - patterns
    sideEffects: None
    targetPort: 9443
    type: ValidatingAdmissionWebhook
    webhookPath: /validate-gitops-hybrid-cloud-patterns-io-v1alpha1-pattern
