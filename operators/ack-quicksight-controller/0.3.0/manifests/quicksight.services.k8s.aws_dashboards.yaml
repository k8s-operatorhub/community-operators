apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: dashboards.quicksight.services.k8s.aws
spec:
  group: quicksight.services.k8s.aws
  names:
    kind: Dashboard
    listKind: DashboardList
    plural: dashboards
    singular: dashboard
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Dashboard is the Schema for the Dashboards API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              DashboardSpec defines the desired state of Dashboard.

              Dashboard.
            properties:
              awsAccountID:
                description: |-
                  The ID of the Amazon Web Services account where you want to create the dashboard.

                  Regex Pattern: `^[0-9]{12}$`
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              folderARNs:
                description: |-
                  When you create the dashboard, Amazon Quick Sight adds the dashboard to these
                  folders.
                items:
                  type: string
                type: array
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              id:
                description: |-
                  The ID for the dashboard, also added to the IAM policy.

                  Regex Pattern: `^[\w\-]+$`
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              linkEntities:
                description: A list of analysis Amazon Resource Names (ARNs) to be
                  linked to the dashboard.
                items:
                  type: string
                type: array
              linkEntityRefs:
                items:
                  description: "AWSResourceReferenceWrapper provides a wrapper around
                    *AWSResourceReference\ntype to provide more user friendly syntax
                    for references using 'from' field\nEx:\nAPIIDRef:\n\n\tfrom:\n\t
                    \ name: my-api"
                  properties:
                    from:
                      description: |-
                        AWSResourceReference provides all the values necessary to reference another
                        k8s resource for finding the identifier(Id/ARN/Name)
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      type: object
                  type: object
                type: array
              linkSharingConfiguration:
                description: A structure that contains the permissions of a shareable
                  link to the dashboard.
                properties:
                  permissions:
                    items:
                      description: Permission for the resource.
                      properties:
                        actions:
                          items:
                            type: string
                          type: array
                        principal:
                          type: string
                      type: object
                    type: array
                type: object
              name:
                description: The display name of the dashboard.
                type: string
              parameters:
                description: |-
                  The parameters for the creation of the dashboard, which you want to use to
                  override the default settings. A dashboard can have any type of parameters,
                  and some parameters might accept multiple values.
                properties:
                  dateTimeParameters:
                    items:
                      description: A date-time parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            format: date-time
                            type: string
                          type: array
                      type: object
                    type: array
                  decimalParameters:
                    items:
                      description: A decimal parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            type: number
                          type: array
                      type: object
                    type: array
                  integerParameters:
                    items:
                      description: An integer parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            format: int64
                            type: integer
                          type: array
                      type: object
                    type: array
                  stringParameters:
                    items:
                      description: A string parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                type: object
              permissions:
                description: |-
                  A structure that contains the permissions of the dashboard. You can use this
                  structure for granting permissions by providing a list of IAM action information
                  for each principal ARN.

                  To specify no permissions, omit the permissions list.
                items:
                  description: Permission for the resource.
                  properties:
                    actions:
                      items:
                        type: string
                      type: array
                    principal:
                      type: string
                  type: object
                type: array
              publishOptions:
                description: |-
                  Options for publishing the dashboard when you create it:

                     * AvailabilityStatus for AdHocFilteringOption - This status can be either
                     ENABLED or DISABLED. When this is set to DISABLED, Amazon Quick Sight
                     disables the left filter pane on the published dashboard, which can be
                     used for ad hoc (one-time) filtering. This option is ENABLED by default.

                     * AvailabilityStatus for ExportToCSVOption - This status can be either
                     ENABLED or DISABLED. The visual option to export data to .CSV format isn't
                     enabled when this is set to DISABLED. This option is ENABLED by default.

                     * VisibilityState for SheetControlsOption - This visibility state can
                     be either COLLAPSED or EXPANDED. This option is COLLAPSED by default.

                     * AvailabilityStatus for QuickSuiteActionsOption - This status can be
                     either ENABLED or DISABLED. Features related to Actions in Amazon Quick
                     Suite on dashboards are disabled when this is set to DISABLED. This option
                     is DISABLED by default.

                     * AvailabilityStatus for ExecutiveSummaryOption - This status can be either
                     ENABLED or DISABLED. The option to build an executive summary is disabled
                     when this is set to DISABLED. This option is ENABLED by default.

                     * AvailabilityStatus for DataStoriesSharingOption - This status can be
                     either ENABLED or DISABLED. The option to share a data story is disabled
                     when this is set to DISABLED. This option is ENABLED by default.
                properties:
                  adHocFilteringOption:
                    description: An ad hoc (one-time) filtering option.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  dataPointDrillUpDownOption:
                    description: The drill down options for data points in a dashbaord.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  dataPointMenuLabelOption:
                    description: The data point menu options of a dashboard.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  dataPointTooltipOption:
                    description: The data point tooltip options.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  dataQAEnabledOption:
                    description: |-
                      Adds Q&A capabilities to a dashboard. If no topic is linked, Dashboard Q&A
                      uses the data values that are rendered on the dashboard. End users can use
                      Dashboard Q&A to ask for different slices of the data that they see on the
                      dashboard. If a topic is linked, Topic Q&A is enabled.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  dataStoriesSharingOption:
                    description: Executive summary option.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  executiveSummaryOption:
                    description: Data stories sharing option.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  exportToCSVOption:
                    description: Export to .csv option.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  exportWithHiddenFieldsOption:
                    description: Determines whether or not hidden fields are visible
                      on exported dashbaords.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  quickSuiteActionsOption:
                    description: Determines if Actions in Amazon Quick Suite are enabled
                      in a dashboard..
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  sheetControlsOption:
                    description: Sheet controls option.
                    properties:
                      visibilityState:
                        type: string
                    type: object
                  sheetLayoutElementMaximizationOption:
                    description: The sheet layout maximization options of a dashbaord.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  visualAxisSortOption:
                    description: The axis sort options for a visual.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  visualMenuOption:
                    description: The menu options for a visual.
                    properties:
                      availabilityStatus:
                        type: string
                    type: object
                  visualPublishOptions:
                    description: The visual publish options of a visual in a dashboard
                    properties:
                      exportHiddenFieldsOption:
                        description: Determines if hidden fields are included in an
                          exported dashboard.
                        properties:
                          availabilityStatus:
                            type: string
                        type: object
                    type: object
                type: object
              sourceEntity:
                description: |-
                  The entity that you are using as a source when you create the dashboard.
                  In SourceEntity, you specify the type of object you're using as source. You
                  can only create a dashboard from a template, so you use a SourceTemplate
                  entity. If you need to create a dashboard from an analysis, first convert
                  the analysis to a template by using the CreateTemplate (https://docs.aws.amazon.com/quicksight/latest/APIReference/API_CreateTemplate.html)
                  API operation. For SourceTemplate, specify the Amazon Resource Name (ARN)
                  of the source template. The SourceTemplateARN can contain any Amazon Web
                  Services account and any Amazon Quick Sight-supported Amazon Web Services
                  Region.

                  Use the DataSetReferences entity within SourceTemplate to list the replacement
                  datasets for the placeholders listed in the original. The schema in each
                  dataset must match its placeholder.

                  Either a SourceEntity or a Definition must be provided in order for the request
                  to be valid.
                properties:
                  sourceTemplate:
                    description: Dashboard source template.
                    properties:
                      arn:
                        type: string
                      dataSetReferences:
                        items:
                          description: Dataset reference.
                          properties:
                            dataSetARN:
                              type: string
                            dataSetPlaceholder:
                              type: string
                            dataSetRef:
                              description: Reference field for DataSetARN
                              properties:
                                from:
                                  description: |-
                                    AWSResourceReference provides all the values necessary to reference another
                                    k8s resource for finding the identifier(Id/ARN/Name)
                                  properties:
                                    name:
                                      type: string
                                    namespace:
                                      type: string
                                  type: object
                              type: object
                          type: object
                        type: array
                    type: object
                type: object
              tags:
                description: |-
                  Contains a map of the key-value pairs for the resource tag or tags assigned
                  to the dashboard.
                items:
                  description: |-
                    The key or keys of the key-value pairs for the resource tag or tags assigned
                    to the resource.
                  properties:
                    key:
                      type: string
                    value:
                      type: string
                  type: object
                type: array
              themeARN:
                description: |-
                  The Amazon Resource Name (ARN) of the theme that is being used for this dashboard.
                  If you add a value for this field, it overrides the value that is used in
                  the source entity. The theme ARN must exist in the same Amazon Web Services
                  account where you create the dashboard.
                type: string
              validationStrategy:
                description: |-
                  The option to relax the validation needed to create a dashboard with definition
                  objects. This option skips the validation step for specific errors.
                properties:
                  mode:
                    type: string
                type: object
              versionDescription:
                description: A description for the first version of the dashboard
                  being created.
                type: string
            required:
            - awsAccountID
            - id
            - name
            type: object
          status:
            description: DashboardStatus defines the observed state of Dashboard
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              createdTime:
                description: The time that this dashboard was created.
                format: date-time
                type: string
              creationStatus:
                description: The status of the dashboard creation request.
                type: string
              lastPublishedTime:
                description: The last time that this dashboard was published.
                format: date-time
                type: string
              lastUpdatedTime:
                description: The last time that this dashboard was updated.
                format: date-time
                type: string
              versionARN:
                description: |-
                  The ARN of the dashboard, including the version number of the first version
                  that is created.
                type: string
              versionNumber:
                description: Version number for this version of the dashboard.
                format: int64
                type: integer
              versionStatus:
                description: |-
                  The resource status of the dashboard version. Possible values are
                  CREATION_IN_PROGRESS, CREATION_SUCCESSFUL, CREATION_FAILED,
                  UPDATE_IN_PROGRESS, UPDATE_SUCCESSFUL, UPDATE_FAILED, or DELETED.
                  The resource is considered synced when the status is
                  CREATION_SUCCESSFUL or UPDATE_SUCCESSFUL.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
