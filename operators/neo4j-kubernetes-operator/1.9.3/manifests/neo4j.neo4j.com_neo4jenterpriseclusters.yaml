                          items:
                            type: string
                          type: array
                        suspended:
                          description: Suspended is true when STATUS = SUSPENDED.
                          type: boolean
                        user:
                          description: User is the username.
                          type: string
                      required:
                      - user
                      type: object
                    type: array
                type: object
              endpoints:
