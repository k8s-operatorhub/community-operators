apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: analyses.quicksight.services.k8s.aws
spec:
  group: quicksight.services.k8s.aws
  names:
    kind: Analysis
    listKind: AnalysisList
    plural: analyses
    singular: analysis
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Analysis is the Schema for the Analyses API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AnalysisSpec defines the desired state of Analysis.

              Metadata structure for an analysis in Quick Sight
            properties:
              awsAccountID:
                description: |-
                  The ID of the Amazon Web Services account where you are creating an analysis.

                  Regex Pattern: `^[0-9]{12}$`
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              folderARNs:
                description: |-
                  When you create the analysis, Amazon Quick Sight adds the analysis to these
                  folders.
                items:
                  type: string
                type: array
              id:
                description: |-
                  The ID for the analysis that you're creating. This ID displays in the URL
                  of the analysis.

                  Regex Pattern: `^[\w\-]+$`
                type: string
                x-kubernetes-validations:
                - message: Value is immutable once set
                  rule: self == oldSelf
              name:
                description: |-
                  A descriptive name for the analysis that you're creating. This name displays
                  for the analysis in the Amazon Quick Sight console.
                type: string
              parameters:
                description: |-
                  The parameter names and override values that you want to use. An analysis
                  can have any parameter type, and some parameters might accept multiple values.
                properties:
                  dateTimeParameters:
                    items:
                      description: A date-time parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            format: date-time
                            type: string
                          type: array
                      type: object
                    type: array
                  decimalParameters:
                    items:
                      description: A decimal parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            type: number
                          type: array
                      type: object
                    type: array
                  integerParameters:
                    items:
                      description: An integer parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            format: int64
                            type: integer
                          type: array
                      type: object
                    type: array
                  stringParameters:
                    items:
                      description: A string parameter.
                      properties:
                        name:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      type: object
                    type: array
                type: object
              permissions:
                description: |-
                  A structure that describes the principals and the resource-level permissions
                  on an analysis. You can use the Permissions structure to grant permissions
                  by providing a list of Identity and Access Management (IAM) action information
                  for each principal listed by Amazon Resource Name (ARN).

                  To specify no permissions, omit Permissions.
                items:
                  description: Permission for the resource.
                  properties:
                    actions:
                      items:
                        type: string
                      type: array
                    principal:
                      type: string
                  type: object
                type: array
              sourceEntity:
                description: |-
                  A source entity to use for the analysis that you're creating. This metadata
                  structure contains details that describe a source template and one or more
                  datasets.

                  Either a SourceEntity or a Definition must be provided in order for the request
                  to be valid.
                properties:
                  sourceTemplate:
                    description: The source template of an analysis.
                    properties:
                      arn:
                        type: string
                      dataSetReferences:
                        items:
                          description: Dataset reference.
                          properties:
                            dataSetARN:
                              type: string
                            dataSetPlaceholder:
                              type: string
                            dataSetRef:
                              description: Reference field for DataSetARN
                              properties:
                                from:
                                  description: |-
                                    AWSResourceReference provides all the values necessary to reference another
                                    k8s resource for finding the identifier(Id/ARN/Name)
                                  properties:
                                    name:
                                      type: string
                                    namespace:
                                      type: string
                                  type: object
                              type: object
                          type: object
                        type: array
                    type: object
                type: object
              tags:
                description: |-
                  Contains a map of the key-value pairs for the resource tag or tags assigned
                  to the analysis.
                items:
                  description: |-
                    The key or keys of the key-value pairs for the resource tag or tags assigned
                    to the resource.
                  properties:
                    key:
                      type: string
                    value:
                      type: string
                  type: object
                type: array
              themeARN:
                description: |-
                  The ARN for the theme to apply to the analysis that you're creating. To see
                  the theme in the Amazon Quick Sight console, make sure that you have access
                  to it.
                type: string
              validationStrategy:
                description: |-
                  The option to relax the validation needed to create an analysis with definition
                  objects. This skips the validation step for specific errors.
                properties:
                  mode:
                    type: string
                type: object
            required:
            - awsAccountID
            - id
            - name
            type: object
          status:
            description: AnalysisStatus defines the observed state of Analysis
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              createdTime:
                description: The time that the analysis was created.
                format: date-time
                type: string
              errors:
                description: Errors associated with the analysis.
                items:
                  description: Analysis error.
                  properties:
                    message:
                      type: string
                    type:
                      type: string
                    violatedEntities:
                      items:
                        description: An object, structure, or sub-structure of an
                          analysis, template, or dashboard.
                        properties:
                          path:
                            type: string
                        type: object
                      type: array
                  type: object
                type: array
              lastUpdatedTime:
                description: The time that the analysis was last updated.
                format: date-time
                type: string
              status:
                description: Status associated with the analysis.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
