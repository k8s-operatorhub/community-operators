                  https:
                    description: HTTPS endpoint
                    type: string
                  internal:
                    description: Internal service endpoints
                    properties:
                      client:
                        type: string
                      headless:
                        type: string
                    type: object
                type: object
              lastUpgradeTime:
                description: LastUpgradeTime shows when the last upgrade was performed
