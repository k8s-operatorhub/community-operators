  description: |
    # VirtGitSync Operator

    The VirtGitSync operator enables complete GitOps workflows for KubeVirt VirtualMachines.
    It watches VirtualMachine resources, syncs them to git, and integrates with ArgoCD to
    maintain a single source of truth in your git repository.

    ## Features

    - **Automatic VM sync to git** - Watches VirtualMachine resources and commits changes to git
    - **Clean YAML generation** - Strips runtime metadata for zero-drift GitOps
    - **ArgoCD integration** - Automatically creates and manages ArgoCD Applications
    - **Manual sync control** - Prevents race conditions with manual trigger approach
    - **Pause/resume per-VM** - Use annotations to pause ArgoCD reconciliation for specific VMs
    - **SSH and HTTPS auth** - Support for private repositories
    - **Multi-namespace** - Sync VMs across namespaces with label selectors

    ## Use Cases

    - GitOps workflows for virtual machine management
    - Disaster recovery - VMs backed up to git
    - VM template management
    - Change tracking and audit trail
    - Multi-cluster VM deployment with ArgoCD

    ## Getting Started

    Create a VirtGitSync resource to sync VirtualMachines to git:

    ```yaml
    apiVersion: virt.mathianasj.github.com/v1alpha1
    kind: VirtGitSync
    metadata:
      name: vm-sync
    spec:
      gitRepository:
        url: https://github.com/yourusername/vm-manifests.git
        branch: main
        secretRef:
          name: git-credentials
      argocd:
        namespace: openshift-gitops
        applicationName: my-vms
    ```

    The operator will sync all VirtualMachines to git and create an ArgoCD Application
    to deploy them from git back to the cluster.
