apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustersecuritypolicies.security.nextguard.io
  labels:
    app: nextguard-operator
spec:
  group: security.nextguard.io
  scope: Cluster
  names:
    kind: ClusterSecurityPolicy
    plural: clustersecuritypolicies
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: ClusterSecurityPolicy defines cluster-wide security module configuration
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - moduleConfigs
            properties:
              moduleConfigs:
                type: object
                description: Map of enabled modules and their configuration
                additionalProperties:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    settings:
                      type: object
                      additionalProperties:
                        type: string
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Ready
                - Degraded
                - Error
              modules:
                type: object
                description: Status of each module
                additionalProperties:
                  type: string
              lastUpdated:
                type: string
                format: date-time
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
