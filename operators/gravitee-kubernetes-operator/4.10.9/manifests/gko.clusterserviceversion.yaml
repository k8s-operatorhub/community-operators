apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: gko.v4.10.9
  namespace: placeholder
  annotations:
    capabilities: Full Lifecycle
    categories: Integration & Delivery, Networking
    containerImage: docker.io/graviteeio/kubernetes-operator:4.10.9
    repository: https://github.com/gravitee-io/gravitee-kubernetes-operator
    support: Gravitee.io
    description: Manage Gravitee.io API Management resources natively in Kubernetes
      using declarative custom resources.
    alm-examples: >-
      [
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "ManagementContext",
          "metadata": {
            "name": "dev-ctx"
          },
          "spec": {
            "baseUrl": "http://apim-apim3-api.default.svc:83",
            "environmentId": "DEFAULT",
            "organizationId": "DEFAULT",
            "auth": {
              "credentials": {
                "username": "admin",
                "password": "admin"
              }
            }
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "ApiDefinition",
          "metadata": {
            "name": "basic-api-example"
          },
          "spec": {
            "name": "K8s Basic Example",
            "version": "1.0",
            "description": "Basic api managed by Gravitee Kubernetes Operator",
            "plans": [
              {
                "name": "KEY_LESS",
                "description": "FREE",
                "security": "KEY_LESS"
              }
            ],
            "proxy": {
              "virtual_hosts": [
                {
                  "path": "/k8s-basic"
                }
              ],
              "groups": [
                {
                  "endpoints": [
                    {
                      "name": "Default",
                      "target": "https://api.gravitee.io/echo"
                    }
                  ]
                }
              ]
            },
            "local": true
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "ApiV4Definition",
          "metadata": {
            "name": "api-v4"
          },
          "spec": {
            "contextRef": {
              "name": "dev-ctx"
            },
            "name": "api-v4",
            "description": "API v4 managed by Gravitee Kubernetes Operator",
            "version": "1.0",
            "type": "PROXY",
            "listeners": [
              {
                "type": "HTTP",
                "paths": [
                  {
                    "path": "/echo-v4"
                  }
                ],
                "entrypoints": [
                  {
                    "type": "http-proxy",
                    "qos": "AUTO"
                  }
                ]
              }
            ],
            "endpointGroups": [
              {
                "name": "Default HTTP proxy group",
                "type": "http-proxy",
                "endpoints": [
                  {
                    "name": "Default HTTP proxy",
                    "type": "http-proxy",
                    "inheritConfiguration": false,
                    "configuration": {
                      "target": "https://api.gravitee.io/echo"
                    },
                    "secondary": false
                  }
                ]
              }
            ],
            "flowExecution": {
              "mode": "DEFAULT",
              "matchRequired": false
            },
            "plans": {
              "KeyLess": {
                "name": "Free plan",
                "description": "This plan does not require any authentication",
                "security": {
                  "type": "KEY_LESS"
                }
              }
            }
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "Application",
          "metadata": {
            "name": "simple-application"
          },
          "spec": {
            "contextRef": {
              "name": "dev-ctx"
            },
            "name": "simple-app",
            "domain": "https://example.com",
            "description": "A hands-free application.\nUsing this type, you will be able to define the client_id by your own.\n",
