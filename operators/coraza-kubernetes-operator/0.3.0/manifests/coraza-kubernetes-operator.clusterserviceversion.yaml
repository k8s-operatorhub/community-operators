apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
    categories: Security
    containerImage: ghcr.io/networking-incubator/coraza-kubernetes-operator:v0.3.0
    repository: https://github.com/networking-incubator/coraza-kubernetes-operator
    support: networking-incubator
  name: coraza-kubernetes-operator.v0.3.0
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Engine configures a Coraza WAF instance attached to a Gateway.
      displayName: Engine
      kind: Engine
      name: engines.waf.k8s.coraza.io
      version: v1alpha1
    - description: RuleSet defines an ordered set of WAF rules sourced from ConfigMaps.
      displayName: RuleSet
      kind: RuleSet
      name: rulesets.waf.k8s.coraza.io
      version: v1alpha1
  description: 'The Coraza Kubernetes Operator provides Web Application Firewall (WAF)

    support for Kubernetes Gateways. It manages Coraza WAF

    engine instances which can be loaded with user-provided rule sets.


    **Note:** This operator is alpha-quality software. APIs and behavior may change.


    ### Features

    - Declarative WAF configuration via Kubernetes custom resources

    - Rule set caching for performance

    - Support for OWASP CoreRuleSet


    ### Requirements

    - OpenShift 4.20+

    - A Gateway API implementation (currently only OpenShift Service Mesh and Istio are supported)

    '
  displayName: Coraza Kubernetes Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - serviceAccountName: coraza-kubernetes-operator
        rules:
        - apiGroups:
          - ''
          resources:
          - configmaps
          - secrets
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - ''
          resources:
          - pods
          verbs:
          - list
          - watch
        - apiGroups:
          - ''
          - events.k8s.io
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - apps
          resources:
          - deployments
          verbs:
          - get
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - extensions.istio.io
          resources:
          - wasmplugins
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - gateway.networking.k8s.io
          resources:
          - gateways
          verbs:
          - list
          - watch
        - apiGroups:
          - networking.istio.io
          resources:
          - destinationrules
          - serviceentries
          verbs:
          - create
          - get
          - patch
          - update
        - apiGroups:
          - waf.k8s.coraza.io
          resources:
          - engines
          - rulesets
          verbs:
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - waf.k8s.coraza.io
          resources:
          - engines/finalizers
          verbs:
          - update
        - apiGroups:
          - waf.k8s.coraza.io
          resources:
          - engines/status
          - rulesets/status
          verbs:
          - get
          - patch
          - update
      deployments:
      - name: coraza-kubernetes-operator
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: coraza-kubernetes-operator
              app.kubernetes.io/instance: coraza-kubernetes-operator
              control-plane: coraza-controller-manager
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: coraza-kubernetes-operator
                app.kubernetes.io/instance: coraza-kubernetes-operator
                control-plane: coraza-controller-manager
            spec:
              securityContext:
                runAsNonRoot: true
                fsGroupChangePolicy: OnRootMismatch
                seccompProfile:
                  type: RuntimeDefault
              automountServiceAccountToken: true
              enableServiceLinks: false
              containers:
              - name: manager
                image: ghcr.io/networking-incubator/coraza-kubernetes-operator:v0.3.0
                imagePullPolicy: IfNotPresent
                command:
                - /manager
                args:
                - --leader-elect=true
                - --health-probe-bind-address=:8081
                - --metrics-bind-address=:8082
                - --metrics-secure=false
                - --envoy-cluster-name=outbound|80||coraza-kubernetes-operator.coraza-system.svc.cluster.local
                - --cache-gc-interval=3s
                - --istio-revision=openshift-gateway
                - --operator-name=coraza-kubernetes-operator
                env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                securityContext:
                  runAsNonRoot: true
                  privileged: false
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  seccompProfile:
                    type: RuntimeDefault
                  capabilities:
                    drop:
                    - ALL
                startupProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 0
                  timeoutSeconds: 1
                  periodSeconds: 10
                  successThreshold: 1
                  failureThreshold: 30
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  timeoutSeconds: 1
                  periodSeconds: 20
                  successThreshold: 1
                  failureThreshold: 3
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  timeoutSeconds: 1
                  periodSeconds: 10
                  successThreshold: 1
                  failureThreshold: 3
                resources:
                  limits:
                    cpu: 500m
                    memory: 256Mi
                  requests:
                    cpu: 10m
                    memory: 128Mi
                resizePolicy:
                - resourceName: cpu
                  restartPolicy: NotRequired
                - resourceName: memory
                  restartPolicy: NotRequired
              serviceAccountName: coraza-kubernetes-operator
              terminationGracePeriodSeconds: 10
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - waf
  - coraza
  - security
  - kubernetes
  - gateway
  - istio
  links:
  - name: GitHub
    url: https://github.com/networking-incubator/coraza-kubernetes-operator
  - name: Coraza WAF
    url: https://coraza.io/
  maintainers:
  - email: maintainers@coraza-kubernetes-operator.com
    name: networking-incubator
  maturity: alpha
  nativeAPIs:
  - group: ''
    kind: ConfigMap
    version: v1
  - group: ''
    kind: Pod
    version: v1
  provider:
    name: networking-incubator
    url: https://github.com/networking-incubator
  version: "0.3.0"
  minKubeVersion: 1.32.0
