apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: gateways.bedrockagentcorecontrol.services.k8s.aws
spec:
  group: bedrockagentcorecontrol.services.k8s.aws
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    singular: gateway
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Gateway is the Schema for the Gateways API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GatewaySpec defines the desired state of Gateway.
            properties:
              authorizerConfiguration:
                description: |-
                  The authorizer configuration for the gateway. Required if authorizerType
                  is CUSTOM_JWT.
                properties:
                  customJWTAuthorizer:
                    description: |-
                      Configuration for inbound JWT-based authorization, specifying how incoming
                      requests should be authenticated.
                    properties:
                      allowedAudience:
                        items:
                          type: string
                        type: array
                      allowedClients:
                        items:
                          type: string
                        type: array
                      allowedScopes:
                        items:
                          type: string
                        type: array
                      customClaims:
                        items:
                          description: |-
                            Defines the name of a custom claim field and rules for finding matches to
                            authenticate its value.
                          properties:
                            authorizingClaimMatchValue:
                              description: Defines the value or values to match for
                                and the relationship of the match.
                              properties:
                                claimMatchOperator:
                                  type: string
                                claimMatchValue:
                                  description: |-
                                    The value or values to match for.

                                       * Include a matchValueString with the EQUALS operator to specify a string
                                       that matches the claim field value.

                                       * Include a matchValueArray to specify an array of string values. You
                                       can use the following operators: Use CONTAINS to yield a match if the
                                       claim field value is in the array. Use CONTAINS_ANY to yield a match if
                                       the claim field value contains any of the strings in the array.
                                  properties:
                                    matchValueString:
                                      type: string
                                    matchValueStringList:
                                      items:
                                        type: string
                                      type: array
                                  type: object
                              type: object
                            inboundTokenClaimName:
                              type: string
                            inboundTokenClaimValueType:
                              type: string
                          type: object
                        type: array
                      discoveryURL:
                        type: string
                    type: object
                type: object
              authorizerType:
                description: |-
                  The type of authorizer to use for the gateway.

                     * CUSTOM_JWT - Authorize with a bearer token.

                     * AWS_IAM - Authorize with your Amazon Web Services IAM credentials.

                     * NONE - No authorization
                type: string
              description:
                description: The description of the gateway.
                type: string
              exceptionLevel:
                description: |-
                  The level of detail in error messages returned when invoking the gateway.

                     * If the value is DEBUG, granular exception messages are returned to help
                     a user debug the gateway.

                     * If the value is omitted, a generic error message is returned to the
                     end user.
                type: string
              interceptorConfigurations:
                description: |-
                  A list of configuration settings for a gateway interceptor. Gateway interceptors
                  allow custom code to be invoked during gateway invocations.
                items:
                  description: |-
                    The configuration for an interceptor on a gateway. This structure defines
                    settings for an interceptor that will be invoked during the invocation of
                    the gateway.
                  properties:
                    inputConfiguration:
                      description: The input configuration of the interceptor.
                      properties:
                        passRequestHeaders:
                          type: boolean
                      type: object
                    interceptionPoints:
                      items:
                        type: string
                      type: array
                    interceptor:
                      description: The interceptor configuration.
                      properties:
                        lambda:
                          description: The lambda configuration for the interceptor
                          properties:
                            arn:
                              type: string
                          type: object
                      type: object
                  type: object
                type: array
              kmsKeyARN:
                description: |-
                  The Amazon Resource Name (ARN) of the KMS key used to encrypt data associated
                  with the gateway.

                  Regex Pattern: `^arn:aws(|-cn|-us-gov):kms:[a-zA-Z0-9-]*:[0-9]{12}:key/[a-zA-Z0-9-]{36}$`
                type: string
              kmsKeyRef:
                description: "AWSResourceReferenceWrapper provides a wrapper around
                  *AWSResourceReference\ntype to provide more user friendly syntax
                  for references using 'from' field\nEx:\nAPIIDRef:\n\n\tfrom:\n\t
                  \ name: my-api"
                properties:
                  from:
                    description: |-
                      AWSResourceReference provides all the values necessary to reference another
                      k8s resource for finding the identifier(Id/ARN/Name)
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    type: object
                type: object
              name:
                description: |-
                  The name of the gateway. The name must be unique within your account.

                  Regex Pattern: `^([0-9a-zA-Z][-]?){1,100}$`
                type: string
              policyEngineConfiguration:
                description: |-
                  The policy engine configuration for the gateway. A policy engine is a collection
                  of policies that evaluates and authorizes agent tool calls. When associated
                  with a gateway, the policy engine intercepts all agent requests and determines
                  whether to allow or deny each action based on the defined policies.
                properties:
                  arn:
                    type: string
                  mode:
                    type: string
                type: object
              protocolConfiguration:
                description: |-
                  The configuration settings for the protocol specified in the protocolType
                  parameter.
                properties:
                  mcp:
                    description: |-
                      The configuration for a Model Context Protocol (MCP) gateway. This structure
                      defines how the gateway implements the MCP protocol.
                    properties:
                      instructions:
                        type: string
                      searchType:
                        type: string
                      supportedVersions:
                        items:
                          type: string
                        type: array
                    type: object
                type: object
              protocolType:
                description: The protocol type for the gateway.
                type: string
              roleARN:
                description: |-
                  The Amazon Resource Name (ARN) of the IAM role that provides permissions
                  for the gateway to access Amazon Web Services services.

                  Regex Pattern: `^arn:aws(-[^:]+)?:iam::([0-9]{12})?:role/.+$`
                type: string
              roleRef:
                description: "AWSResourceReferenceWrapper provides a wrapper around
                  *AWSResourceReference\ntype to provide more user friendly syntax
                  for references using 'from' field\nEx:\nAPIIDRef:\n\n\tfrom:\n\t
                  \ name: my-api"
                properties:
                  from:
                    description: |-
                      AWSResourceReference provides all the values necessary to reference another
                      k8s resource for finding the identifier(Id/ARN/Name)
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    type: object
                type: object
              tags:
                additionalProperties:
                  type: string
                description: A map of key-value pairs to associate with the gateway
                  as metadata tags.
                type: object
            required:
            - authorizerType
            - name
            - protocolType
            type: object
          status:
            description: GatewayStatus defines the observed state of Gateway
            properties:
              ackResourceMetadata:
                description: |-
                  All CRs managed by ACK have a common `Status.ACKResourceMetadata` member
                  that is used to contain resource sync state, account ownership,
                  constructed ARN for the resource
                properties:
                  arn:
                    description: |-
                      ARN is the Amazon Resource Name for the resource. This is a
                      globally-unique identifier and is set only by the ACK service controller
                      once the controller has orchestrated the creation of the resource OR
                      when it has verified that an "adopted" resource (a resource where the
                      ARN annotation was set by the Kubernetes user on the CR) exists and
                      matches the supplied CR's Spec field values.
                      https://github.com/aws/aws-controllers-k8s/issues/270
                    type: string
                  ownerAccountID:
                    description: |-
                      OwnerAccountID is the AWS Account ID of the account that owns the
                      backend AWS service API resource.
                    type: string
                  region:
                    description: Region is the AWS region in which the resource exists
                      or will exist.
                    type: string
                required:
                - ownerAccountID
                - region
                type: object
              conditions:
                description: |-
                  All CRs managed by ACK have a common `Status.Conditions` member that
                  contains a collection of `ackv1alpha1.Condition` objects that describe
                  the various terminal states of the CR and its backend AWS service API
                  resource
                items:
                  description: |-
                    Condition is the common struct used by all CRDs managed by ACK service
                    controllers to indicate terminal states  of the CR and its backend AWS
                    service API resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status
                        to another.
                      format: date-time
                      type: string
                    message:
                      description: A human readable message indicating details about
                        the transition.
                      type: string
                    reason:
                      description: The reason for the condition's last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    type:
                      description: Type is the type of the Condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              createdAt:
                description: The timestamp when the gateway was created.
                format: date-time
                type: string
              gatewayID:
                description: |-
                  The unique identifier of the created gateway.

                  Regex Pattern: `^([0-9a-z][-]?){1,100}-[0-9a-z]{10}$`
                type: string
              gatewayURL:
                description: The URL endpoint for the created gateway.
                type: string
              status:
                description: The current status of the gateway.
                type: string
              statusReasons:
                description: The reasons for the current status of the gateway.
                items:
                  type: string
                type: array
              updatedAt:
                description: The timestamp when the gateway was last updated.
                format: date-time
                type: string
              workloadIdentityDetails:
                description: The workload identity details for the created gateway.
                properties:
                  workloadIdentityARN:
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
