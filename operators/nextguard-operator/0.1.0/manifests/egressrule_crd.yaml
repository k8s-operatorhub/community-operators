apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: egressrules.security.nextguard.io
  labels:
    app: nextguard-operator
spec:
  group: security.nextguard.io
  scope: Namespaced
  names:
    kind: EgressRule
    plural: egressrules
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: EgressRule defines egress firewall rules
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - tenantNamespace
            - rules
            properties:
              tenantNamespace:
                type: string
              rules:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    to:
                      type: object
                      properties:
                        cidrSelector:
                          type: string
                        dnsName:
                          type: string
                    ports:
                      type: array
                      items:
                        type: object
                        properties:
                          protocol:
                            type: string
                          port:
                            type: integer
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
              lastSyncedAt:
                type: string
                format: date-time
              syncId:
                type: string
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
