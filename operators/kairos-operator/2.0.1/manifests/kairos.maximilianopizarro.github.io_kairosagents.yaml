    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KairosAgent is the Schema for the kairosagents API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KairosAgentSpec defines the desired state of KairosAgent.
            properties:
              aiModel:
                description: AI model configuration
                properties:
                  apiKeySecret:
                    description: Secret reference for API key
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  apiURL:
                    description: OpenAI-compatible API endpoint
                    type: string
                  model:
                    description: Model identifier
                    type: string
                  temperature:
                    description: Temperature for model responses (0.0 - 1.0)
                    type: string
                  timeoutSeconds:
                    description: Request timeout
                    format: int32
                    type: integer
                  tls:
                    description: TLS settings for AI API connection
                    properties:
                      caSecretRef:
                        description: Custom CA certificate secret reference
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      certSecretRef:
                        description: Client certificate secret reference (mTLS)
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      insecureSkipVerify:
                        description: Skip TLS certificate verification (for disconnected/air-gapped
                          environments)
                        type: boolean
                    type: object
                required:
                - apiURL
                - model
                type: object
              correctionPolicy:
                description: Correction guardrails
                properties:
                  dryRun:
                    description: 'Dry-run mode: log decisions without applying them'
                    type: boolean
                  maxActionsPerHour:
                    description: Maximum corrections per hour
                    format: int32
                    type: integer
                  requireApprovalAbove:
                    description: Changes above this percentage require human approval
                    type: string
                  rollbackOnFailure:
                    description: Automatically rollback if a correction causes degradation
                    type: boolean
                required:
                - maxActionsPerHour
                type: object
              gitops:
                description: 'GitOps configuration: generate PRs instead of direct
                  SSA patches'
                properties:
                  branch:
                    description: 'Branch to create PRs against (default: main)'
                    type: string
                  credentialsSecretRef:
                    description: Secret reference with git credentials (token or SSH
                      key)
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  path:
                    description: Path within the repository where manifests reside
                    type: string
                  prTitlePrefix:
                    description: PR title prefix
                    type: string
                  repository:
                    description: Git repository URL (e.g. https://github.com/org/infra-config.git)
                    type: string
                required:
                - repository
                type: object
              hubReporting:
                description: 'Hub reporting: push agent status to the hub console'
                properties:
                  clusterName:
                    description: Cluster name as displayed in the hub console (e.g.
                      "east", "west", "factory-floor")
                    type: string
                  enabled:
                    description: Enable reporting agent status to hub console
                    type: boolean
                  endpoint:
                    description: Hub console API endpoint (e.g. https://kairos-console.apps.hub-cluster.example.com)
                    type: string
                  insecureSkipVerify:
                    description: Skip TLS verification for hub connection (air-gapped
                      / self-signed certs)
                    type: boolean
                  tls:
                    description: TLS settings for hub communication
                    properties:
                      caSecretRef:
                        description: Custom CA certificate secret reference
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      certSecretRef:
                        description: Client certificate secret reference (mTLS)
                        properties:
                          key:
                            type: string
                          name:
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      insecureSkipVerify:
                        description: Skip TLS certificate verification (for disconnected/air-gapped
                          environments)
                        type: boolean
                    type: object
                  tokenSecretRef:
                    description: Bearer token secret for authenticating to the hub
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - enabled
                - endpoint
                type: object
              mode:
                description: 'Operating mode: autopilot or supervised'
                enum:
                - autopilot
                - supervised
                - gitops
                type: string
              notifications:
                description: Notification webhook configuration (Slack/Teams/generic)
                properties:
                  channel:
                    description: Channel override (Slack only)
                    type: string
                  events:
                    description: Events to notify on
                    items:
                      type: string
                    type: array
                  webhookSecretRef:
                    description: Secret reference for webhook URL (alternative to
                      inline)
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  webhookURL:
                    description: Webhook URL (Slack incoming webhook, Teams connector,
                      or generic)
                    type: string
                required:
                - webhookURL
                type: object
              paused:
                description: Pause the agent
                type: boolean
              pinnedResources:
                description: 'PinnedResources overrides: SRE can pin workload resources
                  for a duration'
                items:
                  description: 'PinnedResource overrides: SRE can pin workload resources
                    for a duration.'
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    until:
                      format: date-time
                      type: string
                  required:
                  - name
                  - namespace
                  - until
                  type: object
                type: array
              reporting:
                description: Reporting configuration
                properties:
                  interval:
                    description: How often the agent reports status
                    type: string
                  otelExport:
                    description: Send events to OTel collector
                    type: boolean
                required:
                - interval
                type: object
              slaClass:
                description: 'SLA class reference: priority class for SLA-aware scheduling'
                type: string
              watch:
                description: What resources to watch
                properties:
                  labelSelector:
                    description: Label selector for filtering resources
                    type: string
                  namespaceSuffix:
                    description: |-
                      NamespaceSuffix filters namespaces by suffix (e.g. "-dev", "-test", "-qa", "-prod").
                      When set, the agent watches ALL namespaces ending with this suffix.
                      Can be combined with explicit Namespaces list.
                    type: string
                  namespaces:
                    description: Namespaces to watch
                    items:
                      type: string
                    type: array
                  resourceTypes:
                    description: Resource types to monitor (Deployment, StatefulSet,
                      DaemonSet, CronJob)
                    items:
                      type: string
                    type: array
                required:
                - namespaces
                - resourceTypes
                type: object
            required:
            - aiModel
            - correctionPolicy
            - mode
            - watch
            type: object
          status:
            description: KairosAgentStatus defines the observed state of KairosAgent.
            properties:
              conditions:
                description: Conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              correctionsLastHour:
                description: Corrections in the last hour
                format: int32
                type: integer
              dryRunRecommendations:
                description: 'Dry-run recommendations (last 20, only when dryRun:
                  true)'
                items:
                  description: DryRunRecommendation records a resource change that
                    would be applied if dry-run were disabled.
                  properties:
                    aiResponse:
                      type: string
                    currentCPU:
                      type: string
                    currentMemory:
                      type: string
                    namespace:
                      type: string
                    proposedCPU:
                      type: string
                    proposedMemory:
                      type: string
                    reason:
                      type: string
                    resource:
                      type: string
                    timestamp:
                      format: date-time
                      type: string
                  required:
                  - namespace
                  - reason
                  - resource
                  - timestamp
                  type: object
                type: array
              lastCheckTime:
                description: Last time the agent checked resources
                format: date-time
                type: string
              pendingApprovals:
                description: Pending approvals (supervised mode)
                items:
                  description: PendingApproval represents a correction waiting for
                    human approval.
                  properties:
                    action:
                      type: string
                    aiResponse:
                      type: string
                    id:
                      type: string
                    namespace:
                      type: string
                    reason:
                      type: string
                    resource:
                      type: string
                    timestamp:
                      format: date-time
                      type: string
                  required:
                  - action
                  - id
                  - namespace
                  - reason
                  - resource
                  - timestamp
                  type: object
                type: array
              phase:
                description: Current phase of the agent
                enum:
                - Active
                - Idle
                - Correcting
                - WaitingApproval
                - Error
                - Paused
                type: string
              recentCorrections:
                description: Recent corrections (last 20)
                items:
                  description: CorrectionRecord records a correction the agent made
                    or proposed.
                  properties:
                    action:
                      type: string
                    aiResponse:
                      type: string
                    applied:
                      type: boolean
                    namespace:
                      type: string
                    reason:
                      type: string
                    resource:
                      type: string
                    timestamp:
                      format: date-time
                      type: string
                  required:
                  - action
                  - applied
                  - namespace
                  - reason
                  - resource
                  - timestamp
                  type: object
                type: array
              totalCorrections:
                description: Total corrections applied
                format: int32
                type: integer
              watchedResources:
                description: Watched resource count
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
