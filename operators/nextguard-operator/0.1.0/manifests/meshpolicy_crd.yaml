apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: meshpolicies.security.nextguard.io
  labels:
    app: nextguard-operator
spec:
  group: security.nextguard.io
  scope: Namespaced
  names:
    kind: MeshPolicy
    plural: meshpolicies
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: MeshPolicy defines Istio service mesh security policies
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - tenantNamespace
            - policyKind
            - config
            properties:
              tenantNamespace:
                type: string
              policyKind:
                type: string
                description: Type of Istio resource (PeerAuthentication, AuthorizationPolicy, etc.)
              config:
                type: object
                description: Raw Istio resource configuration
                x-kubernetes-preserve-unknown-fields: true
          status:
            type: object
            properties:
              phase:
                type: string
              message:
                type: string
              lastSyncedAt:
                type: string
                format: date-time
              syncId:
                type: string
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Kind
      type: string
      jsonPath: .spec.policyKind
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
