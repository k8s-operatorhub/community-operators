apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rupturainstances.ruptura.io
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: operator
spec:
  group: ruptura.io
  scope: Namespaced
  names:
    plural: rupturainstances
    singular: rupturainstance
    kind: RupturaInstance
    shortNames: ["ri", "ruptura"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Edition
          type: string
          jsonPath: .spec.edition
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                  description: "Ruptura container image. Default: ghcr.io/benfradjselim/ruptura:v6.6.3"
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 1
                  default: 1
                  description: "Must be 1 — BadgerDB is single-writer."
                storageSize:
                  type: string
                  default: "10Gi"
                  description: "PVC size for BadgerDB persistence."
                apiKeyRef:
                  type: string
                  description: "Name of a Secret with an 'api-key' key. Becomes RUPTURA_API_KEY."
                edition:
                  type: string
                  enum: [community, autopilot]
                  default: community
                  description: "Feature tier. 'autopilot' enables T1 auto-execution."
                ingestRPS:
                  type: integer
                  minimum: 1
                  maximum: 100000
                  description: "Token-bucket rate limit for the OTLP ingest server (req/s)."
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:    {type: string}
                        memory: {type: string}
                    limits:
                      type: object
                      properties:
                        cpu:    {type: string}
                        memory: {type: string}
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Degraded, Failed]
                readyReplicas:
                  type: integer
                availableReplicas:
                  type: integer
                message:
                  type: string
                lastReconcileTime:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
