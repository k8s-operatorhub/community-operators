              "name": "api-v4-with-jwt-plan"
            },
            "application": {
              "name": "simple-application-with-client-id"
            },
            "plan": "JWT",
            "endingAt": "2040-12-25T09:12:28Z"
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "ApiResource",
          "metadata": {
            "name": "reusable-resource-cache"
          },
          "spec": {
            "name": "cache-resource",
            "type": "cache",
            "enabled": true,
            "configuration": {
              "timeToIdleSeconds": 0,
              "timeToLiveSeconds": 0,
              "maxEntriesLocalHeap": 1000
            }
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "SharedPolicyGroup",
          "metadata": {
            "name": "simple-shared-policy-groups"
          },
          "spec": {
            "contextRef": {
              "name": "dev-ctx"
            },
            "name": "simple-shared-policy-groups",
            "description": "Simple shared policy groups",
            "apiType": "PROXY",
            "phase": "REQUEST",
            "steps": [
              {
                "name": "Rate Limit",
                "description": "k8s rate limit",
                "enabled": true,
                "policy": "rate-limit",
                "configuration": {
                  "async": false,
                  "addHeaders": true,
                  "rate": {
                    "useKeyOnly": false,
                    "periodTime": 1,
                    "limit": 10,
                    "periodTimeUnit": "MINUTES",
                    "key": ""
                  }
                }
              }
            ]
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "Group",
          "metadata": {
            "name": "developers"
          },
          "spec": {
            "contextRef": {
              "name": "dev-ctx"
            },
            "name": "developers",
            "notifyMembers": false,
            "members": [
              {
                "source": "memory",
                "sourceId": "api1",
                "roles": {
                  "API": "OWNER",
                  "APPLICATION": "OWNER",
                  "INTEGRATION": "USER"
                }
              }
            ]
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "Notification",
          "metadata": {
            "name": "api-notification"
          },
          "spec": {
            "target": "console",
            "eventType": "api",
            "console": {
              "apiEvents": [
                "API_STARTED",
                "API_STOPPED"
              ]
            }
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "KafkaRoute",
          "metadata": {
            "name": "kafka-route-demo"
          },
          "spec": {
            "parentRefs": [
              {
                "name": "gravitee-gateway",
                "kind": "Gateway",
                "group": "gateway.networking.k8s.io",
                "namespace": "default"
              }
            ],
            "hostname": "demo.kafka.example.dev",
            "backendRefs": [
              {
                "group": "",
                "kind": "Service",
                "name": "my-cluster-kafka-bootstrap",
                "namespace": "default",
                "port": 9092
              }
            ]
          }
        },
        {
          "apiVersion": "gravitee.io/v1alpha1",
          "kind": "GatewayClassParameters",
          "metadata": {
            "name": "gravitee-gateway"
          },
          "spec": {
            "kubernetes": {
              "deployment": {
                "template": {
                  "spec": {
                    "containers": [
                      {
                        "name": "gateway",
                        "image": "graviteeio/apim-gateway"
                      }
                    ],
                    "securityContext": {
                      "runAsNonRoot": true,
                      "runAsUser": 1001
                    }
                  }
                }
              }
            }
          }
        }
