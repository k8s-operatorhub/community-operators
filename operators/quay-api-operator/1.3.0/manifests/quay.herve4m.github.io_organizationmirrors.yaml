kind: CustomResourceDefinition
metadata:
  creationTimestamp: null
  name: organizationmirrors.quay.herve4m.github.io
spec:
  group: quay.herve4m.github.io
  names:
    kind: OrganizationMirror
    plural: organizationmirrors
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Organization in Quay
      jsonPath: .spec.organization
      name: Quay organization
      type: string
    - description: The status of the resource creation process in Quay
      jsonPath: .status.conditions[?(@.type == 'Successful')].status
      name: Success
      type: string
    - description: The error message when the resource creation process fails
      jsonPath: .status.message
      name: Message
      type: string
    - description: The state of the reconciliation process
      jsonPath: .status.conditions[?(@.type == 'Running')].reason
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Manage Quay Container Registry organization mirror configurations
        properties:
          apiVersion:
            description: |
              APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |
              Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of OrganizationMirror
            properties:
              connSecretRef:
                description: |
                  Reference to the secret resource that stores the connection parameters to the Quay Container Registry API.
                  The secret must include the 'host', 'token' (or 'username' and 'password'), and optionally the 'validateCerts' keys.
                properties:
                  name:
                    description: Name of the secret resource.
                    type: string
                  namespace:
                    description: |
                      Namespace of the secret resource. By default, the secret resource is retrieved from the same namespace as the current OrganizationMirror resource.
                    type: string
                required:
                - name
                type: object
              externalNamespace:
                description: Namespace, or project, in the external registry from
                  which repositories are mirrored, such as 'projectquay' or 'library'.
                  This parameter is required when creating the mirroring configuration.
                type: string
              externalRegistryPassword:
                description: Password to use for pulling images from the remote registry.
                  Only used when 'externalRegistryUsername' is also provided.
                format: password
                type: string
              externalRegistryType:
                description: Type of the external registry from which repositories
                  are mirrored. This parameter is required when creating the mirroring
                  configuration. The type cannot be changed after creation.
                enum:
                - quay
                - harbor
                type: string
              externalRegistryUrl:
                description: URL of the external registry, such as https://quay.io
                  or https://harbor.example.com This parameter is required when creating
                  the mirroring configuration.
                type: string
              externalRegistryUsername:
                description: Username to use for pulling images from the remote registry.
                  If not provided, then anonymous access is used.
                type: string
              forceSync:
                description: Triggers an immediate synchronization of all repositories
                  in the mirror.
                type: boolean
              httpProxy:
                description: HTTP proxy to use for accessing the remote container
                  registry. See the 'curl' documentation for more details. By default,
                  no proxy is used.
                type: string
              httpsProxy:
                description: HTTPS proxy to use for accessing the remote container
                  registry. See the 'curl' documentation for more details. By default,
                  no proxy is used.
                type: string
              isEnabled:
                description: Defines whether the mirror configuration is active or
                  inactive. 'true' by default.
                type: boolean
              noProxy:
                description: Comma-separated list of hosts for which the proxy should
                  not be used. Only relevant when you also specify a proxy configuration
                  by setting the 'httpProxy' or 'httpsProxy' variables. See the 'curl'
                  documentation for more details.
                type: string
              organization:
                description: Name of the organization to configure for mirroring.
                  The organization must exist and be empty (contain no repositories)
                  when creating a new mirror configuration.
                type: string
              preserveInQuayOnDeletion:
                default: false
                description: |
                  Whether to preserve the corresponding Quay object when you delete the OrganizationMirror resource. When set to 'false' (the default), the object is deleted from Quay.
                type: boolean
              repositoryFilters:
                description: List of repository name patterns to synchronize from
                  the external namespace. Supports glob patterns such as 'hello*',
                  'busy*', or '*test'. If not specified or empty, then all repositories
                  from the external namespace are synchronized.
                items:
                  type: string
                type: array
              robotUsername:
                description: Username of the robot account that is used for synchronization.
                  The robot must belong to the organization specified in 'organization'.
                  This parameter is required when creating the mirroring configuration.
                type: string
              skopeoTimeout:
                description: Maximum duration of mirroring jobs. The timeout must
                  be between 5 minutes (300 seconds) and 12 hours (43200 seconds).
                  The 'skopeoTimeout' parameter accepts a time unit as a suffix; 's'
                  for seconds, 'm' for minutes, and 'h' for hours. For example, '10m'
                  for 10 minutes. 5 minutes (300 seconds) by default.
                type: string
              syncInterval:
                description: Synchronization interval for this repository mirror in
                  seconds. The 'syncInterval' parameter accepts a time unit as a suffix;
                  's' for seconds, 'm' for minutes, 'h' for hours, 'd' for days, and
                  'w' for weeks. For example, '8h' for eight hours. The minimal value
                  in 60 seconds. 86400 (one day) by default.
                type: string
              syncStartDate:
                description: The date and time at which the first synchronization
                  should be initiated. The format for the 'syncStartDate' parameter
                  is ISO 8601 UTC, such as 2026-04-25T21:06:00Z. If you do not provide
                  the 'syncStartDate' parameter when you configure a new organization
                  mirror, then the synchronization is immediately active, and a synchronization
                  is initiated if the 'isEnabled' parameter is 'true'.
                type: string
              verifyTls:
                description: Defines whether TLS of the external registry should be
                  verified. 'true' by default.
                type: boolean
              visibility:
                description: Visibility of the mirrored repositories created in the
                  organization. 'public' by default.
                enum:
                - public
                - private
                type: string
            required:
            - connSecretRef
            - organization
            type: object
          status:
            description: |
              Status defines the observed state of OrganizationMirror
            type: object
            x-kubernetes-preserve-unknown-fields: true
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
